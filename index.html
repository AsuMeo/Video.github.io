<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>БЛОКРАН — Мультиплеерное Выживание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05070f; font-family:'Rubik',sans-serif; user-select:none; color: #fff; }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; image-rendering:pixelated; }

  /* ---------- UI PANELS ---------- */
  .hud-layer { position:fixed; inset:0; z-index:20; pointer-events:none; display:none; }
  .hud-layer.on { display:block; }
  
  #topUI { position:absolute; top:12px; left:12px; width:300px; padding:12px; background:rgba(10,20,40,0.8); border:1px solid rgba(130,170,255,0.3); border-radius:12px; backdrop-filter:blur(8px); pointer-events:auto; }
  .bar-container { height:10px; background:rgba(0,0,0,0.5); border-radius:5px; margin:6px 0; overflow:hidden; border:1px solid rgba(255,255,255,0.1); }
  #hpBar { width:100%; height:100%; background:linear-gradient(90deg, #ff4e50, #f9d423); transition: width 0.3s; }
  #xpBar { width:0%; height:100%; background:linear-gradient(90deg, #00f2fe, #4facfe); transition: width 0.3s; }
  .stats-row { display:flex; justify-content:space-between; font-size:12px; font-weight:800; color:#c9d7ff; margin-top:4px; }
  
  #sideUI { position:absolute; top:12px; right:12px; width:200px; padding:10px; background:rgba(10,20,40,0.6); border-radius:12px; border:1px solid rgba(255,255,255,0.15); pointer-events:auto; text-align:right; }
  #sideUI h3 { font-size:11px; color:#ffe98a; margin-bottom:5px; font-family:'Press Start 2P'; }
  
  /* HOTBAR */
  #hotbar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; pointer-events:auto; }
  .slot { width:56px; height:56px; background:rgba(15,25,50,0.85); border:3px solid rgba(130,170,255,0.3); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; transition: transform 0.1s; }
  .slot.active { border-color: #ffd94f; box-shadow: 0 0 15px rgba(255,217,79,0.4); transform: scale(1.1); }
  .slot-icon { font-size:24px; }
  .slot-count { position:absolute; bottom:2px; right:4px; font-size:10px; font-weight:800; color:#fff; }
  .slot-key { position:absolute; top:2px; left:4px; font-size:9px; color:rgba(255,255,255,0.5); }

  /* CHAT */
  #chatBox { position:absolute; bottom:90px; left:16px; width:280px; height:180px; background:rgba(5,10,25,0.6); border:1px solid rgba(255,255,255,0.1); border-radius:12px; display:flex; flex-direction:column; pointer-events:auto; }
  #messages { flex:1; overflow-y:auto; padding:8px; font-size:12px; display:flex; flex-direction:column; gap:4px; }
  #chatInput { background:rgba(0,0,0,0.3); border:none; border-top:1px solid rgba(255,255,255,0.1); padding:10px; color:#fff; font-size:13px; outline:none; border-radius:0 0 12px 12px; }

  /* MODALS */
  .modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; display:none; align-items:center; justify-content:center; backdrop-filter:blur(10px); pointer-events:auto; }
  .modal-content { width:min(600px, 90vw); background:#152035; border:2px solid #3f5a94; border-radius:24px; padding:24px; position:relative; }
  .close-btn { position:absolute; top:15px; right:20px; font-size:24px; cursor:pointer; color:#7f93c9; }
  .craft-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:12px; margin-top:15px; max-height:400px; overflow-y:auto; }
  .recipe-card { background:rgba(10,20,40,0.5); border:1px solid rgba(130,170,255,0.2); padding:10px; border-radius:12px; text-align:center; transition:0.2s; cursor:pointer; }
  .recipe-card:hover { background:rgba(130,170,255,0.1); border-color:#ffd94f; }
  .recipe-icon { font-size:28px; margin-bottom:5px; }
  .recipe-name { font-size:12px; font-weight:800; margin-bottom:4px; }
  .recipe-cost { font-size:10px; color:#8fa3d9; }

  /* AUTH */
  #authScreen { position:fixed; inset:0; z-index:500; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at center, #1b2b5e 0%, #05070f 100%); }
  .auth-card { width:360px; padding:30px; background:rgba(13,20,46,0.8); border:1px solid rgba(120,160,255,0.3); border-radius:22px; text-align:center; backdrop-filter:blur(15px); }
  input[type="text"], input[type="email"], input[type="password"] { width:100%; padding:12px; border-radius:10px; border:1px solid #3f5a94; background:#0a1020; color:#fff; margin-bottom:10px; outline:none; }
  .primary-btn { width:100%; padding:14px; background:linear-gradient(135deg, #3f7bff, #7b4dff); border:none; border-radius:12px; color:#fff; font-weight:800; cursor:pointer; margin-top:5px; }

  #toast { position:fixed; top:20%; left:50%; transform:translateX(-50%); padding:12px 24px; background:rgba(10,16,40,0.9); border:1px solid #ffd94f; border-radius:14px; opacity:0; transition:0.3s; z-index:1000; pointer-events:none; }
  #toast.on { opacity:1; }

  .mobile-ctrl { position:fixed; bottom:20px; z-index:30; display:none; gap:10px; pointer-events:auto; }
  body.touch .mobile-ctrl { display:flex; }
  .joy-btn { width:70px; height:70px; background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.3); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:30px; color:#fff; backdrop-filter:blur(5px); }
  .joy-btn.active { background:rgba(255,255,255,0.3); }

  #bossHealthUI { position:fixed; top:80px; left:50%; transform:translateX(-50%); width:400px; display:none; text-align:center; }
  #bossName { font-family:'Press Start 2P'; font-size:12px; color:#ff4e50; margin-bottom:5px; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- HUD LAYER -->
<div id="hud" class="hud-layer">
  <div id="topUI">
    <div style="font-size:14px; font-weight:800; display:flex; justify-content:space-between;">
      <span id="pName">Загрузка...</span>
      <span style="color:#ffd94f;">🪙 <span id="coinCount">0</span></span>
    </div>
    <div class="bar-container"><div id="hpBar"></div></div>
    <div class="bar-container"><div id="xpBar"></div></div>
    <div class="stats-row">
      <span>⭐ LVL <span id="lvlVal">1</span></span>
      <span>👥 ОНЛАЙН: <span id="onlineVal">1</span></span>
      <span>XP: <span id="xpVal">0</span></span>
    </div>
  </div>

  <div id="sideUI">
    <h3 id="seasonName">ЛЕТО</h3>
    <div style="font-size:10px; color:#8fa3d9;" id="weatherText">ЯСНО</div>
    <div style="margin-top:10px;">
      <button onclick="toggleModal('craftModal')" style="padding:5px 10px; background:#3f5a94; border:none; color:#fff; border-radius:5px; cursor:pointer; font-weight:bold; font-size:10px;">🎒 КРАФТ (E)</button>
    </div>
    <div style="margin-top:5px;">
      <button onclick="requestBoss()" style="padding:5px 10px; background:#ff4e50; border:none; color:#fff; border-radius:5px; cursor:pointer; font-weight:bold; font-size:10px;">👑 БОСС (B)</button>
    </div>
  </div>

  <div id="bossHealthUI">
    <div id="bossName">ОКО ПУСТОТЫ</div>
    <div class="bar-container" style="height:14px;"><div id="bossHP" style="width:100%; background: #ff4e50; height:100%;"></div></div>
  </div>

  <div id="chatBox">
    <div id="messages"></div>
    <input id="chatInput" maxlength="80" placeholder="Нажми Enter, чтобы написать...">
  </div>

  <div id="hotbar">
    <!-- Generated by JS -->
  </div>

  <div class="mobile-ctrl" style="left:20px;">
    <div class="joy-btn" id="mLeft">◀</div>
    <div class="joy-btn" id="mRight">▶</div>
  </div>
  <div class="mobile-ctrl" style="right:20px;">
    <div class="joy-btn" id="mJump">▲</div>
    <div class="joy-btn" id="mAction">⛏</div>
  </div>
</div>

<!-- MODALS -->
<div id="craftModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="toggleModal('craftModal')">&times;</span>
    <h2 style="font-family:'Press Start 2P'; font-size:16px; margin-bottom:15px; color:#ffd94f;">🔨 КРАФТИНГ</h2>
    <p style="font-size:12px; color:#8fa3d9;">Создавай предметы из добытых ресурсов.</p>
    <div class="craft-grid" id="craftGrid"></div>
  </div>
</div>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-card">
    <h1 style="font-family:'Press Start 2P'; font-size:22px; margin-bottom:10px; color:#5cb8ff;">БЛОКРАН</h1>
    <p style="font-size:12px; color:#8fa3d9; margin-bottom:20px;">Мультиплеерное выживание</p>
    <input type="text" id="nickInput" placeholder="Ваш никнейм" maxlength="12">
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passInput" placeholder="Пароль (мин. 6 симв.)">
    <button class="primary-btn" onclick="handleAuth('login')">ВОЙТИ</button>
    <button class="primary-btn" onclick="handleAuth('reg')" style="background:#152035; border:1px solid #3f7bff; margin-top:10px;">РЕГИСТРАЦИЯ</button>
    <div id="authErr" style="color:#ff4e50; font-size:12px; margin-top:10px;"></div>
  </div>
</div>

<div id="toast"></div>

<!-- SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
'use strict';

const firebaseConfig = {
  apiKey: "AIzaSyBm0mIvHVznIeF2PoFk6dtdaiT5r877wyA",
  authDomain: "meow-874ce.firebaseapp.com",
  databaseURL: "https://meow-874ce-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meow-874ce",
  storageBucket: "meow-874ce.firebasestorage.app",
  messagingSenderId: "471541334599",
  appId: "1:471541334599:web:567af3e7dbe70a37572762"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const $ = id => document.getElementById(id);
const toast = (m) => { const e = $('toast'); e.textContent = m; e.classList.add('on'); setTimeout(() => e.classList.remove('on'), 2000); };

/* ============================================================
   WORLD ENGINE & GENERATION
   ============================================================ */
const TILE = 32, WW = 400, WH = 100; // 2D Grid
const B = { AIR: 0, DIRT: 1, GRASS: 2, STONE: 3, WOOD: 4, LEAF: 5, COAL: 6, IRON: 7, GOLD: 8, WATER: 9, BRICK: 10, CHEST: 11, TORCH: 12 };
const world = new Uint8Array(WW * WH);
const worldEdits = new Map(); // Local store for synchronized edits

function getTile(x, y) {
  if (x < 0 || x >= WW || y < 0 || y >= WH) return B.STONE;
  return world[y * WW + x];
}

function setTile(x, y, v) {
  if (x < 0 || x >= WW || y < 0 || y >= WH) return;
  world[y * WW + x] = v;
}

// Seed-based procedural terrain
function generateBaseTerrain() {
  const seed = 12345;
  const rng = (x) => {
    let t = Math.sin(x * 12.9898 + seed) * 43758.5453;
    return t - Math.floor(t);
  };
  
  const surfaceY = 40;
  for (let x = 0; x < WW; x++) {
    const h = Math.floor(surfaceY + Math.sin(x * 0.1) * 5 + rng(x) * 2);
    for (let y = 0; y < WH; y++) {
      let b = B.AIR;
      if (y > h + 5) b = B.STONE;
      else if (y > h) b = B.DIRT;
      else if (y === h) b = B.GRASS;
      
      // Ores
      if (b === B.STONE && rng(x + y * 10) < 0.05) {
        const r = rng(x * y);
        if (r < 0.1) b = B.GOLD;
        else if (r < 0.4) b = B.IRON;
        else b = B.COAL;
      }
      
      setTile(x, y, b);
    }
    
    // Trees
    if (x % 15 === 0 && rng(x) > 0.5) {
      const hLimit = Math.floor(surfaceY + Math.sin(x * 0.1) * 5 + rng(x) * 2) - 1;
      for (let ty = hLimit; ty > hLimit - 5; ty--) setTile(x, ty, B.WOOD);
      for (let lx = -2; lx <= 2; lx++) {
        for (let ly = -2; ly <= 0; ly++) {
          if (getTile(x + lx, hLimit - 5 + ly) === B.AIR) setTile(x + lx, hLimit - 5 + ly, B.LEAF);
        }
      }
    }
  }
}

/* ============================================================
   PLAYER & SYSTEMS
   ============================================================ */
const P = {
  uid: null, nick: "Игрок",
  x: 200 * TILE, y: 30 * TILE, vx: 0, vy: 0,
  w: 20, h: 28, ground: false,
  hp: 100, maxHp: 100, xp: 0, level: 1, coins: 0,
  inv: { [B.DIRT]: 10, [B.WOOD]: 5 },
  activeSkin: 'default'
};

const ITEMS = {
  [B.DIRT]: { n: "Земля", i: "🟫", place: B.DIRT },
  [B.STONE]: { n: "Камень", i: "🪨", place: B.STONE },
  [B.WOOD]: { n: "Дерево", i: "🪵", place: B.WOOD },
  [B.BRICK]: { n: "Кирпич", i: "🧱", place: B.BRICK },
  [B.COAL]: { n: "Уголь", i: "🌑", place: null },
  [B.IRON]: { n: "Железо", i: "🔘", place: null },
  [B.GOLD]: { n: "Золото", i: "🟡", place: null },
  [B.TORCH]: { n: "Факел", i: "🔥", place: B.TORCH },
  [B.CHEST]: { n: "Сундук", i: "📦", place: B.CHEST }
};

const hotbarSlots = [B.DIRT, B.STONE, B.WOOD, B.BRICK, B.TORCH, B.CHEST];
let activeSlotIdx = 0;

const RECIPES = [
  { out: B.BRICK, count: 4, needs: { [B.STONE]: 2 }, n: "Кирпич", i: "🧱" },
  { out: B.TORCH, count: 4, needs: { [B.WOOD]: 1, [B.COAL]: 1 }, n: "Факел", i: "🔥" },
  { out: B.CHEST, count: 1, needs: { [B.WOOD]: 8 }, n: "Сундук", i: "📦" }
];

/* ============================================================
   NETWORKING & REALTIME WORLD
   ============================================================ */
function syncBlock(tx, ty, type) {
  const key = `${tx}_${ty}`;
  db.ref('world_edits/' + key).set(type);
}

function listenToWorld() {
  db.ref('world_edits').on('child_added', snap => {
    const [tx, ty] = snap.key.split('_').map(Number);
    setTile(tx, ty, snap.val());
  });
  db.ref('world_edits').on('child_changed', snap => {
    const [tx, ty] = snap.key.split('_').map(Number);
    setTile(tx, ty, snap.val());
  });
}

const remotes = {};
function syncPlayer() {
  if (!P.uid) return;
  db.ref('players/' + P.uid).set({
    n: P.nick, x: P.x, y: P.y, hp: P.hp, lvl: P.level, skin: P.activeSkin, t: Date.now()
  });
}

function listenPlayers() {
  db.ref('players').on('value', snap => {
    const now = Date.now();
    snap.forEach(s => {
      if (s.key === P.uid) return;
      const v = s.val();
      if (now - v.t < 10000) remotes[s.key] = v;
      else delete remotes[s.key];
    });
    $('onlineVal').textContent = Object.keys(remotes).length + 1;
  });
}

/* ============================================================
   CORE GAME LOGIC
   ============================================================ */
const keys = {};
const mouse = { x: 0, y: 0, down: false };
let cam = { x: P.x, y: P.y };

function handleInput() {
  // Movement
  let ax = 0;
  if (keys['a'] || keys['ArrowLeft']) ax -= 1;
  if (keys['d'] || keys['ArrowRight']) ax += 1;
  
  const speed = P.level >= 3 ? 5.5 : 4.2;
  P.vx += ax * 0.6;
  P.vx *= P.ground ? 0.8 : 0.92;
  
  if ((keys[' '] || keys['w']) && P.ground) {
    P.vy = -10.5;
    P.ground = false;
  }
  
  P.vy += 0.5; // Gravity
  
  P.x += P.vx;
  checkCollision('x');
  P.y += P.vy;
  checkCollision('y');
  
  // Interaction
  if (mouse.down) {
    const worldX = mouse.x + cam.x;
    const worldY = mouse.y + cam.y;
    const tx = Math.floor(worldX / TILE);
    const ty = Math.floor(worldY / TILE);
    
    // Range check
    const dist = Math.hypot(P.x + P.w/2 - worldX, P.y + P.h/2 - worldY);
    if (dist < TILE * 5) {
      if (mouse.btn === 0) mine(tx, ty);
      else if (mouse.btn === 2) build(tx, ty);
    }
  }
}

function checkCollision(axis) {
  const x1 = Math.floor(P.x / TILE);
  const x2 = Math.floor((P.x + P.w) / TILE);
  const y1 = Math.floor(P.y / TILE);
  const y2 = Math.floor((P.y + P.h) / TILE);

  if (axis === 'x') {
    for (let y = y1; y <= y2; y++) {
      if (getTile(P.vx > 0 ? x2 : x1, y) !== B.AIR) {
        if (P.vx > 0) P.x = x2 * TILE - P.w - 1;
        else P.x = (x1 + 1) * TILE + 1;
        P.vx = 0;
      }
    }
  } else {
    P.ground = false;
    for (let x = x1; x <= x2; x++) {
      if (getTile(x, P.vy > 0 ? y2 : y1) !== B.AIR) {
        if (P.vy > 0) {
          P.y = y2 * TILE - P.h - 1;
          P.ground = true;
        } else {
          P.y = (y1 + 1) * TILE + 1;
        }
        P.vy = 0;
      }
    }
  }
}

function mine(tx, ty) {
  const t = getTile(tx, ty);
  if (t === B.AIR || t === B.WATER) return;
  
  setTile(tx, ty, B.AIR);
  syncBlock(tx, ty, B.AIR);
  
  P.inv[t] = (P.inv[t] || 0) + 1;
  P.xp += (t >= B.COAL ? 20 : 2);
  checkLevel();
  updateHUD();
}

function build(tx, ty) {
  if (getTile(tx, ty) !== B.AIR) return;
  const itemType = hotbarSlots[activeSlotIdx];
  const item = ITEMS[itemType];
  if (!item || !item.place || (P.inv[itemType] || 0) <= 0) return;
  
  setTile(tx, ty, item.place);
  syncBlock(tx, ty, item.place);
  P.inv[itemType]--;
  updateHUD();
}

function checkLevel() {
  const nextXp = P.level * 200;
  if (P.xp >= nextXp) {
    P.xp -= nextXp;
    P.level++;
    toast(`⭐ НОВЫЙ УРОВЕНЬ: ${P.level}!`);
    if (P.level === 6) P.activeSkin = 'golden';
  }
}

/* ============================================================
   RENDERING
   ============================================================ */
const cv = $('game'), ctx = cv.getContext('2d');
function render() {
  ctx.fillStyle = "#0a1020";
  ctx.fillRect(0, 0, cv.width, cv.height);
  
  // Camera smooth follow
  cam.x = lerp(cam.x, P.x - cv.width/2, 0.1);
  cam.y = lerp(cam.y, P.y - cv.height/2, 0.1);
  
  // Draw Tiles
  const tx0 = Math.floor(cam.x / TILE);
  const ty0 = Math.floor(cam.y / TILE);
  const tx1 = tx0 + Math.ceil(cv.width / TILE) + 1;
  const ty1 = ty0 + Math.ceil(cv.height / TILE) + 1;
  
  for (let y = ty0; y <= ty1; y++) {
    for (let x = tx0; x <= tx1; x++) {
      const t = getTile(x, y);
      if (t === B.AIR) continue;
      
      const px = x * TILE - cam.x;
      const py = y * TILE - cam.y;
      
      ctx.fillStyle = getTileColor(t);
      ctx.fillRect(px, py, TILE, TILE);
      
      // Highlight top of grass
      if (t === B.GRASS) {
        ctx.fillStyle = "#82e66c";
        ctx.fillRect(px, py, TILE, 4);
      }
    }
  }
  
  // Draw Players
  drawChar(P.x - cam.x, P.y - cam.y, P.nick, P.activeSkin);
  for (let id in remotes) {
    const r = remotes[id];
    drawChar(r.x - cam.x, r.y - cam.y, r.n, r.skin);
  }
  
  requestAnimationFrame(render);
}

function getTileColor(t) {
  switch(t) {
    case B.DIRT: return "#8c5e3c";
    case B.GRASS: return "#55b848";
    case B.STONE: return "#5d6a7a";
    case B.WOOD: return "#6d4328";
    case B.LEAF: return "#2d5a27";
    case B.COAL: return "#1a1a1a";
    case B.IRON: return "#9aa5b1";
    case B.GOLD: return "#ffd94f";
    case B.BRICK: return "#a04a3c";
    case B.WATER: return "rgba(0, 150, 255, 0.6)";
    default: return "#f00";
  }
}

function drawChar(x, y, name, skin) {
  const col = skin === 'golden' ? '#ffd94f' : '#5cb8ff';
  ctx.fillStyle = col;
  ctx.fillRect(x, y, P.w, P.h);
  // Eyes
  ctx.fillStyle = "#fff";
  ctx.fillRect(x + 4, y + 6, 4, 4);
  ctx.fillRect(x + 12, y + 6, 4, 4);
  // Name
  ctx.fillStyle = "#fff";
  ctx.font = "bold 10px Arial";
  ctx.textAlign = "center";
  ctx.fillText(name, x + P.w/2, y - 8);
}

/* ============================================================
   UI & EVENTS
   ============================================================ */
function updateHUD() {
  $('hpBar').style.width = (P.hp / P.maxHp * 100) + '%';
  const nextXp = P.level * 200;
  $('xpBar').style.width = (P.xp / nextXp * 100) + '%';
  $('lvlVal').textContent = P.level;
  $('xpVal').textContent = P.xp;
  $('coinCount').textContent = P.coins;
  $('pName').textContent = P.nick;
  
  renderHotbar();
}

function renderHotbar() {
  const hb = $('hotbar');
  hb.innerHTML = '';
  hotbarSlots.forEach((type, i) => {
    const item = ITEMS[type];
    const slot = document.createElement('div');
    slot.className = `slot ${activeSlotIdx === i ? 'active' : ''}`;
    slot.innerHTML = `
      <span class="slot-key">${i+1}</span>
      <span class="slot-icon">${item.i}</span>
      <span class="slot-count">${P.inv[type] || 0}</span>
    `;
    slot.onclick = () => { activeSlotIdx = i; renderHotbar(); };
    hb.appendChild(slot);
  });
}

function toggleModal(id) {
  const m = $(id);
  const isOpening = m.style.display !== 'flex';
  m.style.display = isOpening ? 'flex' : 'none';
  if (isOpening && id === 'craftModal') renderCrafting();
}

function renderCrafting() {
  const grid = $('craftGrid');
  grid.innerHTML = '';
  RECIPES.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    let costText = "";
    for (let id in r.needs) costText += `${ITEMS[id].i}x${r.needs[id]} `;
    
    card.innerHTML = `
      <div class="recipe-icon">${r.i}</div>
      <div class="recipe-name">${r.n}</div>
      <div class="recipe-cost">${costText}</div>
    `;
    card.onclick = () => craft(r);
    grid.appendChild(card);
  });
}

function craft(r) {
  for (let id in r.needs) {
    if ((P.inv[id] || 0) < r.needs[id]) { toast("Недостаточно ресурсов!"); return; }
  }
  // All good
  for (let id in r.needs) P.inv[id] -= r.needs[id];
  P.inv[r.out] = (P.inv[r.out] || 0) + r.count;
  toast(`Скрафчено: ${r.n}`);
  updateHUD();
  renderCrafting();
}

/* ============================================================
   SYSTEMS & LIFECYCLE
   ============================================================ */
async function handleAuth(type) {
  const email = $('emailInput').value, pass = $('passInput').value, nick = $('nickInput').value;
  try {
    if (type === 'reg') {
      const res = await auth.createUserWithEmailAndPassword(email, pass);
      await db.ref('users/' + res.user.uid).set({ n: nick });
    } else {
      await auth.signInWithEmailAndPassword(email, pass);
    }
  } catch(e) { $('authErr').textContent = e.message; }
}

auth.onAuthStateChanged(async user => {
  if (user) {
    P.uid = user.uid;
    const snap = await db.ref('users/' + user.uid).once('value');
    P.nick = snap.val()?.n || "Странник";
    $('authScreen').style.display = 'none';
    $('hud').classList.add('on');
    initGame();
  }
});

function initGame() {
  generateBaseTerrain();
  listenToWorld();
  listenPlayers();
  
  // Game loops
  setInterval(handleInput, 1000/60);
  setInterval(syncPlayer, 100);
  
  updateHUD();
  render();
}

// Global Events
window.onresize = () => { cv.width = window.innerWidth; cv.height = window.innerHeight; };
window.onresize();

window.onkeydown = e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key >= '1' && e.key <= '6') { activeSlotIdx = parseInt(e.key) - 1; renderHotbar(); }
  if (e.key === 'e') toggleModal('craftModal');
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

cv.onmousedown = e => { mouse.down = true; mouse.btn = e.button; };
window.onmouseup = () => mouse.down = false;
cv.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
cv.oncontextmenu = e => e.preventDefault();

// Chat
$('chatInput').onkeydown = e => {
  if (e.key === 'Enter') {
    const t = e.target.value.trim();
    if (t) db.ref('chat').push({ n: P.nick, m: t, skin: P.activeSkin });
    e.target.value = '';
  }
};
db.ref('chat').limitToLast(10).on('child_added', snap => {
  const v = snap.val();
  const d = document.createElement('div');
  d.innerHTML = `<span style="color:#ffd94f">${v.n}:</span> ${v.m}`;
  $('messages').appendChild(d);
  $('messages').scrollTop = $('messages').scrollHeight;
});

// Mobile Controls
const bindJoy = (id, k) => {
  $(id).ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
  $(id).ontouchend = () => keys[k] = false;
};
bindJoy('mLeft', 'a'); bindJoy('mRight', 'd'); bindJoy('mJump', ' ');
$('mAction').ontouchstart = (e) => { e.preventDefault(); mouse.down = true; mouse.btn = 0; mouse.x = cv.width/2; mouse.y = cv.height/2; };
$('mAction').ontouchend = () => mouse.down = false;

if ('ontouchstart' in window) document.body.classList.add('touch');
</script>
</body>
