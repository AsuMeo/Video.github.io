svgPart('Туловище','body',330,520,`<path d="M61 510Q46 300 74 101Q165 45 256 101Q284 300 269 510Z" fill="${shirt}" stroke="${line}" stroke-width="14"/><path d="M111 83Q165 142 219 83" fill="none" stroke="#fff8f3" stroke-width="22"/>`),

{id:legL,part:p[4],z:0,parent:null,s:{x:465,y:1340,rotation:0,scaleX:.72,scaleY:.72,opacity:1,pivotX:.5,pivotY:.08}},
{id:legR,part:p[5],z:1,parent:null,s:{x:615,y:1340,rotation:0,scaleX:.72,scaleY:.72,opacity:1,pivotX:.5,pivotY:.08}},

{id:armR,part:p[3],z:4,parent:body,s:{x:302,y:105,rotation:-8,scaleX:.82,scaleY:.82,opacity:1,pivotX:.5,pivotY:.08}},
{id:head,part:p[1],z:5,parent:body,s:{x:165,y:34,rotation:0,scaleX:1,scaleY:1,opacity:1,pivotX:.5,pivotY:.72}}];let pose={};spec.forEach(x=>{project.layers.push({id:x.id,name:x.part.name,role:x.part.role,src:x.part.src,w:x.part.w,h:x.part.h,z:x.z,parent:x.parent,visible:true,locked:false});pose[x.id]=x.s});project.frames=[{id:id(),hold:1,pose,effect:null}];selected=head;frame=0;project.fps=12;$('#fps').value=12;resetHistory();loadImages()}

function readFile(f){return new Promise((r,j)=>{let x=new FileReader;x.onload=()=>r(x.result);x.onerror=j;x.readAsDataURL(f)})}function decode(src){return new Promise((r,j)=>{let im=new Image;im.onload=()=>r(im);im.onerror=j;im.src=src})}
async function importImages(files){for(let f of files){let src=await readFile(f),im=await decode(src),scale=Math.min(1,700/im.width,900/im.height),lid=id(),l={id:lid,name:f.name.replace(/\.[^.]+$/,''),role:'custom',src,w:im.width,h:im.height,z:project.layers.length?Math.max(...project.layers.map(x=>x.z))+1:0,parent:null,visible:true,locked:false};project.layers.push(l);images.set(lid,im);project.frames.forEach(fr=>fr.pose[lid]={x:W/2,y:H/2,rotation:0,scaleX:scale,scaleY:scale,opacity:1,pivotX:.5,pivotY:.5});selected=lid}saveState();renderAll();toast('Изображения добавлены')}
function db(){return new Promise((r,j)=>{let q=indexedDB.open(DB_NAME,1);q.onupgradeneeded=()=>q.result.createObjectStore('projects',{keyPath:'id'});q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}async function saveProject(silent=false){try{project.updated=Date.now();let d=await db(),tx=d.transaction('projects','readwrite');tx.objectStore('projects').put(clone(project));await new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=()=>j(tx.error)});localStorage.setItem('kage-last',project.id);if(!silent)toast('Проект сохранён на устройстве')}catch(e){console.error(e);toast('Не удалось сохранить — возможно, хранилище заполнено')}}function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveProject(true),1000)}async function allProjects(){let d=await db(),q=d.transaction('projects').objectStore('projects').getAll();return new Promise((r,j)=>{q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function listProjects(){let ps=(await allProjects()).sort((a,b)=>b.updated-a.updated);showDialog(`<h2>Мои проекты</h2><p>Проекты сохранены только на этом устройстве.</p><div id="projectList"></div><div class="dialogActions"><button class="dlg primary" id="closeProjects">Закрыть</button></div>`);let root=$('#projectList');ps.forEach(p=>{let b=document.createElement('button');b.className='projectCard';b.innerHTML=`<div><b>${esc(p.name)}</b><small>${p.frames.length} кадров · ${new Date(p.updated).toLocaleString('ru')}</small></div><span>›</span>`;b.onclick=()=>loadProject(p);root.append(b)});if(!ps.length)root.innerHTML='<div class="notice">Сохранённых проектов пока нет.</div>';$('#closeProjects').onclick=hideDialog}
async function loadProject(p){project=clone(p);frame=0;selected=project.layers.at(-1)?.id||null;$('#projectTop').textContent=project.name;$('#fps').value=project.fps;hideDialog();closeDrawer();resetHistory();await loadImages();toast('Проект открыт')}
function newProjectDialog(){showDialog(`<h2>Новый проект?</h2><p>Текущий проект лучше сначала сохранить.</p><div class="dialogActions"><button class="dlg" id="cancelNew">Отмена</button><button class="dlg primary" id="confirmNew">Создать</button></div>`);$('#cancelNew').onclick=hideDialog;$('#confirmNew').onclick=()=>{hideDialog();closeDrawer();project={id:'p'+Date.now(),name:'Новый проект',fps:12,bg:'#202333',transparent:false,layers:[],frames:[],updated:Date.now()};$('#projectTop').textContent=project.name;makeDefault()}}
function showDialog(html){$('#dialog').innerHTML=html;$('#modal').classList.remove('hidden')}function hideDialog(){$('#modal').classList.add('hidden')}function download(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.append(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1200)}function exportProjectFile(){download(new Blob([JSON.stringify(project)],{type:'application/json'}),(project.name||'project')+'.kage.json')}
function downloadPNG(){let c=document.createElement('canvas');c.width=W;c.height=H;drawScene(c.getContext('2d'),curPose(),project.frames[frame]);c.toBlob(b=>download(b,(project.name||'frame')+'-'+(frame+1)+'.png'),'image/png')}
async function exportVideo(){if(!canvas.captureStream||!window.MediaRecorder)return toast('Браузер не поддерживает экспорт видео');let mime=['video/mp4;codecs=h264','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(x=>MediaRecorder.isTypeSupported(x));if(!mime)return toast('На устройстве нет подходящего видеокодека');showDialog(`<h2>Создание видео</h2><p>Не сворачивайте браузер до окончания.</p><div class="progress"><i id="bar"></i></div><div id="renderStatus">Подготовка…</div><div class="dialogActions"><button class="dlg" id="cancelVideo">Отмена</button></div>`);let cancel=false;$('#cancelVideo').onclick=()=>cancel=true;let out=document.createElement('canvas');out.width=W;out.height=H;let oc=out.getContext('2d'),stream=out.captureStream(0),track=stream.getVideoTracks()[0],chunks=[],rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8000000}),done=new Promise(r=>rec.onstop=r);rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};rec.start();let seq=[];project.frames.forEach((f,i)=>{for(let n=0;n<(f.hold||1);n++)seq.push(i)});for(let i=0;i<seq.length&&!cancel;i++){let f=project.frames[seq[i]];drawScene(oc,f.pose,f);track.requestFrame?.();$('#bar').style.width=(i+1)/seq.length*100+'%';$('#renderStatus').textContent=`Кадр ${i+1} из ${seq.length}`;await new Promise(r=>setTimeout(r,1000/project.fps))}rec.stop();await done;stream.getTracks().forEach(t=>t.stop());hideDialog();if(cancel)return toast('Экспорт отменён');let ext=mime.includes('mp4')?'mp4':'webm';download(new Blob(chunks,{type:mime}),(project.name||'animation')+'.'+ext);toast('Видео готово')}
async function installApp(){if(installPrompt){installPrompt.prompt();await installPrompt.userChoice;installPrompt=null}else toast('Откройте меню браузера → «Добавить на главный экран»')}
$('#undo').onclick=undo;$('#redo').onclick=redo;$('#save').onclick=()=>saveProject();$('#export').onclick=()=>openDrawer('project');$('#play').onclick=play;$('#first').onclick=()=>setFrame(0);$('#prev').onclick=()=>setFrame(frame-1);$('#next').onclick=()=>setFrame(frame+1);$('#fps').onchange=e=>{project.fps=+e.target.value;saveState()};$('#bones').onclick=()=>{showBones=!showBones;$('#bones').classList.toggle('on',showBones);render()};$('#onion').onclick=()=>{onion=!onion;$('#onion').classList.toggle('on',onion);render()};$('#fit').onclick=fit;document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>openDrawer(b.dataset.panel));$('#closeDrawer').onclick=closeDrawer;$('#shade').onclick=closeDrawer;
let sheetStart=null;$('#grabArea').onpointerdown=e=>{sheetStart=e.clientY;$('#grabArea').setPointerCapture(e.pointerId)};$('#grabArea').onpointerup=e=>{if(sheetStart!==null&&e.clientY-sheetStart>35)closeDrawer();sheetStart=null};$('#modal').onclick=e=>{if(e.target===$('#modal'))hideDialog()};$('#imageInput').onchange=e=>{importImages([...e.target.files]);e.target.value=''};$('#projectInput').onchange=async e=>{try{let p=JSON.parse(await e.target.files[0].text());if(!p.frames||!p.layers)throw Error();p.id='p'+Date.now();await loadProject(p);saveProject(true)}catch{toast('Файл проекта повреждён')}e.target.value=''};window.onresize=fit;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e});
const icon='<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><defs><linearGradient id="g"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#d955dc"/></linearGradient></defs><rect width="512" height="512" rx="110" fill="#111319"/><path d="M105 88h100v132L333 88h116L288 246l169 180H330L205 284v142H105z" fill="url(#g)"/></svg>',iconURL='data:image/svg+xml,'+enc(icon),manifest={name:'Kage Studio',short_name:'Kage',start_url:location.pathname,display:'standalone',orientation:'portrait',background_color:'#07080c',theme_color:'#090b10',icons:[{src:iconURL,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};let ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));document.head.append(ml);let ai=document.createElement('link');ai.rel='apple-touch-icon';ai.href=iconURL;document.head.append(ai);
(async()=>{let last=localStorage.getItem('kage-last');if(last)try{let p=(await allProjects()).find(x=>x.id===last);if(p){await loadProject(p);return}}catch(e){console.warn(e)}makeDefault();setTimeout(()=>{openDrawer('templates');toast('Начните с готового шаблона ✦')},650)})();
</script>
