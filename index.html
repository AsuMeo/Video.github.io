<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0b1020">
  <meta name="color-scheme" content="dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MEOW">
  <title>MEOW — защищённый мессенджер</title>
  <style>
    :root{--bg:#070b14;--panel:#0d1322;--card:#121a2c;--card2:#172136;--line:#22304a;--text:#f4f7ff;--muted:#8e9bb5;--accent:#7c5cff;--accent2:#18c8ff;--ok:#32d583;--danger:#ff5577;--shadow:0 18px 50px #0008;--r:20px}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font:15px/1.4 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}
    body{display:flex;justify-content:center;background:radial-gradient(circle at 50% -10%,#222050 0,transparent 38%),var(--bg)}
    button,input,textarea,select{font:inherit;color:inherit}
    button{border:0;cursor:pointer}.hidden{display:none!important}.grow{flex:1}.muted{color:var(--muted)}
    #app{width:100%;max-width:600px;height:100dvh;position:relative;overflow:hidden;background:linear-gradient(180deg,#0a0f1d,#070b14)}
    .screen{position:absolute;inset:0;display:flex;flex-direction:column;min-height:0}
    .auth{padding:max(24px,env(safe-area-inset-top)) 22px max(24px,env(safe-area-inset-bottom));overflow:auto;justify-content:center}
    .brand{display:flex;align-items:center;gap:12px;font-size:28px;font-weight:900;letter-spacing:.5px;margin-bottom:8px}.brand-badge{width:52px;height:52px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 15px 45px #655cff55}
    .auth-card{background:#101728dd;border:1px solid #273450;border-radius:28px;padding:22px;box-shadow:var(--shadow);backdrop-filter:blur(20px)}
    .auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:#090e19;border-radius:14px;padding:4px;margin:18px 0}.auth-tabs button{padding:10px;background:transparent;border-radius:11px;color:var(--muted)}.auth-tabs .on{background:var(--card2);color:white}
    .field{display:block;margin:12px 0}.field span{display:block;color:var(--muted);font-size:12px;margin:0 0 6px 4px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:#090e19;border-radius:14px;padding:13px 14px;outline:none}.field input:focus,.field textarea:focus{border-color:var(--accent)}
    .primary{width:100%;padding:14px;border-radius:15px;background:linear-gradient(135deg,var(--accent),#526dff);font-weight:800;box-shadow:0 12px 30px #675cff35}.primary:disabled{opacity:.45}.soft{background:var(--card2);border:1px solid var(--line);padding:10px 14px;border-radius:13px}.danger{color:#ff91a8;background:#351522;border:1px solid #64243a}
    .topbar{padding:max(12px,env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;gap:10px;background:#0b1120e8;border-bottom:1px solid #1b2740;backdrop-filter:blur(18px);z-index:3}.topbar h1{font-size:20px;margin:0}.icon-btn{width:42px;height:42px;border-radius:14px;background:var(--card2);display:grid;place-items:center;font-size:18px}.mini-avatar,.avatar{border-radius:50%;object-fit:cover;background:linear-gradient(135deg,#694bff,#20c9ff);display:grid;place-items:center;font-weight:900;flex:none}.mini-avatar{width:44px;height:44px}.avatar{width:76px;height:76px;font-size:26px}.avatar img,.mini-avatar img{width:100%;height:100%;border-radius:inherit;object-fit:cover}
    .content{flex:1;min-height:0;overflow:auto;padding:12px 12px calc(88px + env(safe-area-inset-bottom));scrollbar-width:none}.content::-webkit-scrollbar,.messages::-webkit-scrollbar{display:none}
    .search{display:flex;gap:8px;margin-bottom:12px}.search input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px 14px;outline:none}
    .list{display:flex;flex-direction:column;gap:8px}.row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid #1b2840;border-radius:18px}.row:active{transform:scale(.99)}.row-main{min-width:0;flex:1}.row-title{font-weight:780;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row-sub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.time{font-size:11px;color:var(--muted)}.dot{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 12px var(--ok)}
    .nav{position:absolute;bottom:0;left:0;right:0;padding:8px 10px max(8px,env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,1fr);background:#0c1221ed;border-top:1px solid #1f2a42;backdrop-filter:blur(18px);z-index:4}.nav button{background:transparent;color:var(--muted);padding:7px;border-radius:13px;font-size:12px}.nav button b{display:block;font-size:20px}.nav .on{color:white;background:#202a43}
    .profile-head{text-align:center;padding:18px;background:var(--card);border:1px solid var(--line);border-radius:24px}.profile-head .avatar{margin:auto}.profile-head h2{margin:10px 0 2px}.profile-head p{margin:4px;color:var(--muted)}
    .section{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}.section-title{padding:13px 15px 5px;color:#9c8cff;font-size:12px;font-weight:800;text-transform:uppercase}.setting{display:flex;align-items:center;gap:12px;padding:13px 15px;border-top:1px solid #1b2840}.setting:first-of-type{border:0}.setting select{margin-left:auto;max-width:145px;background:#0a101d;border:1px solid var(--line);padding:8px;border-radius:10px}.setting input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent)}
    .chat{z-index:8;background:var(--bg)}.chat-head{padding-top:max(8px,env(safe-area-inset-top))}.peer-name{font-weight:800}.peer-status{font-size:12px;color:var(--muted)}
    .messages{flex:1;min-height:0;overflow:auto;padding:14px 12px;background:radial-gradient(circle at 15% 20%,#261e4a33,transparent 26%),radial-gradient(circle at 90% 70%,#063d5133,transparent 28%)}
    .bubble-wrap{display:flex;margin:5px 0}.bubble-wrap.mine{justify-content:flex-end}.bubble{max-width:82%;padding:9px 11px;border-radius:18px 18px 18px 5px;background:#172239;border:1px solid #263656;box-shadow:0 5px 18px #0002;overflow:hidden}.mine .bubble{background:linear-gradient(135deg,#6047d8,#405cd3);border-color:#765ff0;border-radius:18px 18px 5px 18px}.bubble .meta{text-align:right;font-size:10px;color:#c7cce0b8;margin-top:4px}.bubble img,.bubble video{display:block;max-width:100%;max-height:380px;border-radius:12px}.bubble audio{width:245px;max-width:100%}.decrypt-error{color:#ffb0c0;font-size:12px}
    .composer{padding:8px 9px max(8px,env(safe-area-inset-bottom));display:flex;align-items:flex-end;gap:7px;background:#0d1424;border-top:1px solid #1c2942}.composer textarea{flex:1;resize:none;max-height:110px;min-height:44px;border-radius:17px;background:#111b2d;border:1px solid var(--line);padding:11px 13px;outline:none}.send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:19px}.attach{width:42px;height:42px;background:transparent;font-size:21px}.recording{background:#641f39!important;animation:pulse 1s infinite}@keyframes pulse{50%{transform:scale(.9)}}
    .modal{position:absolute;inset:0;z-index:20;background:#000a;display:flex;align-items:flex-end;backdrop-filter:blur(5px)}.sheet{width:100%;max-height:92%;overflow:auto;background:#111827;border:1px solid #2a3855;border-radius:28px 28px 0 0;padding:20px 18px max(24px,env(safe-area-inset-bottom));box-shadow:var(--shadow)}.sheet h2{margin:0 0 14px}.sheet-actions{display:flex;gap:10px;margin-top:14px}.sheet-actions button{flex:1}
    .toast{position:absolute;z-index:50;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));transform:translateX(-50%);max-width:90%;padding:11px 15px;border-radius:14px;background:#202b43;border:1px solid #3c4b6d;box-shadow:var(--shadow);text-align:center}.loader{width:24px;height:24px;border:3px solid #ffffff33;border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:auto}@keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;color:var(--muted);padding:50px 20px}.badge{background:var(--danger);min-width:20px;height:20px;border-radius:10px;padding:2px 6px;font-size:11px;text-align:center}
    @media(min-width:700px){body:before{content:"MEOW оптимизирован для телефона";position:fixed;top:12px;color:#77849e;font-size:12px}#app{margin-top:35px;height:calc(100dvh - 35px);border-radius:24px 24px 0 0;border:1px solid #26324b}}
  </style>
</head>
<body>
<div id="app">
  <section id="authScreen" class="screen auth">
    <div class="brand"><div class="brand-badge">M</div> MEOW</div>
    <div class="muted" style="margin-bottom:18px">Приватное общение без лишнего шума.</div>
    <div class="auth-card">
      <div class="auth-tabs"><button id="loginTab" class="on">Вход</button><button id="registerTab">Регистрация</button></div>
      <form id="authForm">
        <label id="nameField" class="field hidden"><span>Имя</span><input id="authName" maxlength="40" autocomplete="name" placeholder="Как вас называть"></label>
        <label id="usernameField" class="field hidden"><span>Уникальный юзернейм</span><input id="authUsername" maxlength="24" autocapitalize="none" placeholder="username"></label>
        <label class="field"><span>Почта</span><input id="authEmail" type="email" autocomplete="email" required placeholder="you@example.com"></label>
        <label class="field"><span>Пароль</span><input id="authPassword" type="password" minlength="8" autocomplete="current-password" required placeholder="Минимум 8 символов"></label>
        <button id="authSubmit" class="primary" type="submit">Войти</button>
      </form>
      <button id="resetPassword" style="width:100%;background:transparent;color:var(--muted);margin-top:12px">Забыли пароль?</button>
    </div>
  </section>

  <section id="mainScreen" class="screen hidden">
    <header class="topbar"><div class="brand" style="font-size:20px;margin:0"><div class="brand-badge" style="width:38px;height:38px;border-radius:12px;font-size:15px">M</div><span id="pageTitle">Чаты</span></div><div class="grow"></div><button id="newChatBtn" class="icon-btn">＋</button></header>
    <main id="chatsPage" class="content"><div id="chatsList" class="list"></div></main>
    <main id="contactsPage" class="content hidden"><div class="search"><input id="userSearch" placeholder="Поиск по @username" autocapitalize="none"><button id="searchBtn" class="icon-btn">⌕</button></div><div id="searchResult"></div><h3>Контакты</h3><div id="contactsList" class="list"></div></main>
    <main id="settingsPage" class="content hidden">
      <div class="profile-head"><div id="myAvatar" class="avatar">M</div><h2 id="myName">MEOW</h2><p id="myUsername">@username</p><p id="myBio"></p><button id="editProfileBtn" class="soft">Изменить профиль</button></div>
      <div class="section"><div class="section-title">Конфиденциальность</div><label class="setting"><span>Кто видит время входа</span><select id="privacyLast"><option value="everyone">Все</option><option value="contacts">Контакты</option><option value="nobody">Никто</option></select></label><label class="setting"><span>Кто может писать</span><select id="privacyWrite"><option value="everyone">Все</option><option value="contacts">Контакты</option><option value="nobody">Никто</option></select></label><label class="setting"><span>Уведомления</span><input id="notificationsToggle" type="checkbox"></label></div>
      <div class="section"><div class="section-title">Безопасность</div><div class="setting"><span class="grow">Сквозное шифрование</span><b style="color:var(--ok)">Включено</b></div><div class="setting"><span class="grow">Ключ устройства</span><small id="keyIdLabel" class="muted">—</small></div><div class="setting"><button id="rotateKeyBtn" class="soft grow">Принудительно обновить ключ</button></div></div>
      <div class="section"><div class="setting"><button id="logoutBtn" class="soft danger grow">Выйти</button></div></div>
    </main>
    <nav class="nav"><button data-page="chats" class="on"><b>◉</b>Чаты</button><button data-page="contacts"><b>♟</b>Контакты</button><button data-page="settings"><b>⚙</b>Настройки</button></nav>
  </section>

  <section id="chatScreen" class="screen chat hidden">
    <header class="topbar chat-head"><button id="backBtn" class="icon-btn">‹</button><div id="peerAvatar" class="mini-avatar">?</div><div class="row-main"><div id="peerName" class="peer-name">Пользователь</div><div id="peerStatus" class="peer-status">не в сети</div></div><button id="peerInfoBtn" class="icon-btn">⋮</button></header>
    <div id="messages" class="messages"></div>
    <div class="composer"><button id="attachBtn" class="attach">＋</button><input id="mediaInput" class="hidden" type="file" accept="image/*,video/*"><textarea id="messageInput" rows="1" placeholder="Сообщение"></textarea><button id="voiceBtn" class="attach">🎙</button><button id="sendBtn" class="send">➤</button></div>
  </section>

  <div id="profileModal" class="modal hidden"><div class="sheet"><h2>Профиль</h2><label class="field"><span>Аватар</span><input id="profileAvatar" type="file" accept="image/*"></label><label class="field"><span>Имя</span><input id="profileName" maxlength="40"></label><label class="field"><span>Описание</span><textarea id="profileBio" maxlength="160" rows="3"></textarea></label><div class="sheet-actions"><button class="soft modalClose">Отмена</button><button id="saveProfileBtn" class="primary">Сохранить</button></div></div></div>
  <div id="peerModal" class="modal hidden"><div class="sheet"><div id="peerModalBody"></div><div class="sheet-actions"><button class="soft modalClose">Закрыть</button><button id="addContactBtn" class="primary">Добавить контакт</button></div></div></div>
  <div id="toast" class="toast hidden"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script>
'use strict';
/*
  MEOW single-file client.
  ВАЖНО: правила Firebase из ответа должны быть установлены отдельно в Firebase Console.
  E2EE: ECDH P-256 + HKDF-SHA-256 + AES-GCM. Закрытый ключ хранится в IndexedDB,
  а его резервная копия — в RTDB, зашифрованная паролем через PBKDF2/AES-GCM.
  Общий ключ профилей ниже является только обфускацией: он виден любому посетителю сайта.
*/
const firebaseConfig={apiKey:"AIzaSyBm0mIvHVznIeF2PoFk6dtdaiT5r877wyA",authDomain:"meow-874ce.firebaseapp.com",databaseURL:"https://meow-874ce-default-rtdb.europe-west1.firebasedatabase.app",projectId:"meow-874ce",storageBucket:"meow-874ce.firebasestorage.app",messagingSenderId:"471541334599",appId:"1:471541334599:web:567af3e7dbe70a37572762"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.database(), storage=firebase.storage();
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const te=new TextEncoder(), td=new TextDecoder();
const state={user:null,me:null,identity:null,contacts:{},profiles:{},activePeer:null,chatId:null,msgRef:null,msgCb:null,chatListRef:null,contactsRef:null,recorder:null,chunks:[],registerMode:false,passwordCache:null,objectUrls:[]};
const PROFILE_SECRET='MEOW_PROFILE_AES_V1_PUBLIC_OBFUSCATION_KEY_2026';
const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b)));
const unb64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const now=()=>firebase.database.ServerValue.TIMESTAMP;
function toast(text,ms=2800){const e=$('#toast');e.textContent=text;e.classList.remove('hidden');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.add('hidden'),ms)}
function setBusy(btn,busy,label){if(!btn)return; if(busy){btn.dataset.old=btn.textContent;btn.disabled=true;btn.innerHTML='<span class="loader" style="width:18px;height:18px"></span>'}else{btn.disabled=false;btn.textContent=label||btn.dataset.old||'Готово'}}
function uidPair(a,b){return [a,b].sort().join('_')}
function formatTime(ts){if(!ts)return '';const d=new Date(ts);return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}
function formatSeen(ts){if(!ts)return 'давно';const d=new Date(ts),today=new Date();if(d.toDateString()===today.toDateString())return 'был(а) сегодня в '+formatTime(ts);return 'был(а) '+d.toLocaleDateString('ru',{day:'numeric',month:'short'})+' в '+formatTime(ts)}
function initials(p){return (p?.name||p?.username||'?').trim().slice(0,1).toUpperCase()}
async function sha(data){return crypto.subtle.digest('SHA-256',typeof data==='string'?te.encode(data):data)}
async function profileKey(){return crypto.subtle.importKey('raw',await sha(PROFILE_SECRET),{name:'AES-GCM'},false,['encrypt','decrypt'])}
async function profileEncrypt(data){const iv=crypto.getRandomValues(new Uint8Array(12)),key=await profileKey(),plain=data instanceof Blob?await data.arrayBuffer():te.encode(String(data));const out=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,plain);return{iv:b64(iv),data:out}}
async function profileDecryptText(obj){if(!obj)return '';try{const out=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(obj.iv)},await profileKey(),unb64(obj.data));return td.decode(out)}catch{return ''}}
function openIDB(){return new Promise((res,rej)=>{const r=indexedDB.open('meow-secure',1);r.onupgradeneeded=()=>r.result.createObjectStore('keys');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function idbGet(k){const d=await openIDB();return new Promise((res,rej)=>{const r=d.transaction('keys').objectStore('keys').get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function idbSet(k,v){const d=await openIDB();return new Promise((res,rej)=>{const r=d.transaction('keys','readwrite').objectStore('keys').put(v,k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
async function passwordKey(password,salt,uses){const base=await crypto.subtle.importKey('raw',te.encode(password),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:310000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,uses)}
async function backupIdentity(pair,keyId,password){if(!password)return;const jwk=await crypto.subtle.exportKey('jwk',pair.privateKey),salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),k=await passwordKey(password,salt,['encrypt']),cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,te.encode(JSON.stringify(jwk)));await db.ref('privateKeyBackups/'+state.user.uid).set({keyId,salt:b64(salt),iv:b64(iv),cipher:b64(cipher),updatedAt:now()})}
async function restoreIdentity(password){if(!password)return null;const snap=await db.ref('privateKeyBackups/'+state.user.uid).once('value'),x=snap.val();if(!x)return null;try{const k=await passwordKey(password,unb64(x.salt),['decrypt']),raw=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(x.iv)},k,unb64(x.cipher)),jwk=JSON.parse(td.decode(raw)),priv=await crypto.subtle.importKey('jwk',jwk,{name:'ECDH',namedCurve:'P-256'},true,['deriveBits']);const pubSnap=await db.ref(`users/${state.user.uid}/keys/${x.keyId}`).once('value');if(!pubSnap.exists())return null;const pub=await crypto.subtle.importKey('jwk',pubSnap.val().jwk,{name:'ECDH',namedCurve:'P-256'},true,[]);return{keyId:x.keyId,privateKey:priv,publicKey:pub}}catch(e){console.warn('Key backup restore failed',e);return null}}
async function createIdentity(password,force=false){const pair=await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveBits']),jwk=await crypto.subtle.exportKey('jwk',pair.publicKey),keyId=(await sha(JSON.stringify(jwk))).slice(0,8);const kid=[...new Uint8Array(keyId)].map(x=>x.toString(16).padStart(2,'0')).join('');const identity={keyId:kid,privateKey:pair.privateKey,publicKey:pair.publicKey};await idbSet('identity:'+state.user.uid,identity);await db.ref(`users/${state.user.uid}/keys/${kid}`).set({jwk,createdAt:now()});await db.ref(`users/${state.user.uid}/currentKey`).set(kid);if(password)await backupIdentity(pair,kid,password);state.identity=identity;return identity}
async function ensureIdentity(password){let x=await idbGet('identity:'+state.user.uid);if(!x)x=await restoreIdentity(password);if(x){await idbSet('identity:'+state.user.uid,x);state.identity=x;await db.ref(`users/${state.user.uid}/currentKey`).set(x.keyId);return x}return createIdentity(password)}
async function getPublic(uid,keyId){const s=await db.ref(`users/${uid}/keys/${keyId}`).once('value');if(!s.exists())throw new Error('Публичный ключ недоступен');return crypto.subtle.importKey('jwk',s.val().jwk,{name:'ECDH',namedCurve:'P-256'},false,[])}
async function deriveChatKey(messageLike){const me=state.user.uid,isSender=messageLike.sender===me,myKeyId=isSender?messageLike.senderKey:messageLike.recipientKey,peerKeyId=isSender?messageLike.recipientKey:messageLike.senderKey;if(myKeyId!==state.identity.keyId){const old=await idbGet('identity:'+me+':'+myKeyId);if(!old)throw new Error('На устройстве нет старого ключа');state.identity=old}
  const peer=await getPublic(isSender?messageLike.recipient:messageLike.sender,peerKeyId),bits=await crypto.subtle.deriveBits({name:'ECDH',public:peer},state.identity.privateKey,256),base=await crypto.subtle.importKey('raw',bits,'HKDF',false,['deriveKey']),salt=await sha('MEOW|'+uidPair(messageLike.sender,messageLike.recipient)),info=te.encode('message-v1|'+messageLike.senderKey+'|'+messageLike.recipientKey);return crypto.subtle.deriveKey({name:'HKDF',hash:'SHA-256',salt,info},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}
async function encryptPayload(peerUid,kind,data){const ps=await db.ref(`users/${peerUid}/currentKey`).once('value'),recipientKey=ps.val();if(!recipientKey)throw new Error('У собеседника ещё нет ключа');const meta={sender:state.user.uid,recipient:peerUid,senderKey:state.identity.keyId,recipientKey},key=await deriveChatKey(meta),iv=crypto.getRandomValues(new Uint8Array(12)),raw=data instanceof ArrayBuffer?data:te.encode(String(data)),cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv,additionalData:te.encode(kind)},key,raw);return{...meta,kind,iv:b64(iv),cipher:b64(cipher)}}
async function decryptPayload(m){const key=await deriveChatKey(m),raw=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(m.iv),additionalData:te.encode(m.kind)},key,unb64(m.cipher));return raw}
async function loadProfile(uid,force=false){if(state.profiles[uid]&&!force)return state.profiles[uid];const s=await db.ref('users/'+uid).once('value'),x=s.val()||{};x.uid=uid;x.bio=await profileDecryptText(x.bioEnc);state.profiles[uid]=x;if(x.avatar?.url&&!x.avatarObject){try{const r=await fetch(x.avatar.url),buf=await r.arrayBuffer(),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(x.avatar.iv)},await profileKey(),buf),url=URL.createObjectURL(new Blob([plain],{type:x.avatar.mime||'image/jpeg'}));x.avatarObject=url;state.objectUrls.push(url)}catch(e){console.warn('avatar',e)}}return x}
function avatarHTML(p,cls='mini-avatar'){return `<div class="${cls}">${p?.avatarObject?`<img src="${p.avatarObject}" alt="">`:esc(initials(p))}</div>`}

$('#loginTab').onclick=()=>setAuthMode(false);$('#registerTab').onclick=()=>setAuthMode(true);
function setAuthMode(reg){state.registerMode=reg;$('#loginTab').classList.toggle('on',!reg);$('#registerTab').classList.toggle('on',reg);$('#nameField').classList.toggle('hidden',!reg);$('#usernameField').classList.toggle('hidden',!reg);$('#authSubmit').textContent=reg?'Создать аккаунт':'Войти';$('#authPassword').autocomplete=reg?'new-password':'current-password'}
$('#authForm').onsubmit=async e=>{e.preventDefault();const btn=$('#authSubmit'),email=$('#authEmail').value.trim(),password=$('#authPassword').value;setBusy(btn,true);state.passwordCache=password;try{if(state.registerMode){const username=$('#authUsername').value.trim().toLowerCase().replace(/^@/,'');if(!/^[a-z0-9_]{4,24}$/.test(username))throw new Error('Юзернейм: 4–24 символа, латиница, цифры и _');const cred=await auth.createUserWithEmailAndPassword(email,password);state.user=cred.user;const ref=db.ref('usernames/'+username),tx=await ref.transaction(v=>v===null?cred.user.uid:undefined);if(!tx.committed){await cred.user.delete();throw new Error('Этот юзернейм уже занят')}await db.ref('users/'+cred.user.uid).set({username,name:$('#authName').value.trim()||username,bioEnc:null,createdAt:now(),privacy:{lastSeen:'everyone',write:'everyone'}});await ensureIdentity(password);cred.user.sendEmailVerification().catch(()=>{});toast('Аккаунт создан. Проверьте почту ✨')}else{await auth.signInWithEmailAndPassword(email,password)}}catch(err){toast(errorText(err),4500)}finally{setBusy(btn,false,state.registerMode?'Создать аккаунт':'Войти')}};
$('#resetPassword').onclick=async()=>{const email=$('#authEmail').value.trim();if(!email)return toast('Сначала укажите почту');try{await auth.sendPasswordResetEmail(email);toast('Письмо для сброса отправлено')}catch(e){toast(errorText(e))}};
function errorText(e){const map={'auth/invalid-credential':'Неверная почта или пароль','auth/email-already-in-use':'Эта почта уже используется','auth/weak-password':'Слишком слабый пароль','auth/too-many-requests':'Слишком много попыток. Попробуйте позже','auth/network-request-failed':'Ошибка сети'};return map[e.code]||e.message||'Произошла ошибка'}

auth.onAuthStateChanged(async user=>{if(!user){state.user=null;$('#authScreen').classList.remove('hidden');$('#mainScreen').classList.add('hidden');$('#chatScreen').classList.add('hidden');return}state.user=user;try{await ensureIdentity(state.passwordCache);await startApp()}catch(e){console.error(e);toast('Ошибка запуска: '+e.message,5000)}});
async function startApp(){state.me=await loadProfile(state.user.uid,true);if(!state.me.username){toast('Профиль аккаунта не найден');return}$('#authScreen').classList.add('hidden');$('#mainScreen').classList.remove('hidden');renderMe();setupPresence();listenContacts();listenChats();$('#keyIdLabel').textContent=state.identity.keyId.slice(0,12);state.passwordCache=null}
function setupPresence(){const uid=state.user.uid,conn=db.ref('.info/connected'),status=db.ref('status/'+uid);conn.on('value',s=>{if(s.val()===true){status.onDisconnect().set({online:false,lastSeen:now()});status.set({online:true,lastSeen:now()})}});document.addEventListener('visibilitychange',()=>{if(state.user)status.update({online:!document.hidden,lastSeen:now()})})}
function listenContacts(){state.contactsRef?.off();state.contactsRef=db.ref('contacts/'+state.user.uid);state.contactsRef.on('value',async s=>{state.contacts=s.val()||{};await renderContacts()})}
async function renderContacts(){const box=$('#contactsList'),ids=Object.keys(state.contacts);if(!ids.length){box.innerHTML='<div class="empty">Контактов пока нет.<br>Найдите друга по юзернейму.</div>';return}const ps=await Promise.all(ids.map(id=>loadProfile(id)));box.innerHTML=ps.map(p=>`<div class="row contact-row" data-uid="${p.uid}">${avatarHTML(p)}<div class="row-main"><div class="row-title">${esc(p.name)}</div><div class="row-sub">@${esc(p.username)}</div></div><button class="soft">Написать</button></div>`).join('');$$('.contact-row').forEach(x=>x.onclick=()=>openChat(x.dataset.uid))}
function listenChats(){state.chatListRef?.off();state.chatListRef=db.ref('userChats/'+state.user.uid).orderByChild('updatedAt');state.chatListRef.on('value',async s=>{const raw=s.val()||{},items=Object.entries(raw).map(([id,v])=>({id,...v})).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));const box=$('#chatsList');if(!items.length){box.innerHTML='<div class="empty">Здесь появятся ваши защищённые чаты 🔒</div>';return}const rows=[];for(const x of items){const p=await loadProfile(x.peer);rows.push(`<div class="row chat-row" data-uid="${p.uid}">${avatarHTML(p)}<div class="row-main"><div class="row-title">${esc(p.name||p.username)}</div><div class="row-sub">${x.lastKind==='text'?'🔒 Зашифрованное сообщение':x.lastKind?'🔒 Вложение':'Новый чат'}</div></div><div><div class="time">${formatTime(x.updatedAt)}</div>${x.unread?`<div class="badge">${Math.min(x.unread,99)}</div>`:''}</div></div>`)}box.innerHTML=rows.join('');$$('.chat-row').forEach(x=>x.onclick=()=>openChat(x.dataset.uid))})}

$$('.nav button').forEach(b=>b.onclick=()=>showPage(b.dataset.page));function showPage(p){$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page===p));['chats','contacts','settings'].forEach(x=>$('#'+x+'Page').classList.toggle('hidden',x!==p));$('#pageTitle').textContent={chats:'Чаты',contacts:'Контакты',settings:'Настройки'}[p];$('#newChatBtn').classList.toggle('hidden',p==='settings')}
$('#newChatBtn').onclick=()=>showPage('contacts');
$('#searchBtn').onclick=searchUser;$('#userSearch').onkeydown=e=>{if(e.key==='Enter')searchUser()};
async function searchUser(){const u=$('#userSearch').value.trim().toLowerCase().replace(/^@/,'');if(!u)return;const s=await db.ref('usernames/'+u).once('value'),uid=s.val(),box=$('#searchResult');if(!uid){box.innerHTML='<div class="empty">Пользователь не найден</div>';return}if(uid===state.user.uid){box.innerHTML='<div class="empty">Это вы 😊</div>';return}const p=await loadProfile(uid,true);box.innerHTML=`<div class="row search-user" data-uid="${uid}">${avatarHTML(p)}<div class="row-main"><div class="row-title">${esc(p.name)}</div><div class="row-sub">@${esc(p.username)}</div></div><button class="soft">Открыть</button></div>`;$('.search-user').onclick=()=>showPeer(uid)}
async function showPeer(uid){const p=await loadProfile(uid,true);state.activePeer=p;$('#peerModalBody').innerHTML=`<div class="profile-head">${avatarHTML(p,'avatar')}<h2>${esc(p.name)}</h2><p>@${esc(p.username)}</p><p>${esc(p.bio||'')}</p></div>`;$('#addContactBtn').textContent=state.contacts[uid]?'Написать':'Добавить контакт';$('#peerModal').classList.remove('hidden')}
$('#addContactBtn').onclick=async()=>{const p=state.activePeer;if(!p)return;if(!state.contacts[p.uid])await db.ref(`contacts/${state.user.uid}/${p.uid}`).set({addedAt:now()});$('#peerModal').classList.add('hidden');openChat(p.uid)};
$$('.modalClose').forEach(x=>x.onclick=()=>x.closest('.modal').classList.add('hidden'));$$('.modal').forEach(x=>x.onclick=e=>{if(e.target===x)x.classList.add('hidden')});

async function canWrite(peer){const p=await loadProfile(peer,true),mode=p.privacy?.write||'everyone';if(mode==='everyone')return true;if(mode==='nobody')return false;const s=await db.ref(`contacts/${peer}/${state.user.uid}`).once('value');return s.exists()}
async function openChat(uid){const p=await loadProfile(uid,true);state.activePeer=p;state.chatId=uidPair(state.user.uid,uid);$('#peerName').textContent=p.name||p.username;$('#peerAvatar').innerHTML=p.avatarObject?`<img src="${p.avatarObject}" alt="">`:esc(initials(p));$('#mainScreen').classList.add('hidden');$('#chatScreen').classList.remove('hidden');$('#messages').innerHTML='<div class="empty">Загрузка защищённого чата…</div>';localStorage.setItem('meow:lastChat',uid);listenPeerStatus(uid);listenMessages();db.ref(`userChats/${state.user.uid}/${state.chatId}/unread`).set(0);$('#messageInput').value=localStorage.getItem('draft:'+state.chatId)||''}
$('#backBtn').onclick=closeChat;function closeChat(){if(state.msgRef&&state.msgCb)state.msgRef.off('value',state.msgCb);if(state.peerStatusRef)state.peerStatusRef.off();$('#chatScreen').classList.add('hidden');$('#mainScreen').classList.remove('hidden');state.activePeer=null;state.chatId=null}
function listenPeerStatus(uid){state.peerStatusRef?.off();state.peerStatusRef=db.ref('status/'+uid);state.peerStatusRef.on('value',async s=>{const x=s.val()||{},p=await loadProfile(uid,true),mode=p.privacy?.lastSeen||'everyone';let allowed=mode==='everyone';if(mode==='contacts'){const c=await db.ref(`contacts/${uid}/${state.user.uid}`).once('value');allowed=c.exists()}$('#peerStatus').textContent=allowed?(x.online?'в сети':formatSeen(x.lastSeen)):'время входа скрыто'})}
function listenMessages(){state.msgRef=db.ref('messages/'+state.chatId).limitToLast(100);state.msgCb=async s=>{const vals=s.val()||{},arr=Object.entries(vals).map(([id,v])=>({id,...v})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));await renderMessages(arr)};state.msgRef.on('value',state.msgCb)}
async function renderMessages(arr){const box=$('#messages');if(!arr.length){box.innerHTML='<div class="empty">Начните диалог.<br>Ключи шифрования согласуются автоматически 🔐</div>';return}const html=[];for(const m of arr){let body='';try{const raw=await decryptPayload(m);if(m.kind==='text')body=`<div>${esc(td.decode(raw)).replace(/\n/g,'<br>')}</div>`;else{const meta=JSON.parse(td.decode(raw)),r=await fetch(meta.url),enc=await r.arrayBuffer(),fileRaw=await decryptAttachment(enc,meta.fileIv,m),url=URL.createObjectURL(new Blob([fileRaw],{type:meta.mime}));state.objectUrls.push(url);if(m.kind==='image')body=`<img src="${url}" alt="Фото">`;else if(m.kind==='video')body=`<video src="${url}" controls playsinline></video>`;else if(m.kind==='voice')body=`<audio src="${url}" controls></audio>`;else body=`<a href="${url}" download="${esc(meta.name||'file')}">Скачать файл</a>`}}catch(e){console.warn('decrypt',m.id,e);body='<div class="decrypt-error">⚠ Не удалось расшифровать. Нужен исходный ключ устройства.</div>'}html.push(`<div class="bubble-wrap ${m.sender===state.user.uid?'mine':''}"><div class="bubble">${body}<div class="meta">${formatTime(m.createdAt)} · 🔒</div></div></div>`)}box.innerHTML=html.join('');requestAnimationFrame(()=>box.scrollTop=box.scrollHeight)}
async function encryptAttachment(raw,messageMeta){const key=await deriveChatKey(messageMeta),iv=crypto.getRandomValues(new Uint8Array(12)),cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv,additionalData:te.encode('attachment-v1')},key,raw);return{cipher,iv:b64(iv)}}
async function decryptAttachment(raw,iv,m){const key=await deriveChatKey(m);return crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(iv),additionalData:te.encode('attachment-v1')},key,raw)}
async function writeMessage(payload){const ref=db.ref('messages/'+state.chatId).push(),ts=Date.now();payload.createdAt=now();await ref.set(payload);const base={updatedAt:ts,lastKind:payload.kind};const updates={};updates[`userChats/${state.user.uid}/${state.chatId}`]={peer:state.activePeer.uid,...base,unread:0};updates[`userChats/${state.activePeer.uid}/${state.chatId}/peer`]=state.user.uid;updates[`userChats/${state.activePeer.uid}/${state.chatId}/updatedAt`]=ts;updates[`userChats/${state.activePeer.uid}/${state.chatId}/lastKind`]=payload.kind;await db.ref().update(updates);await db.ref(`userChats/${state.activePeer.uid}/${state.chatId}/unread`).transaction(v=>(v||0)+1)}
async function sendText(){const input=$('#messageInput'),text=input.value.trim();if(!text||!state.activePeer)return;const btn=$('#sendBtn');setBusy(btn,true);try{if(!await canWrite(state.activePeer.uid))throw new Error('Пользователь ограничил входящие сообщения');const p=await encryptPayload(state.activePeer.uid,'text',text);await writeMessage(p);input.value='';localStorage.removeItem('draft:'+state.chatId)}catch(e){toast(e.message,4000)}finally{setBusy(btn,false,'➤')}}
$('#sendBtn').onclick=sendText;$('#messageInput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText()}};$('#messageInput').oninput=e=>{if(state.chatId)localStorage.setItem('draft:'+state.chatId,e.target.value);e.target.style.height='44px';e.target.style.height=Math.min(e.target.scrollHeight,110)+'px'};
$('#attachBtn').onclick=()=>$('#mediaInput').click();$('#mediaInput').onchange=async e=>{const f=e.target.files[0];e.target.value='';if(!f)return;if(f.size>25*1024*1024)return toast('Максимальный размер — 25 МБ');let kind=f.type.startsWith('image/')?'image':f.type.startsWith('video/')?'video':'file';await sendFile(f,kind)};
async function sendFile(file,kind){toast('Шифрование и загрузка…',60000);try{if(!await canWrite(state.activePeer.uid))throw new Error('Пользователь ограничил входящие сообщения');const ps=await db.ref(`users/${state.activePeer.uid}/currentKey`).once('value'),meta={sender:state.user.uid,recipient:state.activePeer.uid,senderKey:state.identity.keyId,recipientKey:ps.val()};if(!meta.recipientKey)throw new Error('Нет ключа получателя');const enc=await encryptAttachment(await file.arrayBuffer(),meta),path=`encrypted/${state.chatId}/${Date.now()}_${crypto.randomUUID()}.bin`,snap=await storage.ref(path).put(new Blob([enc.cipher],{type:'application/octet-stream'})),url=await snap.ref.getDownloadURL(),descriptor=JSON.stringify({url,path,fileIv:enc.iv,mime:file.type||'application/octet-stream',name:file.name||kind,size:file.size}),payload=await encryptPayload(state.activePeer.uid,kind,descriptor);await writeMessage(payload);toast('Отправлено')}catch(e){toast('Ошибка: '+e.message,5000)}}
$('#voiceBtn').onclick=toggleVoice;async function toggleVoice(){if(state.recorder&&state.recorder.state==='recording'){state.recorder.stop();return}try{const stream=await navigator.mediaDevices.getUserMedia({audio:true}),types=['audio/webm;codecs=opus','audio/mp4','audio/webm'],mime=types.find(MediaRecorder.isTypeSupported)||'';state.chunks=[];state.recorder=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);state.recorder.ondataavailable=e=>e.data.size&&state.chunks.push(e.data);state.recorder.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());$('#voiceBtn').classList.remove('recording');$('#voiceBtn').textContent='🎙';const blob=new Blob(state.chunks,{type:state.recorder.mimeType||'audio/webm'});if(blob.size>1000)await sendFile(new File([blob],'voice.'+(blob.type.includes('mp4')?'m4a':'webm'),{type:blob.type}),'voice')};state.recorder.start(250);$('#voiceBtn').classList.add('recording');$('#voiceBtn').textContent='■';toast('Идёт запись. Нажмите ещё раз для отправки.',3500)}catch(e){toast('Нет доступа к микрофону')}}
$('#peerInfoBtn').onclick=()=>state.activePeer&&showPeer(state.activePeer.uid);

function renderMe(){const p=state.me;$('#myName').textContent=p.name||p.username;$('#myUsername').textContent='@'+p.username;$('#myBio').textContent=p.bio||'';$('#myAvatar').innerHTML=p.avatarObject?`<img src="${p.avatarObject}" alt="">`:esc(initials(p));$('#privacyLast').value=p.privacy?.lastSeen||'everyone';$('#privacyWrite').value=p.privacy?.write||'everyone'}
$('#editProfileBtn').onclick=()=>{$('#profileName').value=state.me.name||'';$('#profileBio').value=state.me.bio||'';$('#profileModal').classList.remove('hidden')};
$('#saveProfileBtn').onclick=async()=>{const btn=$('#saveProfileBtn');setBusy(btn,true);try{const name=$('#profileName').value.trim();if(!name)throw new Error('Укажите имя');const bio=$('#profileBio').value.trim(),bioX=await profileEncrypt(bio),updates={name,bioEnc:{iv:bioX.iv,data:b64(bioX.data)}};const f=$('#profileAvatar').files[0];if(f){if(f.size>5*1024*1024)throw new Error('Аватар не больше 5 МБ');const x=await profileEncrypt(f),path=`profiles/${state.user.uid}/avatar_${Date.now()}.bin`,snap=await storage.ref(path).put(new Blob([x.data],{type:'application/octet-stream'})),url=await snap.ref.getDownloadURL();updates.avatar={url,path,iv:x.iv,mime:f.type}}await db.ref('users/'+state.user.uid).update(updates);state.me=await loadProfile(state.user.uid,true);renderMe();$('#profileModal').classList.add('hidden');toast('Профиль обновлён')}catch(e){toast(e.message)}finally{setBusy(btn,false,'Сохранить')}};
$('#privacyLast').onchange=e=>db.ref(`users/${state.user.uid}/privacy/lastSeen`).set(e.target.value);$('#privacyWrite').onchange=e=>db.ref(`users/${state.user.uid}/privacy/write`).set(e.target.value);
$('#notificationsToggle').onchange=async e=>{if(e.target.checked){if(!('Notification'in window)){e.target.checked=false;return toast('Уведомления не поддерживаются')}const p=await Notification.requestPermission();if(p!=='granted'){e.target.checked=false;toast('Разрешение не выдано')}}localStorage.setItem('meow:notifications',e.target.checked?'1':'0')};$('#notificationsToggle').checked=localStorage.getItem('meow:notifications')==='1';
$('#rotateKeyBtn').onclick=async()=>{if(!confirm('Обновить ключ? Старые сообщения сохранят старый ключ. Без его локальной копии они могут стать недоступны.'))return;const old=state.identity;await idbSet('identity:'+state.user.uid+':'+old.keyId,old);try{await createIdentity(null,true);$('#keyIdLabel').textContent=state.identity.keyId.slice(0,12);toast('Новый ключ опубликован. Для резервной копии выйдите и войдите с паролем.',5000)}catch(e){state.identity=old;toast(e.message)}};
