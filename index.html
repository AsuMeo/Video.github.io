<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>⛏️ MINECRAFT RTX</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    
    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed;
      touch-action: none;
      font-family: 'Arial', sans-serif;
    }
    
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 10;
    }
    
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
    }
    
    #crosshair::before {
      width: 3px;
      height: 40px;
      left: 18px;
      top: 0;
    }
    
    #crosshair::after {
      width: 40px;
      height: 3px;
      left: 0;
      top: 18px;
    }
    
    #hotbar {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border: 3px solid #555;
      border-radius: 10px;
      z-index: 20;
    }
    
    .hotbar-slot {
      width: 56px;
      height: 56px;
      background: rgba(139, 139, 139, 0.5);
      border: 3px solid #333;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      position: relative;
    }
    
    .hotbar-slot.selected {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
    }
    
    .hotbar-slot .count {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-size: 14px;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
      font-weight: bold;
    }
    
    #joystick-area {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 50%;
      height: 250px;
      z-index: 15;
    }
    
    #joystick {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, 0.15);
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      touch-action: none;
    }
    
    #joystick-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.5);
      border: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }
    
    #action-buttons {
      position: fixed;
      bottom: 40px;
      right: 20px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .action-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      backdrop-filter: blur(10px);
    }
    
    .action-btn:active {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0.9);
    }
    
    #jump-btn {
      position: fixed;
      bottom: 200px;
      right: 30px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 32px;
      z-index: 15;
      touch-action: none;
      backdrop-filter: blur(10px);
    }
    
    #inventory-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 24px;
      z-index: 20;
      touch-action: none;
      backdrop-filter: blur(10px);
    }
    
    #health-bar {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      max-width: 160px;
    }
    
    .heart {
      font-size: 22px;
      filter: drop-shadow(2px 2px 0 #000);
    }
    
    #block-info {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 8px 20px;
      z-index: 20;
      font-size: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      pointer-events: none;
    }
    
    #inventory-screen {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(30, 30, 30, 0.95);
      border: 4px solid #555;
      border-radius: 20px;
      padding: 20px;
      z-index: 100;
      display: none;
      color: #fff;
      width: 90%;
      max-width: 450px;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 4px;
      margin: 10px 0;
    }
    
    .inv-slot {
      aspect-ratio: 1;
      background: rgba(139, 139, 139, 0.3);
      border: 2px solid #555;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      min-width: 30px;
    }
    
    .close-btn {
      background: #ff4444;
      color: #fff;
      border: none;
      padding: 10px 30px;
      border-radius: 20px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
    }
    
    #fps-counter {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="crosshair"></div>
  <div id="fps-counter">FPS: --</div>
  
  <div id="hotbar">
    <div class="hotbar-slot selected" data-slot="0"><span class="count">64</span></div>
    <div class="hotbar-slot" data-slot="1"></div>
    <div class="hotbar-slot" data-slot="2"></div>
    <div class="hotbar-slot" data-slot="3"></div>
    <div class="hotbar-slot" data-slot="4"></div>
    <div class="hotbar-slot" data-slot="5"></div>
  </div>
  
  <div id="health-bar">
    <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
    <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
    <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
    <span class="heart">❤️</span>
  </div>
  
  <div id="block-info">🟫 Земля</div>
  
  <div id="joystick-area">
    <div id="joystick">
      <div id="joystick-knob"></div>
    </div>
  </div>
  
  <div id="action-buttons">
    <div class="action-btn" id="break-btn">⛏️</div>
    <div class="action-btn" id="place-btn">🧱</div>
  </div>
  
  <div id="jump-btn">⬆️</div>
  <div id="inventory-btn">📦</div>
  
  <div id="inventory-screen">
    <h2>📦 Инвентарь</h2>
    <div class="inv-grid" id="inventory-grid"></div>
    <button class="close-btn" id="close-inventory">ЗАКРЫТЬ</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ==================== MINECRAFT RTX MOBILE ====================
    
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ 
      canvas, 
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputEncoding = THREE.sRGBEncoding;
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.002);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 120);
    camera.position.set(0, 18, 5);
    
    // RTX-подобное освещение
    const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
    scene.add(ambientLight);
    
    const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    sunLight.position.set(100, 150, 80);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 300;
    sunLight.shadow.camera.left = -50;
    sunLight.shadow.camera.right = 50;
    sunLight.shadow.camera.top = 50;
    sunLight.shadow.camera.bottom = -50;
    sunLight.shadow.bias = -0.001;
    sunLight.shadow.normalBias = 0.02;
    scene.add(sunLight);
    
    // Небесный свет (имитация RTX GI)
    const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x8B6914, 0.4);
    scene.add(hemisphereLight);
    
    // Подповерхностное рассеивание для блоков
    const sssLight = new THREE.PointLight(0xff9944, 0.5, 20);
    sssLight.position.set(0, 5, 0);
    scene.add(sssLight);
    
    // Текстуры с PBR эффектами
    function createPBRTexture(color, roughness = 0.5, metalness = 0) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      
      const baseColor = '#' + new THREE.Color(color).getHexString();
      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, 128, 128);
      
      // Микродетали
      for (let i = 0; i < 200; i++) {
        const x = Math.random() * 128;
        const y = Math.random() * 128;
        const size = 1 + Math.random() * 4;
        ctx.fillStyle = `rgba(${Math.random() > 0.5 ? 255 : 0},${Math.random() > 0.5 ? 255 : 0},${Math.random() > 0.5 ? 255 : 0},${0.03 + Math.random() * 0.08})`;
        ctx.fillRect(x, y, size, size);
      }
      
      // Границы блоков
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, 0, 128, 128);
      
      // Эффект шероховатости
      if (roughness > 0.3) {
        for (let i = 0; i < 50; i++) {
          ctx.fillStyle = `rgba(0,0,0,${roughness * 0.1})`;
          ctx.fillRect(Math.random() * 128, Math.random() * 128, 8, 8);
        }
      }
      
      // Металлический блеск
      if (metalness > 0) {
        const gradient = ctx.createLinearGradient(0, 0, 128, 128);
        gradient.addColorStop(0, `rgba(255,255,255,${metalness * 0.4})`);
        gradient.addColorStop(0.5, 'rgba(255,255,255,0)');
        gradient.addColorStop(1, `rgba(0,0,0,${metalness * 0.3})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 128, 128);
      }
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.LinearFilter;
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.generateMipmaps = true;
      return texture;
    }
    
    const textures = {
      grass_top: createPBRTexture(0x7ec850, 0.6, 0),
      grass_side: createPBRTexture(0x6a9e3a, 0.7, 0),
      dirt: createPBRTexture(0x8b6914, 0.8, 0),
      stone: createPBRTexture(0x7a7a7a, 0.5, 0.1),
      wood: createPBRTexture(0x8b6914, 0.6, 0),
      leaves: createPBRTexture(0x3a7e3a, 0.7, 0),
      sand: createPBRTexture(0xf4e4a8, 0.4, 0),
      plank: createPBRTexture(0xc4944a, 0.5, 0),
      cobblestone: createPBRTexture(0x696969, 0.6, 0.1),
      brick: createPBRTexture(0xb53c1c, 0.5, 0),
      glass: createPBRTexture(0xc8e8ff, 0.1, 0.1),
      gold: createPBRTexture(0xffd700, 0.2, 0.9),
      diamond: createPBRTexture(0x33e8ff, 0.1, 0.8),
      bedrock: createPBRTexture(0x1a1a1a, 0.9, 0.2),
      water: createPBRTexture(0x3355ff, 0.2, 0.1)
    };
    
    const blockTypes = {
      air: { id: 0, solid: false },
      grass: { id: 1, texture: 'grass_top', sideTexture: 'grass_side', bottomTexture: 'dirt', solid: true, name: 'Трава' },
      dirt: { id: 2, texture: 'dirt', solid: true, name: 'Земля' },
      stone: { id: 3, texture: 'stone', solid: true, drop: 'cobblestone', name: 'Камень' },
      wood: { id: 4, texture: 'wood', solid: true, name: 'Дерево' },
      leaves: { id: 5, texture: 'leaves', solid: true, transparent: true, name: 'Листья' },
      sand: { id: 6, texture: 'sand', solid: true, name: 'Песок' },
      plank: { id: 7, texture: 'plank', solid: true, name: 'Доски' },
      cobblestone: { id: 8, texture: 'cobblestone', solid: true, name: 'Булыжник' },
      brick: { id: 9, texture: 'brick', solid: true, name: 'Кирпич' },
      glass: { id: 10, texture: 'glass', solid: true, transparent: true, name: 'Стекло' },
      gold: { id: 11, texture: 'gold', solid: true, name: 'Золото' },
      diamond: { id: 12, texture: 'diamond', solid: true, name: 'Алмаз' },
      bedrock: { id: 13, texture: 'bedrock', solid: true, name: 'Бедрок' }
    };
    
    // Инвентарь
    const inventory = {
      hotbar: new Array(6).fill(null),
      slots: new Array(27).fill(null),
      selectedSlot: 0
    };
    
    inventory.hotbar[0] = { type: 'plank', count: 64, name: 'Доски' };
    inventory.hotbar[1] = { type: 'cobblestone', count: 64, name: 'Булыжник' };
    inventory.hotbar[2] = { type: 'dirt', count: 64, name: 'Земля' };
    inventory.hotbar[3] = { type: 'brick', count: 64, name: 'Кирпич' };
    inventory.hotbar[4] = { type: 'glass', count: 64, name: 'Стекло' };
    
    // Мир
    const worldSize = 60;
    const world = new Map();
    const blockMeshes = new Map();
    const blockGeometry = new THREE.BoxGeometry(1, 1, 1);
    
    function getBlockKey(x, y, z) {
      return `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
    }
    
    function setBlock(x, y, z, type) {
      const key = getBlockKey(x, y, z);
      if (type === 'air') {
        world.delete(key);
        removeBlockMesh(x, y, z);
      } else {
        world.set(key, type);
        createBlockMesh(x, y, z, type);
      }
    }
    
    function getBlock(x, y, z) {
      return world.get(getBlockKey(x, y, z)) || 'air';
    }
    
    function createBlockMesh(x, y, z, type) {
      const blockType = blockTypes[type];
      if (!blockType || !blockType.solid) return;
      
      const topTex = textures[blockType.texture] || textures.dirt;
      const sideTex = textures[blockType.sideTexture || blockType.texture] || topTex;
      const bottomTex = textures[blockType.bottomTexture || blockType.texture] || topTex;
      
      const materials = [
        new THREE.MeshStandardMaterial({ map: sideTex, roughness: 0.7, metalness: 0, transparent: blockType.transparent }),
        new THREE.MeshStandardMaterial({ map: sideTex, roughness: 0.7, metalness: 0, transparent: blockType.transparent }),
        new THREE.MeshStandardMaterial({ map: topTex, roughness: 0.6, metalness: 0, transparent: blockType.transparent }),
        new THREE.MeshStandardMaterial({ map: bottomTex, roughness: 0.8, metalness: 0, transparent: blockType.transparent }),
        new THREE.MeshStandardMaterial({ map: sideTex, roughness: 0.7, metalness: 0, transparent: blockType.transparent }),
        new THREE.MeshStandardMaterial({ map: sideTex, roughness: 0.7, metalness: 0, transparent: blockType.transparent })
      ];
      
      const mesh = new THREE.Mesh(blockGeometry, materials);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { type, x, y, z };
      
      scene.add(mesh);
      blockMeshes.set(getBlockKey(x, y, z), mesh);
    }
    
    function removeBlockMesh(x, y, z) {
      const key = getBlockKey(x, y, z);
      const mesh = blockMeshes.get(key);
      if (mesh) {
        scene.remove(mesh);
        blockMeshes.delete(key);
      }
    }
    
    // Генерация мира
    function generateWorld() {
      for (let x = -worldSize/2; x < worldSize/2; x++) {
        for (let z = -worldSize/2; z < worldSize/2; z++) {
          const noise1 = Math.sin(x * 0.15) * Math.cos(z * 0.15) * 4;
          const noise2 = Math.sin(x * 0.06 + 2) * Math.cos(z * 0.06) * 6;
          const noise3 = Math.sin(x * 0.03) * Math.cos(z * 0.03) * 8;
          let height = Math.floor(8 + noise1 + noise2 + noise3);
          height = Math.max(3, Math.min(22, height));
          
          setBlock(x, 0, z, 'bedrock');
          
          for (let y = 1; y < height - 3; y++) {
            if (Math.random() < 0.04 && y > height - 12) {
              setBlock(x, y, z, Math.random() < 0.25 ? 'diamond' : 'gold');
            } else {
              setBlock(x, y, z, 'stone');
            }
          }
          
          for (let y = height - 3; y < height - 1; y++) {
            setBlock(x, y, z, 'dirt');
          }
          
          if (height > 2) setBlock(x, height - 1, z, 'grass');
          
          // Деревья
          if (Math.random() < 0.06 && height > 11 && getBlock(x, height - 1, z) === 'grass') {
            const treeH = 3 + Math.floor(Math.random() * 4);
            for (let ty = 0; ty < treeH; ty++) setBlock(x, height + ty, z, 'wood');
            for (let lx = -2; lx <= 2; lx++) {
              for (let lz = -2; lz <= 2; lz++) {
                for (let ly = -1; ly <= 1; ly++) {
                  if (Math.abs(lx) + Math.abs(lz) + Math.abs(ly) <= 3) {
                    if (getBlock(x + lx, height + treeH + ly, z + lz) === 'air') {
                      setBlock(x + lx, height + treeH + ly, z + lz, 'leaves');
                    }
                  }
                }
              }
            }
          }
        }
      }
    }
    
    // Игрок
    const player = {
      position: new THREE.Vector3(0, 20, 0),
      velocity: new THREE.Vector3(),
      rotation: new THREE.Euler(0, 0, 0, 'YXZ'),
      onGround: false,
      health: 10,
      breakingBlock: null,
      breakingProgress: 0
    };
    
    // Мобильное управление
    const joystick = document.getElementById('joystick');
    const joystickKnob = document.getElementById('joystick-knob');
    let joystickActive = false;
    let joystickData = { x: 0, y: 0 };
    let touchLookActive = false;
    let lastTouchX = 0;
    let lastTouchY = 0;
    
    joystick.addEventListener('touchstart', (e) => {
      e.preventDefault();
      joystickActive = true;
      updateJoystick(e.touches[0]);
    });
    
    joystick.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (joystickActive) updateJoystick(e.touches[0]);
    });
    
    joystick.addEventListener('touchend', () => {
      joystickActive = false;
      joystickKnob.style.transform = 'translate(-50%, -50%)';
      joystickData.x = 0;
      joystickData.y = 0;
    });
    
    function updateJoystick(touch) {
      const rect = joystick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = touch.clientX - centerX;
      const dy = touch.clientY - centerY;
      const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 50);
      const angle = Math.atan2(dy, dx);
      
      const knobX = Math.cos(angle) * dist;
      const knobY = Math.sin(angle) * dist;
      
      joystickKnob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
      
      joystickData.x = Math.cos(angle) * (dist / 50);
      joystickData.y = Math.sin(angle) * (dist / 50);
    }
    
    // Обзор касанием (правая часть экрана)
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1 && e.touches[0].clientX > window.innerWidth / 2) {
        touchLookActive = true;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });
    
    canvas.addEventListener('touchmove', (e) => {
      if (touchLookActive && e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastTouchX;
        const dy = e.touches[0].clientY - lastTouchY;
        
        player.rotation.y -= dx * 0.005;
        player.rotation.x -= dy * 0.005;
        player.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, player.rotation.x));
        
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });
    
    canvas.addEventListener('touchend', () => {
      touchLookActive = false;
    });
    
    // Кнопки действий
    document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (player.onGround) {
        player.velocity.y = 8;
        player.onGround = false;
      }
    });
    
    document.getElementById('break-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      startBreaking();
    });
    
    document.getElementById('break-btn').addEventListener('touchend', (e) => {
      e.preventDefault();
      stopBreaking();
    });
    
    document.getElementById('place-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      placeBlock();
    });
    
    document.getElementById('inventory-btn').addEventListener('click', toggleInventory);
    document.getElementById('close-inventory').addEventListener('click', toggleInventory);
    
    // Выбор слотов хотбара
    document.querySelectorAll('.hotbar-slot').forEach((slot, i) => {
      slot.addEventListener('click', () => selectHotbarSlot(i));
    });
    
    function selectHotbarSlot(index) {
      inventory.selectedSlot = index;
      document.querySelectorAll('.hotbar-slot').forEach((s, i) => {
        s.classList.toggle('selected', i === index);
      });
    }
    
    function updateHotbarUI() {
      document.querySelectorAll('.hotbar-slot').forEach((slot, i) => {
        const item = inventory.hotbar[i];
        const emojiMap = {
          grass: '🟩', dirt: '🟫', stone: '🪨', wood: '🟤',
          leaves: '🌿', sand: '🟨', plank: '🟫', cobblestone: '🪨',
          brick: '🧱', glass: '🪟', water: '💧', gold: '🟡',
          diamond: '💎', bedrock: '⬛'
        };
        slot.innerHTML = item ? `${emojiMap[item.type] || '📦'}<span class="count">${item.count}</span>` : '';
      });
    }
    
    function toggleInventory() {
      const screen = document.getElementById('inventory-screen');
      const isOpen = screen.style.display === 'block';
      screen.style.display = isOpen ? 'none' : 'block';
      if (!isOpen) updateInventoryScreen();
    }
    
    function updateInventoryScreen() {
      const grid = document.getElementById('inventory-grid');
      grid.innerHTML = '';
      for (let i = 0; i < 27; i++) {
        const item = inventory.slots[i];
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        slot.textContent = item ? '📦' : '';
        grid.appendChild(slot);
      }
    }
    
    function getSelectedItem() {
      return inventory.hotbar[inventory.selectedSlot];
    }
    
    function addToInventory(type, name) {
      for (let i = 0; i < 6; i++) {
        if (inventory.hotbar[i] && inventory.hotbar[i].type === type && inventory.hotbar[i].count < 64) {
          inventory.hotbar[i].count++;
          updateHotbarUI();
          return;
        }
      }
      for (let i = 0; i < 6; i++) {
        if (!inventory.hotbar[i]) {
          inventory.hotbar[i] = { type, count: 1, name };
          updateHotbarUI();
          return;
        }
      }
    }
    
    function startBreaking() {
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const intersects = raycaster.intersectObjects(Array.from(blockMeshes.values()));
      if (intersects.length > 0 && intersects[0].distance < 8) {
        player.breakingBlock = intersects[0].object;
        player.breakingProgress = 0;
      }
    }
    
    function stopBreaking() {
      player.breakingBlock = null;
      player.breakingProgress = 0;
    }
    
    function placeBlock() {
      const selected = getSelectedItem();
      if (!selected) return;
      
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const intersects = raycaster.intersectObjects(Array.from(blockMeshes.values()));
      
      if (intersects.length > 0 && intersects[0].distance < 8) {
        const point = intersects[0].point;
        const normal = intersects[0].face.normal;
        const pos = intersects[0].object.position.clone();
        const placePos = new THREE.Vector3(
          Math.round(pos.x + normal.x),
          Math.round(pos.y + normal.y),
          Math.round(pos.z + normal.z)
        );
        
        if (getBlock(placePos.x, placePos.y, placePos.z) === 'air') {
          setBlock(placePos.x, placePos.y, placePos.z, selected.type);
          selected.count--;
          if (selected.count <= 0) inventory.hotbar[inventory.selectedSlot] = null;
          updateHotbarUI();
        }
      }
    }
    
    function updateBreaking(dt) {
      if (!player.breakingBlock) return;
      player.breakingProgress += dt * 3;
      if (player.breakingProgress >= 1) {
        const mesh = player.breakingBlock;
        const pos = mesh.position;
        const type = mesh.userData.type;
        const blockType = blockTypes[type];
        const dropType = blockType.drop || type;
        
        setBlock(pos.x, pos.y, pos.z, 'air');
        addToInventory(dropType, blockTypes[dropType]?.name || type);
        
        player.breakingBlock = null;
        player.breakingProgress = 0;
      }
    }
    
    function updatePhysics(dt) {
      const speed = 6;
      const direction = new THREE.Vector3();
      
      direction.x = joystickData.x;
      direction.z = joystickData.y;
      
      if (direction.length() > 0) {
        direction.normalize();
        direction.applyEuler(new THREE.Euler(0, player.rotation.y, 0));
        player.velocity.x = direction.x * speed;
        player.velocity.z = direction.z * speed;
      } else {
        player.velocity.x *= 0.85;
        player.velocity.z *= 0.85;
      }
      
      player.velocity.y -= 20 * dt;
      
      const newPos = player.position.clone();
      newPos.x += player.velocity.x * dt;
      newPos.y += player.velocity.y * dt;
      newPos.z += player.velocity.z * dt;
      
      const pMin = new THREE.Vector3(newPos.x - 0.3, newPos.y - 0.9, newPos.z - 0.3);
      const pMax = new THREE.Vector3(newPos.x + 0.3, newPos.y + 0.1, newPos.z + 0.3);
      
      let collidedY = false;
      
      for (let x = Math.floor(pMin.x) - 1; x <= Math.ceil(pMax.x) + 1; x++) {
        for (let y = Math.floor(pMin.y) - 1; y <= Math.ceil(pMax.y) + 1; y++) {
          for (let z = Math.floor(pMin.z) - 1; z <= Math.ceil(pMax.z) + 1; z++) {
            const block = getBlock(x, y, z);
            if (block !== 'air' && blockTypes[block]?.solid) {
              const bMin = new THREE.Vector3(x - 0.5, y - 0.5, z - 0.5);
              const bMax = new THREE.Vector3(x + 0.5, y + 0.5, z + 0.5);
              
              if (pMax.x > bMin.x && pMin.x < bMax.x &&
                  pMax.y > bMin.y && pMin.y < bMax.y &&
                  pMax.z > bMin.z && pMin.z < bMax.z) {
                
                const ox = Math.min(pMax.x - bMin.x, bMax.x - pMin.x);
                const oy = Math.min(pMax.y - bMin.y, bMax.y - pMin.y);
                const oz = Math.min(pMax.z - bMin.z, bMax.z - pMin.z);
                
                if (oy < ox && oy < oz) {
                  if (player.velocity.y < 0) {
                    newPos.y = y + 0.5 + 0.9;
                    player.velocity.y = 0;
                    player.onGround = true;
                    collidedY = true;
                  } else {
                    newPos.y = y - 0.5 - 0.1;
                    player.velocity.y = 0;
                  }
                }
              }
            }
          }
        }
      }
      
      if (!collidedY) player.onGround = false;
      player.position.copy(newPos);
      
      if (player.position.y < -15) {
        player.position.set(0, 22, 0);
        player.velocity.set(0, 0, 0);
        player.health--;
        updateHealthUI();
      }
    }
    
    function updateHealthUI() {
      document.querySelectorAll('.heart').forEach((h, i) => {
        h.textContent = i < player.health ? '❤️' : '🖤';
      });
    }
    
    function updateBlockInfo() {
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const intersects = raycaster.intersectObjects(Array.from(blockMeshes.values()));
      if (intersects.length > 0 && intersects[0].distance < 8) {
        document.getElementById('block-info').textContent = 
          blockTypes[intersects[0].object.userData.type]?.name || '???';
      }
    }
    
    // FPS счетчик
    let frameCount = 0;
    let fpsTime = performance.now();
    
    function updateFPS() {
      frameCount++;
      const now = performance.now();
      if (now - fpsTime >= 1000) {
        document.getElementById('fps-counter').textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        fpsTime = now;
      }
    }
    
    // Игровой цикл
    let lastTime = performance.now();
    
    function gameLoop() {
      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 0.1);
      lastTime = now;
      
      updatePhysics(dt);
      updateBreaking(dt);
      updateBlockInfo();
      updateFPS();
      
      camera.position.copy(player.position);
      camera.position.y += 0.9;
      camera.rotation.copy(player.rotation);
      
      // Анимируем солнце
      sunLight.position.x = 50 * Math.cos(now * 0.0001);
      sunLight.position.z = 50 * Math.sin(now * 0.0001);
      
      renderer.render(scene, camera);
      requestAnimationFrame(gameLoop);
    }
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Запуск
    generateWorld();
    updateHotbarUI();
    updateHealthUI();
    gameLoop();
    
    console.log('⛏️ MINECRAFT RTX MOBILE ЗАПУЩЕН!');
    console.log('📱 Оптимизирован под сенсорное управление');
    console.log('🎮 Джойстик слева | Обзор справа | Кнопки действий');
  </script>
</body>
</html>
