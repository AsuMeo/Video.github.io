<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ТЕРРАНИЯ — Мультиплеерная Песочница</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#0f0f1a;font-family:'Segoe UI',sans-serif;user-select:none}
  #game{position:fixed;inset:0;width:100%;height:100%;display:block}

  /* ---------- AUTH ---------- */
  #auth{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 700px at 50% -10%,#1b2b5e 0%,#0a1030 45%,#05070f 100%);transition:opacity .5s}
  #auth.hidden{opacity:0;pointer-events:none}
  .auth-card{width:min(400px,92vw);padding:30px 24px 24px;border-radius:22px;background:rgba(13,20,46,.8);backdrop-filter:blur(14px);border:1px solid rgba(120,160,255,.22);box-shadow:0 0 60px rgba(60,110,255,.18);text-align:center;color:#dfe8ff}
  .auth-card h1{font-size:26px;letter-spacing:2px;background:linear-gradient(180deg,#8ecbff,#4f7cff 60%,#b96bff);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}
  .tagline{font-size:13px;color:#8fa3d9;margin:8px 0 20px}
  .field{margin-bottom:12px;text-align:left}
  .field label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#7f93c9;margin-bottom:5px}
  .field input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(120,160,255,.25);background:rgba(6,10,28,.75);color:#eaf1ff;font-size:15px;outline:none;transition:.2s}
  .field input:focus{border-color:#5f8dff;box-shadow:0 0 0 3px rgba(95,141,255,.18)}
  .btn{width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;font-weight:800;font-size:15px;letter-spacing:.5px;color:#fff;transition:.15s;margin-top:6px}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:linear-gradient(135deg,#3f7bff,#7b4dff);box-shadow:0 6px 22px rgba(80,110,255,.4)}
  .btn-ghost{background:transparent;border:1px solid rgba(120,160,255,.35);color:#a9bcff;margin-top:10px}
  #authErr{min-height:18px;color:#ff7d92;font-size:13px;margin-top:10px}
  .hint{margin-top:14px;font-size:12px;color:#6f83b8;line-height:1.5}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #fff3;border-top-color:#fff;border-radius:50%;animation:sp 1s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;z-index:20;pointer-events:none;display:none}
  #hud.on{display:block}

  /* Joystick */
  #joystickZone{position:absolute;bottom:100px;left:24px;width:140px;height:140px;pointer-events:auto}
  #joystickBase{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15)}
  #joystickKnob{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(95,141,255,.45);border:2px solid rgba(255,255,255,.3);left:42px;top:42px;transition:none}

  /* Action buttons */
  #actionZone{position:absolute;bottom:100px;right:20px;display:flex;flex-direction:column;gap:12px;pointer-events:auto;align-items:flex-end}
  .act-btn{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(10,16,40,.7);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);font-weight:800}
  .act-btn.act{background:rgba(95,141,255,.55);border-color:rgba(255,255,255,.5)}
  .act-btn.small{width:48px;height:48px;font-size:18px}

  /* Hotbar */
  #hotbar{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto;background:rgba(8,12,30,.6);padding:6px;border-radius:14px;border:1px solid rgba(130,165,255,.2);backdrop-filter:blur(6px)}
  .slot{width:48px;height:48px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;transition:.15s}
  .slot.active{border-color:#ffe98a;background:rgba(255,234,138,.15);box-shadow:0 0 12px rgba(255,234,138,.25)}
  .slot .count{position:absolute;bottom:2px;right:4px;font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 2px #000}

  /* Info bar */
  #topbar{position:absolute;top:10px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-start;color:#eaf1ff;text-shadow:0 2px 6px #000;pointer-events:auto}
  #topbar .left{display:flex;flex-direction:column;gap:4px}
  #timeIcon{font-size:20px}
  #onlineCount{font-size:12px;color:#8fa3d9}
  #coords{font-size:11px;color:#7f93c9}

  /* Mode indicator */
  #modeBadge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:8px 18px;border-radius:12px;background:rgba(10,16,40,.85);border:1px solid rgba(130,165,255,.35);color:#fff;font-weight:700;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none}
  #modeBadge.show{opacity:1}

  /* Chat */
  #chat{position:absolute;bottom:170px;left:12px;width:260px;height:140px;background:rgba(10,16,40,.55);border:1px solid rgba(130,165,255,.22);border-radius:14px;backdrop-filter:blur(6px);display:flex;flex-direction:column;pointer-events:auto;z-index:25;transition:opacity .3s}
  #chat.hidden{opacity:0;pointer-events:none}
  #chatMsgs{flex:1;overflow-y:auto;padding:8px;font-size:12px;display:flex;flex-direction:column;gap:4px;text-shadow:0 1px 2px #000}
  #chatInput{background:rgba(6,10,28,.8);border:none;border-top:1px solid rgba(130,165,255,.2);padding:8px 10px;color:#fff;font-size:13px;border-radius:0 0 14px 14px;outline:none}

  /* Inventory modal */
  #invOverlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(3,5,15,.85);backdrop-filter:blur(8px);pointer-events:auto}
  #invOverlay.open{display:flex}
  .inv-panel{width:min(420px,95vw);background:rgba(13,20,46,.9);border:1px solid rgba(120,160,255,.25);border-radius:18px;padding:16px;max-height:80vh;overflow-y:auto}
  .inv-panel h2{font-size:16px;color:#ffe98a;margin-bottom:12px;text-align:center}
  .inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .inv-item{aspect-ratio:1;border-radius:10px;border:2px solid rgba(255,255,255,.12);background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative}
  .inv-item .cnt{position:absolute;bottom:2px;right:4px;font-size:11px;font-weight:800;color:#fff}
  .inv-item.selected{border-color:#4f7cff;background:rgba(79,124,255,.15)}

  /* Loading */
  #loading{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#05070f;color:#8fa3d9;font-size:14px;letter-spacing:1px;transition:opacity .4s}
  #loading.hidden{opacity:0;pointer-events:none}

  /* Break progress */
  #breakBar{position:absolute;width:36px;height:4px;background:rgba(0,0,0,.6);border-radius:2px;overflow:hidden;display:none;pointer-events:none}
  #breakBar .fill{height:100%;width:0%;background:#ffe98a;transition:width .05s linear}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="topbar">
    <div class="left">
      <div><span id="timeIcon">☀️</span> <span id="timeText">День</span></div>
      <div id="coords">X:0 Y:0</div>
      <div id="onlineCount">👥 Онлайн: 1</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="act-btn small" id="chatBtn" style="position:static">💬</button>
      <button class="act-btn small" id="invBtn" style="position:static">🎒</button>
    </div>
  </div>

  <div id="modeBadge">⛏️ Режим копания</div>

  <div id="joystickZone">
    <div id="joystickBase"></div>
    <div id="joystickKnob"></div>
  </div>

  <div id="actionZone">
    <div class="act-btn" id="jumpBtn">⤒</div>
    <div class="act-btn" id="modeBtn">⛏️</div>
  </div>

  <div id="hotbar"></div>
  <div id="breakBar"><div class="fill"></div></div>

  <div id="chat" class="hidden">
    <div id="chatMsgs"></div>
    <input id="chatInput" maxlength="64" placeholder="Сообщение..." autocomplete="off">
  </div>
</div>

<div id="invOverlay">
  <div class="inv-panel">
    <h2>🎒 Инвентарь</h2>
    <div class="inv-grid" id="invGrid"></div>
    <button class="btn btn-ghost" id="invClose" style="margin-top:12px">Закрыть</button>
  </div>
</div>

<div id="auth">
  <div class="auth-card">
    <h1>ТЕРРАНИЯ</h1>
    <div class="tagline">Песочница с друзьями. Копай, строй, выживай. ⛏️</div>
    <div class="field"><label>Ник</label><input id="nick" maxlength="14" placeholder="Твой ник" autocomplete="off"></div>
    <div class="field"><label>Почта</label><input id="email" type="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label>Пароль</label><input id="pass" type="password" placeholder="Минимум 6 символов" autocomplete="current-password"></div>
    <button class="btn btn-primary" id="loginBtn">ВОЙТИ В МИР</button>
    <button class="btn btn-ghost" id="regBtn">СОЗДАТЬ АККАУНТ</button>
    <div id="authErr"></div>
    <div class="hint">⛏️ Тапай по экрану чтобы копать/строить<br>🎒 Хотбар снизу — выбор блока<br>👥 Один мир на всех игроков</div>
  </div>
</div>

<div id="loading"><div class="spin" style="width:26px;height:26px;border-width:3px"></div><div>Генерация мира...</div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
'use strict';
const firebaseConfig={apiKey:"AIzaSyBm0mIvHVznIeF2PoFk6dtdaiT5r877wyA",authDomain:"meow-874ce.firebaseapp.com",databaseURL:"https://meow-874ce-default-rtdb.europe-west1.firebasedatabase.app",projectId:"meow-874ce",storageBucket:"meow-874ce.firebasestorage.app",messagingSenderId:"471541334599",appId:"1:471541334599:web:567af3e7dbe70a37572762"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.database();

const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
function mulberry32(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- AUTH ---------- */
const AUTH_ERR={'auth/invalid-email':'Некорректная почта','auth/user-not-found':'Игрок не найден','auth/wrong-password':'Неверный пароль','auth/invalid-credential':'Неверные данные','auth/email-already-in-use':'Почта занята','auth/weak-password':'Пароль слишком короткий','auth/too-many-requests':'Слишком много попыток','auth/network-request-failed':'Нет соединения'};
function authError(e){$('authErr').textContent=AUTH_ERR[e.code]||('Ошибка: '+(e.code||e.message));}
function validNick(n){return/^[A-Za-zА-Яа-яЁё0-9_\-]{2,14}$/.test(n);}
let busyAuth=false;
async function doReg(){if(busyAuth)return;const nick=$('nick').value.trim(),email=$('email').value.trim(),pass=$('pass').value;$('authErr').textContent='';if(!validNick(nick)){$('authErr').textContent='Ник: 2–14 символов';return;}if(!email||!pass){$('authErr').textContent='Заполни почту и пароль';return;}busyAuth=true;$('regBtn').innerHTML='<span class="spin"></span> СОЗДАЮ…';try{const cr=await auth.createUserWithEmailAndPassword(email,pass);await db.ref('users/'+cr.user.uid).set({name:nick,created:firebase.database.ServerValue.TIMESTAMP});MY_NAME=nick;}catch(e){authError(e);}busyAuth=false;$('regBtn').textContent='СОЗДАТЬ АККАУНТ';}
async function doLogin(){if(busyAuth)return;const email=$('email').value.trim(),pass=$('pass').value;$('authErr').textContent='';if(!email||!pass){$('authErr').textContent='Введи почту и пароль';return;}busyAuth=true;$('loginBtn').innerHTML='<span class="spin"></span> ВХОЖУ…';try{await auth.signInWithEmailAndPassword(email,pass);}catch(e){authError(e);}busyAuth=false;$('loginBtn').textContent='ВОЙТИ В МИР';}
$('regBtn').onclick=doReg;$('loginBtn').onclick=doLogin;

/* ---------- WORLD ---------- */
const TILE=32,WW=600,WH=200,WORLD_PX_W=WW*TILE,WORLD_PX_H=WH*TILE,SEED=20260718;
const T={AIR:0,DIRT:1,STONE:2,WOOD:3,LEAVES:4,SAND:5,COAL:6,IRON:7,GOLD:8,DIAMOND:9,BEDROCK:10,PLANK:11,TORCH:12,GLASS:13,BRICK:14};
const BLOCK_PROPS={
  [T.DIRT]:{name:'Земля',icon:'🟫',color:'#8a5a33',solid:true},
  [T.STONE]:{name:'Камень',icon:'⬜',color:'#7a7a7a',solid:true},
  [T.WOOD]:{name:'Дерево',icon:'🪵',color:'#6b4226',solid:true},
  [T.LEAVES]:{name:'Листва',icon:'🍃',color:'#4a8c3f',solid:false},
  [T.SAND]:{name:'Песок',icon:'🟨',color:'#d4c4a0',solid:true},
  [T.COAL]:{name:'Уголь',icon:'⬛',color:'#2a2a2a',solid:true},
  [T.IRON]:{name:'Железо',icon:'◻️',color:'#b87333',solid:true},
  [T.GOLD]:{name:'Золото',icon:'🟨',color:'#ffd700',solid:true},
  [T.DIAMOND]:{name:'Алмаз',icon:'💎',color:'#00ffff',solid:true},
  [T.BEDROCK]:{name:'Бедрок',icon:'⬛',color:'#1a1a1a',solid:true},
  [T.PLANK]:{name:'Доски',icon:'📦',color:'#a07850',solid:true},
  [T.TORCH]:{name:'Факел',icon:'🔥',color:'#ffaa00',solid:false},
  [T.GLASS]:{name:'Стекло',icon:'🪟',color:'#aaddff',solid:true},
  [T.BRICK]:{name:'Кирпич',icon:'🧱',color:'#a05040',solid:true}
};

const world=new Uint8Array(WW*WH);
const surf=new Int16Array(WW);
const deltas={}; // local cache of world changes
let worldGenerated=false;

function tileAt(tx,ty){if(tx<0||tx>=WW||ty<0||ty>=WH)return T.BEDROCK;return world[ty*WW+tx];}
function setTile(tx,ty,id){if(tx<0||tx>=WW||ty<0||ty>=WH)return;world[ty*WW+tx]=id;deltas[tx+','+ty]=id;}
function solidAt(tx,ty){const v=tileAt(tx,ty);return BLOCK_PROPS[v]?.solid||false;}

function genWorld(){
  const R=mulberry32(SEED),ri=(a,b)=>a+(R()*(b-a+1)|0);
  // Base terrain
  let h=WH-30;
  for(let x=0;x<WW;x++){
    h=clamp(h+ri(-1,1),WH-60,WH-20);
    surf[x]=h;
    for(let y=h;y<WH;y++){
      if(y===h)world[y*WW+x]=T.DIRT;
      else if(y<h+3)world[y*WW+x]=T.DIRT;
      else if(y<WH-5)world[y*WW+x]=T.STONE;
      else world[y*WW+x]=T.BEDROCK;
    }
    // Grass on top
    if(h>0&&h<WH)world[h*WW+x]=T.DIRT;
  }
  // Trees
  for(let x=5;x<WW-5;x+=ri(4,10)){
    const ground=surf[x];
    if(ground<5||ground>=WH-5)continue;
    const th=ri(4,7);
    for(let y=0;y<th;y++)world[(ground-1-y)*WW+x]=T.WOOD;
    // Leaves
    for(let lx=x-2;lx<=x+2;lx++)for(let ly=ground-th-1;ly<=ground-th+1;ly++)if(lx>=0&&lx<WW&&ly>=0&&ly<WH&&world[ly*WW+lx]===T.AIR)world[ly*WW+lx]=T.LEAVES;
  }
  // Ores
  for(let i=0;i<800;i++){
    const x=ri(0,WW-1),y=ri(surf[x]+5,WH-6);
    const r=R();
    const ore=r<0.03?T.DIAMOND:r<0.08?T.GOLD:r<0.15?T.IRON:T.COAL;
    const sz=ri(2,4);
    for(let ox=0;ox<sz;ox++)for(let oy=0;oy<sz;oy++)if(x+ox<WW&&y+oy<WH&&world[(y+oy)*WW+x+ox]===T.STONE)world[(y+oy)*WW+x+ox]=ore;
  }
  // Sand patches
  for(let x=0;x<WW;x+=ri(8,20)){
    const s=ri(3,8);
    for(let i=0;i<s;i++)if(x+i<WW){const g=surf[x+i];if(g>0&&g<WH)world[g*WW+(x+i)]=T.SAND;}
  }
  // Caves
  for(let i=0;i<40;i++){
    let cx=ri(10,WW-10),cy=ri(surf[cx]+10,WH-15);
    const len=ri(15,40);
    for(let j=0;j<len;j++){
      cx+=ri(-1,1);cy+=ri(-1,1);
      if(cx<0||cx>=WW||cy<0||cy>=WH)continue;
      const rad=ri(1,3);
      for(let dx=-rad;dx<=rad;dx++)for(let dy=-rad;dy<=rad;dy++)if(cx+dx>=0&&cx+dx<WW&&cy+dy>=0&&cy+dy<WH)world[(cy+dy)*WW+(cx+dx)]=T.AIR;
    }
  }
  worldGenerated=true;
}

/* ---------- PLAYER ---------- */
const P={x:100*TILE,y:(WH-35)*TILE,w:22,h:30,vx:0,vy:0,dir:1,ground:false,dead:false};
const cam={x:0,y:0};
const HOTBAR_SLOTS=8;
let inventory={};
let selectedSlot=0;
let buildMode=false; // false=mine, true=build
let breakProgress=0,breakTarget=null;

// Init inventory
inventory[T.DIRT]=64;
inventory[T.STONE]=32;
inventory[T.WOOD]=16;
inventory[T.PLANK]=32;
inventory[T.TORCH]=16;
inventory[T.GLASS]=16;
inventory[T.SAND]=16;
inventory[T.BRICK]=16;

const HOTBAR_ORDER=[T.DIRT,T.STONE,T.WOOD,T.PLANK,T.TORCH,T.GLASS,T.SAND,T.BRICK];

function invCount(id){return inventory[id]||0;}
function addItem(id,cnt){if(!inventory[id])inventory[id]=0;inventory[id]+=cnt;}
function removeItem(id,cnt){if(!inventory[id])return false;inventory[id]=Math.max(0,inventory[id]-cnt);return true;}

/* ---------- INPUT (Touch Only) ---------- */
const input={dx:0,dy:0,jump:false};
let joyActive=false,joyId=null,joyCX=70,joyCY=70,joyKnob=$('joystickKnob');

function setupTouch(){
  const jZone=$('joystickZone');
  jZone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joyActive=true;joyId=t.identifier;updateJoy(t.clientX,t.clientY);},{passive:false});
  jZone.addEventListener('touchmove',e=>{e.preventDefault();if(!joyActive)return;for(let t of e.changedTouches)if(t.identifier===joyId){updateJoy(t.clientX,t.clientY);break;}},{passive:false});
  const endJoy=e=>{if(!joyActive)return;for(let t of e.changedTouches)if(t.identifier===joyId){joyActive=false;joyId=null;input.dx=0;input.dy=0;joyKnob.style.left='42px';joyKnob.style.top='42px';break;}};
  jZone.addEventListener('touchend',endJoy,{passive:false});
  jZone.addEventListener('touchcancel',endJoy,{passive:false});

  // Action buttons
  const bindBtn=(id,on,off)=>{const el=$(id);const s=e=>{e.preventDefault();el.classList.add('act');on();};const e_=e=>{e.preventDefault();el.classList.remove('act');off();};el.addEventListener('touchstart',s,{passive:false});el.addEventListener('touchend',e_,{passive:false});el.addEventListener('touchcancel',e_,{passive:false});};
  bindBtn('jumpBtn',()=>input.jump=true,()=>input.jump=false);

  $('modeBtn').addEventListener('touchstart',e=>{e.preventDefault();buildMode=!buildMode;updateModeBadge();},{passive:false});

  // Canvas tap to mine/build
  const cv=$('game');
  cv.addEventListener('touchstart',handleCanvasTouch,{passive:false});

  // Hotbar
  renderHotbar();

  // Chat
  $('chatBtn').addEventListener('touchstart',e=>{e.preventDefault();$('chat').classList.toggle('hidden');},{passive:false});
  $('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'){sendChat();$('chatInput').blur();}});

  // Inventory
  $('invBtn').addEventListener('touchstart',e=>{e.preventDefault();openInv();},{passive:false});
  $('invClose').addEventListener('touchstart',e=>{e.preventDefault();$('invOverlay').classList.remove('open');},{passive:false});
}

function updateJoy(clientX,clientY){
  const rect=$('joystickZone').getBoundingClientRect();
  const x=clientX-rect.left-joyCX,y=clientY-rect.top-joyCY;
  const dist=Math.hypot(x,y),max=42;
  const nx=dist>max?x/dist*max:x;
  const ny=dist>max?y/dist*max:y;
  joyKnob.style.left=(42+nx)+'px';joyKnob.style.top=(42+ny)+'px';
  input.dx=nx/max;input.dy=ny/max;
}

let touchStartX=0,touchStartY=0,touchStartTime=0;
function handleCanvasTouch(e){
  e.preventDefault();
  if(e.targetTouches.length!==1)return;
  const t=e.targetTouches[0];
  const rect=$('game').getBoundingClientRect();
  const cx=(t.clientX-rect.left)*(canvas.width/rect.width)/dpr;
  const cy=(t.clientY-rect.top)*(canvas.height/rect.height)/dpr;
  const tx=Math.floor((cx+cam.x)/TILE);
  const ty=Math.floor((cy+cam.y)/TILE);
  if(tx<0||tx>=WW||ty<0||ty>=WH)return;
  const distToPlayer=Math.hypot((tx*TILE+16)-(P.x+P.w/2),(ty*TILE+16)-(P.y+P.h/2));
  if(distToPlayer>120)return; // reach limit

  if(buildMode){
    // Build
    const blockId=HOTBAR_ORDER[selectedSlot];
    if(!blockId||!invCount(blockId))return;
    if(tileAt(tx,ty)!==T.AIR)return; // occupied
    // Don't place inside player
    const px=Math.floor((P.x+P.w/2)/TILE),py=Math.floor((P.y+P.h/2)/TILE);
    if(tx===px&&ty===py)return;
    setTile(tx,ty,blockId);
    removeItem(blockId,1);
    renderHotbar();
    pushDelta(tx,ty,blockId);
    spawnParticles(tx*TILE+16,ty*TILE+16,BLOCK_PROPS[blockId].color,6);
  }else{
    // Mine
    const current=tileAt(tx,ty);
    if(current===T.AIR||current===T.BEDROCK)return;
    breakTarget={tx,ty,block:current};
    breakProgress=0;
    showBreakBar(t.clientX,t.clientY);
  }
}

// Long press for mining
let mineTimer=null,mineTx=-1,mineTy=-1;
$('game').addEventListener('touchstart',e=>{
  if(e.targetTouches.length!==1)return;
  const t=e.targetTouches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;touchStartTime=Date.now();
  const rect=$('game').getBoundingClientRect();
  const cx=(t.clientX-rect.left)*(canvas.width/rect.width)/dpr;
  const cy=(t.clientY-rect.top)*(canvas.height/rect.height)/dpr;
  const tx=Math.floor((cx+cam.x)/TILE);
  const ty=Math.floor((cy+cam.y)/TILE);
  mineTx=tx;mineTy=ty;
  if(!buildMode&&tileAt(tx,ty)!==T.AIR&&tileAt(tx,ty)!==T.BEDROCK){
    mineTimer=setTimeout(()=>{finishMine(tx,ty);},400);
  }
},{passive:false});

$('game').addEventListener('touchmove',e=>{
  if(mineTimer){
    const t=e.targetTouches[0];
    if(Math.hypot(t.clientX-touchStartX,t.clientY-touchStartY)>20){clearTimeout(mineTimer);mineTimer=null;}
  }
},{passive:false});

$('game').addEventListener('touchend',e=>{if(mineTimer){clearTimeout(mineTimer);mineTimer=null;}},{passive:false});

function finishMine(tx,ty){
  const current=tileAt(tx,ty);
  if(current===T.AIR||current===T.BEDROCK)return;
  setTile(tx,ty,T.AIR);
  addItem(current,1);
  renderHotbar();
  pushDelta(tx,ty,T.AIR);
  spawnParticles(tx*TILE+16,ty*TILE+16,BLOCK_PROPS[current]?.color||'#888',10);
}

function updateModeBadge(){
  const el=$('modeBadge');
  el.textContent=buildMode?'🧱 Режим строительства':'⛏️ Режим копания';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1200);
  $('modeBtn').textContent=buildMode?'🧱':'⛏️';
}

function showBreakBar(x,y){
  const bar=$('breakBar');
  bar.style.left=(x-18)+'px';bar.style.top=(y-20)+'px';bar.style.display='block';
  setTimeout(()=>{bar.style.display='none';},400);
}

/* ---------- PHYSICS ---------- */
function stepPlayer(){
  const spd=4.5;
  P.vx=lerp(P.vx,input.dx*spd,0.2);
  if(Math.abs(P.vx)<0.1)P.vx=0;
  if(input.dx>0)P.dir=1;if(input.dx<0)P.dir=-1;

  P.vy+=0.45; // gravity
  if(P.vy>12)P.vy=12;

  // Jump
  if(input.jump&&P.ground){P.vy=-10;P.ground=false;}

  // X collision
  P.x+=P.vx;
  collideX();
  // Y collision
  P.y+=P.vy;
  collideY();

  // Camera
  const targetX=P.x+P.w/2-vw/2;
  const targetY=P.y+P.h/2-vh/2;
  cam.x=lerp(cam.x,targetX,0.1);
  cam.y=lerp(cam.y,targetY,0.1);
  cam.x=clamp(cam.x,0,WORLD_PX_W-vw);
  cam.y=clamp(cam.y,0,WORLD_PX_H-vh);
}

function collideX(){
  const tx0=Math.floor(P.x/TILE),tx1=Math.floor((P.x+P.w-1)/TILE);
  const ty0=Math.floor(P.y/TILE),ty1=Math.floor((P.y+P.h-1)/TILE);
  for(let ty=ty0;ty<=ty1;ty++){
    if(P.vx>0){if(solidAt(tx1,ty)){P.x=tx1*TILE-P.w-0.01;P.vx=0;}}
    else if(P.vx<0){if(solidAt(tx0,ty)){P.x=(tx0+1)*TILE+0.01;P.vx=0;}}
  }
}
function collideY(){
  P.ground=false;
  const tx0=Math.floor(P.x/TILE),tx1=Math.floor((P.x+P.w-1)/TILE);
  const ty0=Math.floor(P.y/TILE),ty1=Math.floor((P.y+P.h-1)/TILE);
  for(let tx=tx0;tx<=tx1;tx++){
    if(P.vy>0){if(solidAt(tx,ty1)){P.y=ty1*TILE-P.h-0.01;P.vy=0;P.ground=true;}}
    else if(P.vy<0){if(solidAt(tx,ty0)){P.y=(ty0+1)*TILE+0.01;P.vy=0;}}
  }
  if(P.y>WORLD_PX_H){P.y=100;P.x=100*TILE;P.vy=0;} // fall void
}

/* ---------- RENDER ---------- */
const canvas=$('game'),ctx=canvas.getContext('2d');
let vw=0,vh=0,dpr=1;
function resize(){
  dpr=Math.min(2,window.devicePixelRatio||1);
  vw=innerWidth;vh=innerHeight;
  canvas.width=vw*dpr;canvas.height=vh*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);resize();

const particles=[];
function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20+Math.random()*15,color,size:2+Math.random()*3});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

let timeOfDay=0.2; // 0-1
function updateTime(){
  timeOfDay=(Date.now()%120000)/120000; // 2 min day cycle
  const isDay=timeOfDay>0.25&&timeOfDay<0.75;
  $('timeIcon').textContent=isDay?'☀️':'🌙';
  $('timeText').textContent=isDay?'День':'Ночь';
}

function drawWorld(){
  const tx0=Math.max(0,Math.floor(cam.x/TILE)-1),tx1=Math.min(WW-1,Math.floor((cam.x+vw)/TILE)+1);
  const ty0=Math.max(0,Math.floor(cam.y/TILE)-1),ty1=Math.min(WH-1,Math.floor((cam.y+vh)/TILE)+1);

  // Sky
  const dayTop='#6fb7ff',dayBot='#d8f1ff',nightTop='#0a0a1a',nightBot='#1a1a3a';
  let t=0;
  if(timeOfDay<0.25)t=1-timeOfDay/0.25;
  else if(timeOfDay>0.75)t=(timeOfDay-0.75)/0.25;
  else t=0;
  const g=ctx.createLinearGradient(0,0,0,vh);
  g.addColorStop(0,lerpColor(dayTop,nightTop,t));g.addColorStop(1,lerpColor(dayBot,nightBot,t));
  ctx.fillStyle=g;ctx.fillRect(0,0,vw,vh);

  // Stars at night
  if(t>0.3){
    ctx.fillStyle='rgba(255,255,255,'+(t*0.8)+')';
    const R=mulberry32(123);
    for(let i=0;i<60;i++){const sx=(R()*vw),sy=(R()*vh*0.6);ctx.fillRect(sx,sy,2,2);}
  }

  // Tiles
  for(let ty=ty0;ty<=ty1;ty++){
    for(let tx=tx0;tx<=tx1;tx++){
      const id=tileAt(tx,ty);
      if(id===T.AIR)continue;
      const x=tx*TILE-cam.x,y=ty*TILE-cam.y;
      const prop=BLOCK_PROPS[id];
      if(!prop)continue;

      ctx.fillStyle=prop.color;
      ctx.fillRect(x,y,TILE,TILE);

      // Texture detail
      ctx.fillStyle='rgba(0,0,0,0.15)';
      ctx.fillRect(x,y,TILE,2);ctx.fillRect(x,y,2,TILE);
      ctx.fillStyle='rgba(255,255,255,0.08)';
      ctx.fillRect(x+2,y+2,TILE-4,2);

      // Ore sparkle
      if((id===T.GOLD||id===T.DIAMOND)&&Math.random()<0.01){
        ctx.fillStyle='#fff';ctx.fillRect(x+Math.random()*28,y+Math.random()*28,2,2);
      }

      // Torch glow
      if(id===T.TORCH){
        const glow=ctx.createRadialGradient(x+16,y+16,2,x+16,y+16,60);
        glow.addColorStop(0,'rgba(255,200,80,0.35)');glow.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=glow;ctx.beginPath();ctx.arc(x+16,y+16,60,0,7);ctx.fill();
      }
    }
  }

  // Night overlay
  if(t>0.1){
    ctx.fillStyle='rgba(0,0,20,'+(t*0.55)+')';
    ctx.fillRect(0,0,vw,vh);
  }
}

function drawPlayerEntity(){
  const x=P.x-cam.x,y=P.y-cam.y;
  // Body
  ctx.fillStyle='#5cb8ff';
  ctx.fillRect(x,y,P.w,P.h);
  // Eyes
  ctx.fillStyle='#fff';
  const eo=P.dir*3;
  ctx.fillRect(x+4+eo,y+6,6,6);ctx.fillRect(x+12+eo,y+6,6,6);
  ctx.fillStyle='#222';
  ctx.fillRect(x+5+eo+P.dir*2,y+7,3,3);ctx.fillRect(x+13+eo+P.dir*2,y+7,3,3);
  // Name
  ctx.font='700 12px sans-serif';ctx.textAlign='center';ctx.fillStyle='#fff';
  ctx.fillText(MY_NAME||'???',x+P.w/2,y-6);
}

function drawRemotePlayers(){
  for(const k in remotes){
    const r=remotes[k];
    const x=r.rx-cam.x,y=r.ry-cam.y;
    if(x<-50||x>vw+50||y<-50||y>vh+50)continue;
    ctx.fillStyle='#7b4dff';
    ctx.fillRect(x,y,22,30);
    ctx.fillStyle='#fff';
    ctx.fillRect(x+6,y+6,4,4);ctx.fillRect(x+14,y+6,4,4);
    ctx.font='700 11px sans-serif';ctx.textAlign='center';ctx.fillStyle='#ffe98a';
    ctx.fillText(r.n||'???',x+11,y-4);
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-cam.x,p.y-cam.y,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

function lerpColor(a,b,t){
  const ah=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
  const bh=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  return `rgb(${Math.round(ah+(bh-ah)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

/* ---------- UI ---------- */
function renderHotbar(){
  const bar=$('hotbar');bar.innerHTML='';
  for(let i=0;i<HOTBAR_SLOTS;i++){
    const id=HOTBAR_ORDER[i];
    const div=document.createElement('div');
    div.className='slot'+(i===selectedSlot?' active':'');
    div.innerHTML=`<span>${BLOCK_PROPS[id]?.icon||'?'}</span><span class="count">${invCount(id)}</span>`;
    div.addEventListener('touchstart',e=>{e.preventDefault();selectedSlot=i;renderHotbar();},{passive:false});
    bar.appendChild(div);
  }
}

function openInv(){
  const grid=$('invGrid');grid.innerHTML='';
  const items=Object.entries(inventory).filter(([k,v])=>v>0);
  for(const[id,cnt]of items){
    const div=document.createElement('div');
    div.className='inv-item';
    div.innerHTML=`<span>${BLOCK_PROPS[id]?.icon||'?'}</span><span class="cnt">${cnt}</span>`;
    grid.appendChild(div);
  }
  $('invOverlay').classList.add('open');
}

/* ---------- NETWORK ---------- */
let MY_UID=null,MY_NAME='',joined=false;
const remotes={};
let meRef=null,lastSend=0;

function pushDelta(tx,ty,id){
  if(!joined)return;
  db.ref('world/deltas/'+tx+'_'+ty).set({id,t:firebase.database.ServerValue.TIMESTAMP});
}

function joinNet(){
  meRef=db.ref('players/'+MY_UID);
  db.ref('.info/connected').on('value',s=>{if(s.val()===true){meRef.onDisconnect().remove();sendNow();}});
  db.ref('players').on('value',snap=>{
    const now=Date.now(),seen=new Set();
    snap.forEach(ch=>{
      const v=ch.val();if(!v||ch.key===MY_UID)return;if(v.t&&now-v.t>15000)return;
      seen.add(ch.key);
      let r=remotes[ch.key];if(!r)r=remotes[ch.key]={rx:v.x,ry:v.y,tx:v.x,ty:v.y};
      r.n=v.n;r.tx=v.x;r.ty=v.y;r.t=v.t;
    });
    for(const k in remotes)if(!seen.has(k))delete remotes[k];
    $('onlineCount').textContent='👥 Онлайн: '+(seen.size+1);
  });
  // Load world deltas
  db.ref('world/deltas').on('child_added',snap=>{
    const key=snap.key;const v=snap.val();
    if(!v)return;const [tx,ty]=key.split('_').map(Number);
    if(tx>=0&&tx<WW&&ty>=0&&ty<WH){world[ty*WW+tx]=v.id;}
  });
  db.ref('world/deltas').on('child_changed',snap=>{
    const key=snap.key;const v=snap.val();
    if(!v)return;const [tx,ty]=key.split('_').map(Number);
    if(tx>=0&&tx<WW&&ty>=0&&ty<WH){world[ty*WW+tx]=v.id;}
  });
  // Chat
  db.ref('chat').limitToLast(20).on('child_added',snap=>{
    const d=snap.val();if(!d)return;
    const el=document.createElement('div');
    el.innerHTML='<span style="color:#ffe98a;font-weight:800">'+esc(d.name)+':</span> <span style="color:#fff">'+esc(d.text)+'</span>';
    const box=$('chatMsgs');box.appendChild(el);box.scrollTop=box.scrollHeight;
  });
  setInterval(()=>{if(Date.now()-lastSend>100)sendNow();},100);
}

function sendNow(){
  if(!meRef)return;
  lastSend=Date.now();
  meRef.update({n:MY_NAME,x:Math.round(P.x),y:Math.round(P.y),d:P.dir,t:firebase.database.ServerValue.TIMESTAMP});
}

function sendChat(){
  const txt=$('chatInput').value.trim();if(!txt)return;
  db.ref('chat').push({name:MY_NAME,text:txt,t:firebase.database.ServerValue.TIMESTAMP});
  $('chatInput').value='';
}

function smoothRemotes(){
  for(const k in remotes){
    const r=remotes[k];
    r.rx=lerp(r.rx,r.tx,0.2);r.ry=lerp(r.ry,r.ty,0.2);
  }
}

/* ---------- MAIN LOOP ---------- */
let lastTs=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastTs)lastTs=ts;
  const dt=Math.min(50,ts-lastTs);lastTs=ts;

  stepPlayer();
  updateParticles();
  smoothRemotes();
  updateTime();
  $('coords').textContent='X:'+Math.floor(P.x/TILE)+' Y:'+Math.floor((WH-P.y/TILE));

  ctx.clearRect(0,0,vw,vh);
  drawWorld();
  drawParticles();
  drawRemotePlayers();
  drawPlayerEntity();

  if(joined)sendNow();
}

/* ---------- START ---------- */
auth.onAuthStateChanged(async user=>{
  if(user&&!joined){
    joined=true;MY_UID=user.uid;
    try{const s=await db.ref('users/'+user.uid+'/name').once('value');MY_NAME=s.val()||user.email.split('@')[0].slice(0,14);}catch(e){MY_NAME=user.email.split('@')[0].slice(0,14);}
    $('auth').classList.add('hidden');$('loading').classList.add('hidden');$('hud').classList.add('on');
    genWorld();setupTouch();joinNet();requestAnimationFrame(loop);
  }else if(!user){$('loading').classList.add('hidden');$('auth').classList.remove('hidden');}
});
