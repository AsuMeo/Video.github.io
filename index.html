<!DOCTYPE html>
<html lang="ru" style="margin:0;padding:0;height:100%;overflow:hidden">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2D Террария Мультиплеер</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-touch-callout:none;-webkit-user-select:none}
body{background:#1a1a2e;color:#fff;font-family:sans-serif;width:100vw;height:100vh;overflow:hidden;touch-action:none;position:fixed;top:0;left:0}
#game-container{width:100%;height:100%;position:relative;background:#2d2d44;display:flex;flex-direction:column;overflow:hidden}
#auth-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px}
#auth-screen h1{font-size:28px;margin-bottom:20px;color:#f0c27f}
#auth-screen input{width:80%;max-width:300px;padding:14px;margin:8px 0;border-radius:12px;border:2px solid #4a4a6a;background:#2d2d44;color:#fff;font-size:18px;text-align:center}
#auth-screen button{width:80%;max-width:300px;padding:14px;margin:8px 0;border-radius:12px;border:none;background:#f0c27f;color:#1a1a2e;font-size:20px;font-weight:bold;cursor:pointer}
#auth-screen .error{color:#ff6b6b;margin:10px 0;font-size:14px}
#game-ui{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column}
#world-canvas{width:100%;height:100%;display:block;background:#3a3a5a;touch-action:none}
#hud{position:absolute;bottom:20px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 15px;pointer-events:none}
#hud .stats{background:rgba(0,0,0,.7);padding:10px 16px;border-radius:16px;font-size:14px;display:flex;gap:16px;pointer-events:auto}
#hud .stats span{color:#f0c27f}
#inventory{position:absolute;bottom:80px;right:15px;background:rgba(0,0,0,.7);padding:10px;border-radius:16px;display:flex;gap:8px;pointer-events:auto}
#inventory .slot{width:50px;height:50px;background:#2d2d44;border:2px solid #4a4a6a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#aaa;text-align:center;pointer-events:auto}
#inventory .slot.active{border-color:#f0c27f;background:#3d3d5a}
#controls{position:absolute;bottom:20px;right:15px;display:flex;gap:10px;pointer-events:none}
#controls button{width:70px;height:70px;border-radius:50%;border:none;background:rgba(240,194,127,.5);color:#1a1a2e;font-size:30px;font-weight:bold;pointer-events:auto;box-shadow:0 4px 15px rgba(0,0,0,.5)}
#controls .break{background:rgba(255,107,107,.6)}
#controls .place{background:rgba(107,255,107,.6)}
#controls .jump{position:absolute;bottom:20px;left:15px;width:70px;height:70px;border-radius:50%;border:none;background:rgba(255,255,255,.3);color:#1a1a2e;font-size:30px;font-weight:bold;pointer-events:auto;box-shadow:0 4px 15px rgba(0,0,0,.5)}
#player-list{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);padding:8px 12px;border-radius:12px;font-size:12px;pointer-events:none;max-height:120px;overflow-y:auto}
#player-list div{color:#aaa;margin:2px 0}
#player-list .me{color:#f0c27f;font-weight:bold}
@media(orientation:portrait){#auth-screen h1{font-size:22px}#controls button{width:60px;height:60px;font-size:24px}}
</style>
</head>
<body>
<div id="game-container">
<div id="auth-screen">
<h1>⚡ Террария 2D</h1>
<input type="text" id="nick-input" placeholder="Твой ник" maxlength="12">
<button id="login-btn">Войти в мир</button>
<div class="error" id="auth-error"></div>
</div>
<div id="game-ui">
<canvas id="world-canvas"></canvas>
<div id="hud">
<div class="stats"><span id="hp-text">❤️ 100</span><span id="food-text">🍖 100</span></div>
</div>
<div id="inventory">
<div class="slot active" data-block="0">🌱</div>
<div class="slot" data-block="1">🪨</div>
<div class="slot" data-block="2">🌳</div>
<div class="slot" data-block="3">🧱</div>
</div>
<div id="controls">
<button class="jump" id="jump-btn">⬆</button>
<button class="break" id="break-btn">⛏️</button>
<button class="place" id="place-btn">🧱</button>
</div>
<div id="player-list"></div>
</div>
</div>

<!-- Firebase SDK (App + Auth + Database) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyBm0mIvHVznIeF2PoFk6dtdaiT5r877wyA",
authDomain: "meow-874ce.firebaseapp.com",
databaseURL: "https://meow-874ce-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "meow-874ce",
storageBucket: "meow-874ce.firebasestorage.app",
messagingSenderId: "471541334599",
appId: "1:471541334599:web:567af3e7dbe70a37572762"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const WORLD_SIZE = 30;
const BLOCK_TYPES = {0:'grass',1:'stone',2:'wood',3:'brick'};
const BLOCK_COLORS = {0:'#4caf50',1:'#8d8d8d',2:'#6d4c41',3:'#b71c1c'};

let playerId = null;
let playerNick = '';
let myBlock = 0;
let hp = 100, food = 100;
let posX = 15, posY = 25;

const canvas = document.getElementById('world-canvas');
const ctx = canvas.getContext('2d');
let worldData = {};
let players = {};
let cellSize = 1;

function resizeCanvas() {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
cellSize = Math.min(canvas.width / WORLD_SIZE, canvas.height / WORLD_SIZE);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Авторизация (анонимная)
document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('nick-input').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

function login() {
const nick = document.getElementById('nick-input').value.trim();
if(!nick || nick.length<2) {
document.getElementById('auth-error').textContent = 'Введи ник (2-12 символов)';
return;
}
playerNick = nick;
document.getElementById('auth-error').textContent = '⏳ Вход...';
auth.signInAnonymously()
.then(() => {
playerId = auth.currentUser.uid;
document.getElementById('auth-screen').style.display = 'none';
document.getElementById('game-ui').style.display = 'flex';
initGame();
})
.catch(err => {
document.getElementById('auth-error').textContent = 'Ошибка входа: ' + err.message;
});
}

function initGame() {
// Загружаем мир
const worldRef = db.ref('world');
worldRef.on('value', snap => {
if(snap.val()) worldData = snap.val();
else {
worldData = {};
for(let y=0; y<WORLD_SIZE; y++) {
for(let x=0; x<WORLD_SIZE; x++) {
const key = x+'_'+y;
worldData[key] = y > WORLD_SIZE-5 ? 0 : (y > WORLD_SIZE-8 ? 1 : null);
}
}
worldRef.set(worldData);
}
renderWorld();
});

// Следим за другими игроками
const playersRef = db.ref('players');
playersRef.on('value', snap => {
players = snap.val() || {};
updatePlayerList();
});

// Сохраняем себя
const myRef = db.ref('players/' + playerId);
myRef.set({nick:playerNick, x:posX, y:posY, hp:hp, food:food});

// Инвентарь
document.querySelectorAll('#inventory .slot').forEach(el => {
el.addEventListener('click', function() {
document.querySelectorAll('#inventory .slot').forEach(s => s.classList.remove('active'));
this.classList.add('active');
myBlock = parseInt(this.dataset.block);
});
});

// Управление
document.getElementById('jump-btn').addEventListener('touchstart', e => { e.preventDefault(); if(posY>2) posY-=2; updatePos(); });
document.getElementById('break-btn').addEventListener('touchstart', e => { e.preventDefault(); breakBlock(); });
document.getElementById('place-btn').addEventListener('touchstart', e => { e.preventDefault(); placeBlock(); });

// Движение пальцем
let touchX = null, touchY = null;
canvas.addEventListener('touchstart', e => {
const t = e.touches[0];
touchX = t.clientX; touchY = t.clientY;
});
canvas.addEventListener('touchmove', e => {
if(!touchX || !touchY) return;
const t = e.touches[0];
const dx = t.clientX - touchX;
const dy = t.clientY - touchY;
const threshold = 20;
if(Math.abs(dx) > threshold) {
posX += Math.sign(dx);
touchX = t.clientX;
}
if(Math.abs(dy) > threshold) {
posY += Math.sign(dy);
touchY = t.clientY;
}
posX = Math.max(0, Math.min(WORLD_SIZE-1, posX));
posY = Math.max(0, Math.min(WORLD_SIZE-1, posY));
updatePos();
});
canvas.addEventListener('touchend', () => { touchX = null; touchY = null; });

function updatePos() {
db.ref('players/'+playerId).update({x:posX, y:posY});
}

function breakBlock() {
const key = Math.round(posX)+'_'+Math.round(posY);
if(worldData[key] !== null && worldData[key] !== undefined) {
delete worldData[key];
db.ref('world/'+key).remove();
}
}

function placeBlock() {
const key = Math.round(posX+1)+'_'+Math.round(posY);
if(!worldData[key]) {
worldData[key] = myBlock;
db.ref('world/'+key).set(myBlock);
}
}

function renderWorld() {
const s = cellSize;
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let y=0; y<WORLD_SIZE; y++) {
for(let x=0; x<WORLD_SIZE; x++) {
const key = x+'_'+y;
const block = worldData[key];
if(block !== null && block !== undefined) {
ctx.fillStyle = BLOCK_COLORS[block] || '#555';
ctx.fillRect(x*s, y*s, s, s);
ctx.strokeStyle = '#333';
ctx.lineWidth = 1;
ctx.strokeRect(x*s, y*s, s, s);
}
}
}
for(const id in players) {
const p = players[id];
if(!p || !p.nick) continue;
const px = p.x * s, py = p.y * s;
const isMe = id === playerId;
ctx.fillStyle = isMe ? '#f0c27f' : '#ff6b6b';
ctx.beginPath();
ctx.arc(px+s/2, py+s/2, s/2.5, 0, Math.PI*2);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = `${s/3}px sans-serif`;
ctx.textAlign = 'center';
ctx.fillText(p.nick, px+s/2, py-4);
if(isMe) {
ctx.strokeStyle = '#f0c27f';
ctx.lineWidth = 3;
ctx.strokeRect(px, py, s, s);
}
}
requestAnimationFrame(renderWorld);
}

function updatePlayerList() {
const container = document.getElementById('player-list');
container.innerHTML = '';
for(const id in players) {
const p = players[id];
if(!p || !p.nick) continue;
const div = document.createElement('div');
div.textContent = p.nick + (id===playerId?' (ты)':'');
if(id===playerId) div.className = 'me';
container.appendChild(div);
}
}

renderWorld();

setInterval(() => {
if(playerId) {
db.ref('players/'+playerId).update({hp:hp, food:food});
}
}, 2000);

window.addEventListener('beforeunload', () => {
if(playerId) db.ref('players/'+playerId).remove();
auth.signOut();
});
}

</script>
</body>
</html>
