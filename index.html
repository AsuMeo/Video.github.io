<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHONK EDIT GENERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Roboto', sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; padding: 1rem; }
        .preview-box { 
            width: 320px; 
            height: 570px; /* 9:16 aspect ratio */
            background: #000; 
            border: 2px solid #333; 
            margin: 0 auto; 
            overflow: hidden; 
            position: relative; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }
        canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            color: white;
            text-shadow: 0 0 10px rgba(255,0,0,0.8), 0 0 20px rgba(0,0,0,0.5);
            z-index: 10;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.5s ease-in-out;
            text-align: center;
        }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #f90000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 bg-gray-900 text-gray-200">
    <div class="container">
        <h1 class="text-3xl font-extrabold text-center mb-8 text-red-500 uppercase tracking-wide">PHONK EDIT ENGINE</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <!-- Левая колонка: Управление -->
            <div class="space-y-6 p-6 bg-gray-800 rounded-lg shadow-xl border border-gray-700">
                <div>
                    <label for="photoInput" class="block text-sm font-medium text-gray-300 mb-2">Загрузи фото для эдита (мин. 1)</label>
                    <div id="dropZone" class="w-full p-4 border-2 border-dashed border-gray-600 rounded-md text-center cursor-pointer hover:border-red-500 transition-colors duration-200">
                        <input type="file" id="photoInput" multiple accept="image/*" class="hidden">
                        <p class="text-gray-400">Перетащи фото сюда или <span class="text-red-400 font-semibold">нажми для выбора</span></p>
                        <p id="photoCount" class="text-sm mt-2 text-gray-500"></p>
                    </div>
                </div>
                
                <div>
                    <label for="templateSelect" class="block text-sm font-medium text-gray-300 mb-2">Выбери шаблон эдита</label>
                    <select id="templateSelect" class="w-full bg-gray-700 p-3 rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-red-500">
                        <option value="funk_bad_do_bad">FUNK BAD DO BAD</option>
                        <option value="drift_phonk">DRIFT PHONK STYLE</option>
                        <option value="strobe_rage">STROBE RAGE</option>
                        <option value="glitch_vibes">GLITCH VIBES</option>
                        <option value="vhs_rewind">VHS REWIND</option>
                        <option value="shake_punch">SHAKE PUNCH</option>
                        <option value="zoom_in">ZOOM IN</option>
                        <option value="rgb_punch">RGB PUNCH</option>
                        <option value="neon_fade">NEON FADE</option>
                        <option value="deep_bass">DEEP BASS</option>
                        <option value="cinematic">CINEMATIC</option>
                        <option value="manga_glitch">MANGA GLITCH</option>
                        <option value="cyberpunk">CYBERPUNK</option>
                        <option value="retro_wave">RETRO WAVE</option>
                        <option value="hyperpop">HYPERPOP</option>
                        <option value="ghosting">GHOSTING</option>
                    </select>
                </div>

                <div>
                    <label for="startText" class="block text-sm font-medium text-gray-300 mb-2">Стартовый текст (опционально)</label>
                    <input type="text" id="startText" placeholder="Будь как нефор..." class="w-full bg-gray-700 p-3 rounded-md border border-gray-600 focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
                
                <div>
                    <label for="duration" class="block text-sm font-medium text-gray-300 mb-2">Длительность эдита (сек): <span id="durVal" class="font-semibold text-red-400">10</span></label>
                    <input type="range" id="duration" min="5" max="30" value="10" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer focus:outline-none focus:ring-red-500 focus:ring-2">
                </div>

                <div class="bg-gray-700 p-4 rounded-md border border-gray-600">
                    <label for="audioInput" class="block text-sm font-medium text-gray-300 mb-2">Загрузи свою музыку</label>
                    <input type="file" id="audioInput" accept="audio/*" class="w-full bg-gray-600 p-2 rounded-md mb-3 text-sm">
                    <label for="audioStart" class="block text-sm font-medium text-gray-300 mb-2">Начало аудио (сек): <span id="audioStartVal" class="font-semibold text-red-400">0</span></label>
                    <input type="range" id="audioStart" min="0" max="0" value="0" step="0.1" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer focus:outline-none focus:ring-red-500 focus:ring-2">
                    <p id="audioDurationInfo" class="text-xs text-gray-400 mt-2"></p>
                </div>

                <button id="renderBtn" class="w-full bg-red-600 py-3 font-bold rounded-md hover:bg-red-700 transition-colors duration-200 text-lg uppercase shadow-lg focus:outline-none focus:ring-2 focus:ring-red-500">СОЗДАТЬ И СКАЧАТЬ ЭДИТ</button>
            </div>

            <!-- Правая колонка: Превью -->
            <div class="preview-box relative">
                <canvas id="editCanvas" width="320" height="570"></canvas>
                <div id="overlayText" class="overlay-text"></div>
                
                <div id="loadingOverlay" class="loading-overlay">
                    <div class="spinner mb-4"></div>
                    <p id="loadingText" class="text-white text-lg font-semibold">Рендеринг видео...</p>
                    <p class="text-sm text-gray-400 mt-2">Это может занять некоторое время.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editCanvas');
        const ctx = canvas.getContext('2d');

        const photoInput = document.getElementById('photoInput');
        const dropZone = document.getElementById('dropZone');
        const photoCountDisplay = document.getElementById('photoCount');
        const templateSelect = document.getElementById('templateSelect');
        const startTextInput = document.getElementById('startText');
        const durationInput = document.getElementById('duration');
        const durValDisplay = document.getElementById('durVal');
        const audioInput = document.getElementById('audioInput');
        const audioStartInput = document.getElementById('audioStart');
        const audioStartValDisplay = document.getElementById('audioStartVal');
        const audioDurationInfo = document.getElementById('audioDurationInfo');
        const renderBtn = document.getElementById('renderBtn');
        const overlayTextElement = document.getElementById('overlayText');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        let loadedImages = [];
        let audioBuffer = null;
        let audioContext = null;
        let animationFrameId = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let audioSourceNode = null;
        let gainNode = null;
        let audioOutputNode = null; // For MediaRecorder

        // --- UI Listeners ---
        dropZone.addEventListener('click', () => photoInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-red-500');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-red-500');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-red-500');
            photoInput.files = e.dataTransfer.files;
            handlePhotoFiles(e.dataTransfer.files);
        });

        photoInput.addEventListener('change', (e) => handlePhotoFiles(e.target.files));

        function handlePhotoFiles(files) {
            loadedImages = [];
            photoCountDisplay.textContent = `Загружено: ${files.length} фото.`;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => loadedImages.push(img);
                };
                reader.readAsDataURL(file);
            });
        }

        durationInput.addEventListener('input', () => {
            durValDisplay.textContent = durationInput.value;
            // Update audio max start time if audio is loaded
            if (audioBuffer) {
                const maxStartTime = Math.max(0, audioBuffer.duration - parseFloat(durationInput.value));
                audioStartInput.max = maxStartTime.toFixed(1);
            }
        });

        audioInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            loadingOverlay.classList.add('active');
            loadingText.textContent = 'Загрузка и обработка аудио...';

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            try {
                const arrayBuffer = await file.arrayBuffer();
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                audioDurationInfo.textContent = `Длительность трека: ${audioBuffer.duration.toFixed(1)} сек.`;
                
                const maxStartTime = Math.max(0, audioBuffer.duration - parseFloat(durationInput.value));
                audioStartInput.max = maxStartTime.toFixed(1);
                audioStartInput.value = 0;
                audioStartValDisplay.textContent = '0';
                
            } catch (error) {
                console.error("Error decoding audio:", error);
                alert("Не удалось загрузить или обработать аудио. Убедитесь, что это поддерживаемый формат.");
                audioBuffer = null;
                audioDurationInfo.textContent = 'Ошибка загрузки аудио.';
                audioStartInput.max = 0;
                audioStartInput.value = 0;
            } finally {
                loadingOverlay.classList.remove('active');
            }
        });

        audioStartInput.addEventListener('input', () => {
            audioStartValDisplay.textContent = audioStartInput.value;
        });

        renderBtn.addEventListener('click', startRenderAndRecord);

        // --- Core Render & Export Logic ---

        const FPS = 30; // Frames per second for the output video

        async function startRenderAndRecord() {
            if (loadedImages.length === 0) {
                alert("Пожалуйста, загрузите хотя бы одно фото!");
                return;
            }
            if (!audioBuffer) {
                alert("Пожалуйста, загрузите музыку!");
                return;
            }

            renderBtn.disabled = true;
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'Начинаем рендеринг...';

            const videoDuration = parseFloat(durationInput.value);
            const audioStartTime = parseFloat(audioStartInput.value);
            const selectedTemplate = templateSelect.value;
            const startText = startTextInput.value;

            // Prepare audio for recording
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioSourceNode) audioSourceNode.stop(); // Stop any previous playback

            audioSourceNode = audioContext.createBufferSource();
            audioSourceNode.buffer = audioBuffer;

            // Create a MediaStreamDestinationNode to capture audio
            audioOutputNode = audioContext.createMediaStreamDestination();
            audioSourceNode.connect(audioOutputNode);

            // Connect to real speakers for live preview during recording (optional, could be muted)
            // audioSourceNode.connect(audioContext.destination); 
            // Better to not connect to destination if we only want to record

            // Prepare video stream from canvas
            const canvasStream = canvas.captureStream(FPS);

            // Combine video and audio streams
            const combinedStream = new MediaStream([
                ...canvasStream.getVideoTracks(),
                ...audioOutputNode.stream.getAudioTracks()
            ]);

            mediaRecorder = new MediaRecorder(combinedStream, {
                mimeType: 'video/webm; codecs="vp8, opus"',
                videoBitsPerSecond: 2500000, // 2.5 Mbps
                audioBitsPerSecond: 128000 // 128 Kbps
            });
            recordedChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `edit_${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                
                loadingOverlay.classList.remove('active');
                renderBtn.disabled = false;
                alert("Эдит успешно скачан!");
            };

            mediaRecorder.start();
            audioSourceNode.start(0, audioStartTime, videoDuration); // Play audio for exact video duration

            // Start animation loop for recording
            let startTime = performance.now();
            let lastFrameTime = startTime;
            let currentImageIndex = 0;
            let textVisible = startText !== ''; // Show text if provided

            if (textVisible) {
                overlayTextElement.textContent = startText;
                overlayTextElement.style.opacity = 1;
            }

            function animate(currentTime) {
                const elapsed = (currentTime - startTime) / 1000; // in seconds
                const deltaTime = (currentTime - lastFrameTime) / 1000;
                lastFrameTime = currentTime;

                if (elapsed >= videoDuration) {
                    stopRecording();
                    return;
                }

                // Calculate image change timing
                const imageChangeInterval = videoDuration / loadedImages.length;
                if (elapsed % imageChangeInterval < deltaTime) { // Check if it's time for a new image
                     currentImageIndex = (currentImageIndex + 1) % loadedImages.length;
                }
                
                const currentImage = loadedImages[currentImageIndex];

                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Apply template-specific effects
                applyTemplateEffects(ctx, currentImage, selectedTemplate, elapsed, videoDuration);

                // Hide text after initial few seconds
                if (textVisible && elapsed > Math.min(3, videoDuration / 3)) {
                    overlayTextElement.style.opacity = 0;
                    textVisible = false;
                }
                
                animationFrameId = requestAnimationFrame(animate);
            }

            animationFrameId = requestAnimationFrame(animate);
        }

        function stopRecording() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (audioSourceNode) {
                audioSourceNode.stop();
                audioSourceNode.disconnect(); // Disconnect from output
                audioSourceNode = null;
            }
            overlayTextElement.style.opacity = 0; // Hide text after recording
        }

        // --- Effect Library ---
        function applyTemplateEffects(ctx, img, template, time, totalDuration) {
            const width = canvas.width;
            const height = canvas.height;

            // Reset context for each frame
            ctx.filter = 'none';
            ctx.globalAlpha = 1;
            ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transformations

            let scale = 1;
            let translateX = 0;
            let translateY = 0;
            let rotate = 0;

            const imageRatio = img.width / img.height;
            const canvasRatio = width / height;

            let drawWidth, drawHeight, offsetX, offsetY;

            // Calculate initial drawing size to cover canvas (like object-fit: cover)
            if (imageRatio > canvasRatio) { // Image wider than canvas
                drawHeight = height;
                drawWidth = img.width * (height / img.height);
                offsetX = (width - drawWidth) / 2;
                offsetY = 0;
            } else { // Image taller than canvas
                drawWidth = width;
                drawHeight = img.height * (width / img.width);
                offsetX = 0;
                offsetY = (height - drawHeight) / 2;
            }

            switch (template) {
                case 'funk_bad_do_bad':
                case 'drift_phonk':
                    // Subtle pan and zoom, fast flashes
                    scale = 1 + Math.sin(time * 2) * 0.05;
                    translateX = Math.sin(time * 3) * 10;
                    translateY = Math.cos(time * 2.5) * 8;
                    if (Math.random() < 0.1) ctx.filter = `brightness(2) contrast(1.5)`; // Flash
                    if (time % 1 < 0.2) ctx.filter = `hue-rotate(${Math.sin(time*20)*10}deg) brightness(1.2) contrast(1.1)`;
                    break;
                case 'strobe_rage':
                    // Intense strobing and shake
                    if (Math.floor(time * 10) % 2 === 0) ctx.filter = `brightness(2) contrast(1.5) saturate(2)`;
                    else ctx.filter = `brightness(0.5) contrast(2) saturate(2)`;
                    translateX = Math.sin(time * 50) * 10;
                    translateY = Math.cos(time * 50) * 10;
                    rotate = Math.sin(time * 30) * 0.01;
                    break;
                case 'glitch_vibes':
                    // Random glitches, color shifts
                    if (Math.random() < 0.05) { // Occasional major glitch
                        ctx.filter = `hue-rotate(${Math.random() * 360}deg) contrast(2) saturate(3)`;
                        ctx.setTransform(1.0 + Math.random() * 0.05, Math.random() * 0.02, Math.random() * 0.02, 1.0 + Math.random() * 0.05, Math.random() * 20 - 10, Math.random() * 20 - 10);
                    } else if (Math.random() < 0.1) { // Minor pixel shift
                        translateX = Math.random() * 5 - 2.5;
                        translateY = Math.random() * 5 - 2.5;
                    }
                    break;
                case 'vhs_rewind':
                    // Old tape look, scanlines, color bleed
                    ctx.filter = `contrast(1.2) sepia(0.5) saturate(1.5) blur(${Math.sin(time*5)*0.5 + 0.5}px)`;
                    ctx.globalAlpha = 0.95 + Math.sin(time * 15) * 0.05; // Random flicker
                    translateX = Math.sin(time * 7) * 3;
                    translateY = Math.cos(time * 8) * 2;
                    // Add subtle scanlines (requires drawing separate rects or a pattern) - simplified for canvas.
                    break;
                case 'shake_punch':
                    // Strong shake on photo change
                    const imageChangeIntervalShake = totalDuration / loadedImages.length;
                    if (time % imageChangeIntervalShake < 0.1 && time % imageChangeIntervalShake > 0) { // On image change
                         translateX = Math.random() * 40 - 20;
                         translateY = Math.random() * 40 - 20;
                         rotate = Math.random() * 0.05 - 0.025;
                         ctx.filter = `brightness(1.8) contrast(1.5)`;
                    } else {
                        translateX = Math.sin(time * 30) * 5;
                        translateY = Math.cos(time * 25) * 5;
                    }
                    scale = 1 + Math.sin(time * 5) * 0.02;
                    break;
                case 'zoom_in':
                    // Continuous zoom in
                    scale = 1 + (time / totalDuration) * 0.5;
                    translateX = Math.sin(time * 2) * 5;
                    translateY = Math.cos(time * 2) * 5;
                    break;
                case 'rgb_punch':
                    // RGB split effect with punchy transitions
                    const rgbOffset = Math.sin(time * 15) * 5; // Rapid RGB shift
                    ctx.filter = `drop-shadow(${rgbOffset}px 0 0 red) drop-shadow(${-rgbOffset}px 0 0 blue) brightness(1.1) contrast(1.1)`;
                    if (Math.random() < 0.08) ctx.filter += ` saturate(3) brightness(1.5)`;
                    scale = 1 + Math.sin(time * 7) * 0.03;
                    translateX = Math.sin(time * 10) * 7;
                    break;
                case 'neon_fade':
                    // Photos slowly fade with neon-like glow
                    ctx.filter = `brightness(1.1) saturate(1.3) hue-rotate(${Math.sin(time * 0.5) * 30}deg) drop-shadow(0 0 10px rgba(255,0,255,0.7))`;
                    ctx.globalAlpha = 0.8 + Math.sin(time * 1) * 0.2; // Gentle fade in/out
                    scale = 1 + Math.sin(time * 0.3) * 0.02;
                    break;
                case 'deep_bass':
                    // Subtle shake and brightness pulse on a "beat"
                    const beat = Math.sin(time * 10); // Simulated bass beat
                    translateX = beat * 5;
                    translateY = beat * 5;
                    scale = 1 + beat * 0.02;
                    ctx.filter = `brightness(1 + ${beat * 0.2}) contrast(1.1)`;
                    break;
                case 'cinematic':
                    // Slow pan, subtle zoom, desaturated colors
                    ctx.filter = `grayscale(0.3) contrast(1.1) brightness(1.05)`;
                    scale = 1 + (time / totalDuration) * 0.1;
                    translateX = Math.sin(time * 0.2) * 15;
                    translateY = Math.cos(time * 0.2) * 10;
                    break;
                case 'manga_glitch':
                    // Black and white, halftone-like effect with sudden glitches
                    ctx.filter = `grayscale(1) contrast(2) brightness(0.8) blur(${Math.random() < 0.05 ? 2 : 0}px)`;
                    if (Math.random() < 0.07) {
                        ctx.filter += ` hue-rotate(${Math.random() * 360}deg)`;
                        ctx.globalAlpha = 0.5 + Math.random() * 0.5;
                    }
                    break;
                case 'cyberpunk':
                    // Neon colors, chromatic aberration, scanlines
                    const cybOffset = Math.sin(time * 18) * 8;
                    ctx.filter = `contrast(1.5) saturate(2) brightness(1.2) hue-rotate(${Math.sin(time * 0.8) * 20}deg) drop-shadow(${cybOffset}px 0 0 rgba(0,255,255,0.5)) drop-shadow(${-cybOffset}px 0 0 rgba(255,0,255,0.5))`;
                    translateX = Math.sin(time * 12) * 5;
                    translateY = Math.cos(time * 10) * 5;
                    break;
                case 'retro_wave':
                    // Purple/pink hues, gentle glow, slow movement
                    ctx.filter = `saturate(1.5) contrast(1.2) brightness(1.1) hue-rotate(${Math.sin(time * 0.4) * 15 + 280}deg) drop-shadow(0 0 8px rgba(255,100,200,0.6))`;
                    scale = 1 + Math.sin(time * 0.2) * 0.03;
                    translateX = Math.sin(time * 0.5) * 8;
                    translateY = Math.cos(time * 0.6) * 7;
                    break;
                case 'hyperpop':
                    // Extremely saturated, high contrast, rapid color shifts, quick zooms
                    ctx.filter = `saturate(5) contrast(2) brightness(1.5) hue-rotate(${Math.sin(time * 10) * 180}deg)`;
                    scale = 1 + Math.abs(Math.sin(time * 8)) * 0.1;
                    translateX = Math.sin(time * 25) * 10;
                    translateY = Math.cos(time * 20) * 10;
                    break;
                case 'ghosting':
                    // Fading trails, subtle movement, desaturated
                    ctx.filter = `grayscale(0.5) contrast(1.2)`;
                    ctx.globalAlpha = 0.7 + Math.sin(time * 2) * 0.1; // Make it semi-transparent
                    scale = 1 + Math.sin(time * 0.7) * 0.02;
                    translateX = Math.sin(time * 0.9) * 10;
                    translateY = Math.cos(time * 0.8) * 8;
                    ctx.drawImage(canvas, 0, 0, width, height); // Draw previous frame for ghosting
                    break;
            }

            // Apply transformations
            ctx.translate(width / 2 + translateX, height / 2 + translateY);
            ctx.rotate(rotate);
            ctx.scale(scale, scale);
            ctx.translate(-(width / 2), -(height / 2));

            // Draw image
            ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
        }

        // Initial setup for the canvas
        function setupCanvas() {
            canvas.width = 320;
            canvas.height = 570;
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
        }

        setupCanvas();

        // Initial image load and template select to show something
        const demoImageUrl = 'https://via.placeholder.com/320x570/000000/FFFFFF?text=PHONK'; // Example placeholder
        const demoImage = new Image();
        demoImage.src = demoImageUrl;
        demoImage.onload = () => {
            loadedImages.push(demoImage);
            photoCountDisplay.textContent = `Загружено: 1 фото (демо)`;
            // Draw initial image to canvas
            ctx.drawImage(demoImage, 0, 0, canvas.width, canvas.height);
        };
    </script>
</body>
</html>
