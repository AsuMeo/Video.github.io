if(n==='templates')document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>template(b.dataset.t));if(n==='effects')document.querySelectorAll('[data-motion]').forEach(b=>b.onclick=()=>appendMotion(b.dataset.motion,+$('#effectSeconds').value));if(n==='project'){$('#projectName').onchange=e=>{P.name=e.target.value.trim()||'Без названия';$('#projectTop').textContent=P.name;scheduleSave()};$('#bgColor').oninput=e=>{$('#bgText').value=P.bg=e.target.value;render()};$('#bgColor').onchange=()=>{saveState();timeline()};$('#bgText').onchange=e=>{P.bg=e.target.value;saveState();renderAll()};$('#ghost').onclick=()=>{onion=!onion;$('#onion').classList.toggle('on',onion);render();showPanel('project')};$('#transparent').onclick=()=>{P.transparent=!P.transparent;saveState();renderAll()};$('#new').onclick=newDialog;$('#saveP').onclick=()=>saveProject();$('#projects').onclick=listProjects;$('#video').onclick=$('#renderVideo').onclick=()=>exportVideo(+$('#quality').value);$('#exportP').onclick=exportFile;$('#importP').onclick=()=>$('#projectFile').click();$('#png').onclick=png;$('#install').onclick=install}}
function layerList(){let root=$('#layerList');[...P.layers].sort((a,b)=>b.z-a.z).forEach(l=>{let r=document.createElement('div');r.className='layer'+(l.id===selected?' active':'');let im=document.createElement('img');im.src=l.src;let inf=document.createElement('div');inf.className='layerInfo';inf.innerHTML=`<b>${esc(l.name)}</b><small>${l.role} · ${l.parent?'связано':'корень'}</small>`;let e=document.createElement('button');e.className='tiny';e.textContent=l.visible?'◉':'○';e.onclick=q=>{q.stopPropagation();l.visible=!l.visible;saveState();renderAll()};r.append(im,inf,e);r.onclick=()=>{selected=l.id;render();showPanel('parts')};root.append(r)})}
function duplicateLayer(){let l=P.layers.find(x=>x.id===selected);if(!l)return toast('Выберите часть');let n=cp(l),old=l.id;n.id=uid();n.name+=' копия';n.role='custom';n.z=Math.max(...P.layers.map(x=>x.z))+1;P.layers.push(n);P.frames.forEach(f=>{f.pose[n.id]=cp(f.pose[old]);f.pose[n.id].x+=18;f.pose[n.id].y+=18});selected=n.id;loadImg(n).then(()=>{saveState();renderAll()})}function deleteLayer(){if(!selected)return;P.layers=P.layers.filter(x=>x.id!==selected);P.layers.forEach(x=>{if(x.parent===selected)x.parent=null});P.frames.forEach(f=>delete f.pose[selected]);selected=null;saveState();renderAll()}function descendant(a,b){let l=P.layers.find(x=>x.id===a);while(l?.parent){if(l.parent===b)return true;l=P.layers.find(x=>x.id===l.parent)}return false}function changeParent(parent){if(!selected)return;if(parent&&descendant(parent,selected))return toast('Циклическая связь запрещена');let l=P.layers.find(x=>x.id===selected),world=WP(selected),s=S(selected);l.parent=parent;if(parent){let q=new DOMPoint(world.x,world.y).matrixTransform(M(parent).inverse());s.x=q.x;s.y=q.y}else{s.x=world.x;s.y=world.y}saveState();renderAll()}
function pt(e){let r=C.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}}function hit(p){for(let l of [...P.layers].sort((a,b)=>b.z-a.z)){if(!l.visible||l.locked)continue;try{let q=new DOMPoint(p.x,p.y).matrixTransform(M(l.id).inverse());if(q.x>=0&&q.y>=0&&q.x<=l.w&&q.y<=l.h)return l.id}catch{}}return null}C.onpointerdown=e=>{if(playing)return;C.setPointerCapture(e.pointerId);let p=pt(e),id=hit(p);if(!id){selected=null;render();return}selected=id;let l=P.layers.find(x=>x.id===id),q=l.parent?new DOMPoint(p.x,p.y).matrixTransform(M(l.parent).inverse()):p,s=S(id);drag={pointer:e.pointerId,start:q,x:s.x,y:s.y,moved:false};render();if(panelName)showPanel(panelName)};C.onpointermove=e=>{if(!drag||drag.pointer!==e.pointerId)return;let p=pt(e),l=P.layers.find(x=>x.id===selected),q=l.parent?new DOMPoint(p.x,p.y).matrixTransform(M(l.parent).inverse()):p,s=S(selected);s.x=drag.x+q.x-drag.start.x;s.y=drag.y+q.y-drag.start.y;drag.moved=true;render();outputs()};C.onpointerup=e=>{if(drag?.pointer===e.pointerId){if(drag.moved){saveState();timeline()}drag=null}};C.onpointercancel=()=>drag=null;
function modal(h){$('#dialog').innerHTML=h;$('#modal').classList.remove('hidden')}function hideModal(){$('#modal').classList.add('hidden')}function fileData(f){return new Promise((r,j)=>{let x=new FileReader;x.onload=()=>r(x.result);x.onerror=j;x.readAsDataURL(f)})}function decode(src){return new Promise((r,j)=>{let i=new Image;i.onload=()=>r(i);i.onerror=j;i.src=src})}async function importImages(fs){for(let f of fs){let src=await fileData(f),im=await decode(src),sc=Math.min(1,350/im.width,450/im.height),id=uid(),l={id,name:f.name.replace(/\.[^.]+$/,''),role:'custom',src,w:im.width,h:im.height,z:P.layers.length?Math.max(...P.layers.map(x=>x.z))+1:0,parent:null,visible:true,locked:false};P.layers.push(l);imgs.set(id,im);P.frames.forEach(fr=>fr.pose[id]={x:W/2,y:H/2,rotation:0,scaleX:sc,scaleY:sc,opacity:1,pivotX:.5,pivotY:.5});selected=id}saveState();renderAll();toast('Части импортированы')}
function openDB(){return new Promise((r,j)=>{let q=indexedDB.open(DB,1);q.onupgradeneeded=()=>q.result.createObjectStore('projects',{keyPath:'id'});q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}async function saveProject(silent=false){try{P.updated=Date.now();let d=await openDB(),tx=d.transaction('projects','readwrite');tx.objectStore('projects').put(cp(P));await new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=()=>j(tx.error)});localStorage.setItem('kage-pro-last',P.id);if(!silent)toast('Проект сохранён')}catch(e){console.error(e);toast('Ошибка локального хранилища')}}function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveProject(true),1200)}async function getProjects(){let d=await openDB(),q=d.transaction('projects').objectStore('projects').getAll();return new Promise((r,j)=>{q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}async function listProjects(){let ps=(await getProjects()).sort((a,b)=>b.updated-a.updated);modal(`<h2>Мои проекты</h2><div id="plist"></div><div class="dlgActions"><button class="dlg primary" id="pc">Закрыть</button></div>`);let r=$('#plist');ps.forEach(p=>{let b=document.createElement('button');b.className='projectCard';b.innerHTML=`<div><b>${esc(p.name)}</b><small>${p.frames.length} кадров · ${durationFor(p).toFixed(1)} сек.</small></div>›`;b.onclick=()=>loadProject(p);r.append(b)});if(!ps.length)r.innerHTML='<div class="notice">Проектов пока нет.</div>';$('#pc').onclick=hideModal}function durationFor(p){return p.frames.reduce((a,f)=>a+(f.hold||1),0)/p.fps}async function loadProject(p){P=cp(p);fi=0;selected=P.layers.find(x=>x.role==='head')?.id||P.layers.at(-1)?.id;$('#projectTop').textContent=P.name;$('#fps').value=P.fps;hideModal();closeDrawer();resetHistory();await loadAll();toast('Проект открыт')}function newDialog(){modal(`<h2>Новый проект?</h2><p>Несохранённые изменения могут потеряться.</p><div class="dlgActions"><button class="dlg" id="nc">Отмена</button><button class="dlg primary" id="ny">Создать</button></div>`);$('#nc').onclick=hideModal;$('#ny').onclick=()=>{hideModal();closeDrawer();P={id:'p'+Date.now(),name:'Новый проект',fps:12,bg:'#202333',transparent:false,layers:[],frames:[],updated:Date.now()};$('#projectTop').textContent=P.name;fresh()}}
function download(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.append(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1500)}function exportFile(){download(new Blob([JSON.stringify(P)],{type:'application/json'}),(P.name||'project')+'.kage.json')}function png(){let c=document.createElement('canvas');c.width=1080;c.height=1920;draw(c.getContext('2d'),pose(),P.frames[fi],{scale:2});c.toBlob(b=>download(b,(P.name||'frame')+'.png'),'image/png')}
async function exportVideo(scale=2){if(!HTMLCanvasElement.prototype.captureStream||!window.MediaRecorder)return toast('Экспорт видео не поддерживается этим браузером');let mime=['video/mp4;codecs=avc1.42E01E','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(MediaRecorder.isTypeSupported);if(!mime)return toast('Нет доступного видеокодека');let total=duration();modal(`<h2>Рендер видео · ${total.toFixed(1)} сек.</h2><p>Видео записывается в реальном времени. Не сворачивайте страницу.</p><div class="progress"><i id="bar"></i></div><div id="status">0%</div><div class="dlgActions"><button class="dlg" id="cancelRender">Отмена</button></div>`);let cancel=false;$('#cancelRender').onclick=()=>cancel=true;let out=document.createElement('canvas');out.width=W*scale;out.height=H*scale;let oc=out.getContext('2d'),stream=out.captureStream(Math.min(30,P.fps)),chunks=[],rec;try{rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:scale===2?10000000:4500000})}catch{rec=new MediaRecorder(stream,{mimeType:mime})}rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};let ended=new Promise(r=>rec.onstop=r);rec.start(500);let started=performance.now(),last=-1;while(!cancel){let sec=(performance.now()-started)/1000;if(sec>=total)break;let idx=frameAtTick(Math.floor(sec*P.fps));if(idx!==last){let f=P.frames[idx];draw(oc,f.pose,f,{scale});last=idx}$('#bar').style.width=Math.min(100,sec/total*100)+'%';$('#status').textContent=`${Math.floor(sec/total*100)}% · ${sec.toFixed(1)} / ${total.toFixed(1)} сек.`;await new Promise(requestAnimationFrame)}await new Promise(r=>setTimeout(r,180));rec.stop();await ended;stream.getTracks().forEach(t=>t.stop());hideModal();if(cancel)return toast('Экспорт отменён');if(!chunks.length)return toast('Браузер не записал видео');let ext=mime.includes('mp4')?'mp4':'webm';download(new Blob(chunks,{type:mime}),(P.name||'animation')+'.'+ext);toast('Видео готово: '+total.toFixed(1)+' сек.')}
async function install(){if(installPrompt){installPrompt.prompt();await installPrompt.userChoice;installPrompt=null}else toast('Меню браузера → «Добавить на главный экран»')}
$('#undo').onclick=undo;$('#redo').onclick=redo;$('#save').onclick=()=>saveProject();$('#export').onclick=()=>openDrawer('project');$('#play').onclick=play;$('#first').onclick=()=>setFrame(0);$('#prev').onclick=()=>setFrame(fi-1);$('#next').onclick=()=>setFrame(fi+1);$('#fps').onchange=e=>{P.fps=+e.target.value;saveState();renderAll()};$('#bones').onclick=()=>{boneView=!boneView;$('#bones').classList.toggle('on',boneView);render()};$('#onion').onclick=()=>{onion=!onion;$('#onion').classList.toggle('on',onion);render()};$('#fit').onclick=fit;document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>openDrawer(b.dataset.panel));$('#close').onclick=closeDrawer;$('#shade').onclick=closeDrawer;let sy=0;$('#grabArea').onpointerdown=e=>{sy=e.clientY;$('#grabArea').setPointerCapture(e.pointerId)};$('#grabArea').onpointerup=e=>{if(e.clientY-sy>30)closeDrawer()};$('#modal').onclick=e=>{if(e.target===$('#modal'))hideModal()};$('#images').onchange=e=>{importImages([...e.target.files]);e.target.value=''};$('#projectFile').onchange=async e=>{try{let p=JSON.parse(await e.target.files[0].text());if(!p.layers||!p.frames)throw 0;p.id='p'+Date.now();await loadProject(p);saveProject(true)}catch{toast('Повреждённый файл')}e.target.value=''};window.onresize=fit;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e});
const icon='<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><defs><linearGradient id="g"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#d84fd8"/></linearGradient></defs><rect width="512" height="512" rx="110" fill="#111319"/><path d="M105 88h100v132L333 88h116L288 246l169 180H330L205 284v142H105z" fill="url(#g)"/></svg>',iu='data:image/svg+xml,'+E(icon),manifest={name:'Kage Studio Pro',short_name:'Kage Pro',start_url:location.pathname,display:'standalone',orientation:'portrait',background_color:'#07080c',theme_color:'#090a0f',icons:[{src:iu,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};let ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));document.head.append(ml);let ai=document.createElement('link');ai.rel='apple-touch-icon';ai.href=iu;document.head.append(ai);
(async()=>{let last=localStorage.getItem('kage-pro-last');if(last)try{let p=(await getProjects()).find(x=>x.id===last);if(p){await loadProject(p);return}}catch{}fresh();setTimeout(()=>{openDrawer('templates');toast('Выберите 10-секундный шаблон ✦')},600)})();
