<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="screen-orientation" content="landscape">
  <title>⛏️ MINECRAFT OPTIMIZED</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      position: fixed;
      touch-action: none;
    }
    
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    #fullscreen-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 24px;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      pointer-events: none;
      z-index: 10;
      opacity: 0.8;
    }
    
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: #fff;
    }
    
    #crosshair::before {
      width: 2px;
      height: 30px;
      left: 14px;
      top: 0;
    }
    
    #crosshair::after {
      width: 30px;
      height: 2px;
      left: 0;
      top: 14px;
    }
    
    #hotbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.8);
      padding: 10px 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      z-index: 20;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }
    
    .hotbar-slot {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      position: relative;
      transition: all 0.15s;
    }
    
    .hotbar-slot.selected {
      border-color: #fff;
      background: rgba(255,255,255,0.3);
      box-shadow: 0 0 25px rgba(255,255,255,0.5);
      transform: scale(1.1);
    }
    
    .hotbar-slot .count {
      position: absolute;
      bottom: -2px;
      right: -2px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: bold;
      min-width: 18px;
      text-align: center;
    }
    
    #controls-left {
      position: fixed;
      bottom: 30px;
      left: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    #controls-right {
      position: fixed;
      bottom: 30px;
      right: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .ctrl-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.1s;
    }
    
    .ctrl-btn:active {
      background: rgba(255,255,255,0.3);
      transform: scale(0.85);
    }
    
    .ctrl-btn.jump {
      width: 64px;
      height: 64px;
      font-size: 28px;
      border-color: rgba(255,255,255,0.5);
    }
    
    #joystick-container {
      position: fixed;
      bottom: 30px;
      left: 100px;
      width: 130px;
      height: 130px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      z-index: 20;
      touch-action: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    
    #joystick-thumb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 55px;
      height: 55px;
      background: rgba(255,255,255,0.5);
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }
    
    #health-display {
      position: fixed;
      top: 15px;
      left: 15px;
      display: flex;
      gap: 3px;
      z-index: 20;
    }
    
    .heart-icon {
      font-size: 20px;
      filter: drop-shadow(1px 1px 0 #000);
    }
    
    #block-label {
      position: fixed;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 20;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    
    #fps-display {
      position: fixed;
      top: 15px;
      right: 80px;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      z-index: 20;
      pointer-events: none;
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
  
  <div id="crosshair"></div>
  <div id="fps-display">FPS: --</div>
  <div id="block-label">🟫 Земля</div>
  
  <div id="health-display">
    <span class="heart-icon">❤️</span><span class="heart-icon">❤️</span>
    <span class="heart-icon">❤️</span><span class="heart-icon">❤️</span>
    <span class="heart-icon">❤️</span><span class="heart-icon">❤️</span>
    <span class="heart-icon">❤️</span><span class="heart-icon">❤️</span>
    <span class="heart-icon">❤️</span><span class="heart-icon">❤️</span>
  </div>
  
  <div id="hotbar">
    <div class="hotbar-slot selected" data-slot="0"><span class="count">64</span></div>
    <div class="hotbar-slot" data-slot="1"></div>
    <div class="hotbar-slot" data-slot="2"></div>
    <div class="hotbar-slot" data-slot="3"></div>
    <div class="hotbar-slot" data-slot="4"></div>
  </div>
  
  <div id="controls-left">
    <div class="ctrl-btn" id="break-btn">⛏️</div>
    <div class="ctrl-btn" id="place-btn">🧱</div>
  </div>
  
  <div id="controls-right">
    <div class="ctrl-btn jump" id="jump-btn">⬆️</div>
  </div>
  
  <div id="joystick-container">
    <div id="joystick-thumb"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
      }
    }
  </script>
  
  <script type="module">
    import * as THREE from 'three';
    
    // ============ ОПТИМИЗИРОВАННЫЙ MINECRAFT ============
    
    // Форсируем ландшафтный режим
    function lockOrientation() {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    }
    lockOrientation();
    window.addEventListener('orientationchange', lockOrientation);
    
    // Полный экран
    window.toggleFullscreen = function() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    };
    
    // ============ THREE.JS ОПТИМИЗАЦИЯ ============
    
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ 
      canvas,
      antialias: false,
      powerPreference: "high-performance",
      precision: "lowp"
    });
    
    renderer.setPixelRatio(1);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 50);
    
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 60);
    camera.position.set(0, 12, 8);
    
    // Простое быстрое освещение
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(1, 1, 0.5);
    scene.add(dirLight);
    
    const ambLight = new THREE.AmbientLight(0x8899bb, 0.7);
    scene.add(ambLight);
    
    // ============ ПРОСТЫЕ ТЕКСТУРЫ (1 АТЛАС) ============
    
    function createBlockTexture(r, g, b, darken = false) {
      const c = document.createElement('canvas');
      c.width = 16;
      c.height = 16;
      const ctx = c.getContext('2d');
      
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(0, 0, 16, 16);
      
      // Простые детали без циклов
      ctx.fillStyle = `rgba(0,0,0,0.15)`;
      ctx.fillRect(0, 0, 8, 8);
      ctx.fillRect(8, 8, 8, 8);
      
      ctx.fillStyle = `rgba(255,255,255,0.1)`;
      ctx.fillRect(8, 0, 8, 8);
      ctx.fillRect(0, 8, 8, 8);
      
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(0, 0, 16, 16);
      
      const tex = new THREE.CanvasTexture(c);
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.NearestFilter;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    
    const TEX = {
      grass_top: createBlockTexture(100, 180, 60),
      grass_side: createBlockTexture(80, 150, 40),
      dirt: createBlockTexture(130, 100, 50),
      stone: createBlockTexture(120, 120, 120),
      wood: createBlockTexture(140, 100, 40),
      leaves: createBlockTexture(40, 140, 40),
      sand: createBlockTexture(230, 210, 140),
      plank: createBlockTexture(180, 140, 60),
      brick: createBlockTexture(170, 60, 40),
      glass: createBlockTexture(180, 220, 255),
      gold: createBlockTexture(255, 210, 0),
      diamond: createBlockTexture(60, 230, 255),
      bedrock: createBlockTexture(30, 30, 30)
    };
    
    // ============ ГЕОМЕТРИЯ (переиспользуем) ============
    
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const materialCache = {};
    
    function getBlockMaterial(type) {
      if (materialCache[type]) return materialCache[type];
      
      let topTex, sideTex, bottomTex;
      switch(type) {
        case 'grass':
          topTex = TEX.grass_top;
          sideTex = TEX.grass_side;
          bottomTex = TEX.dirt;
          break;
        case 'dirt':
          topTex = sideTex = bottomTex = TEX.dirt;
          break;
        case 'stone':
          topTex = sideTex = bottomTex = TEX.stone;
          break;
        case 'wood':
          topTex = sideTex = bottomTex = TEX.wood;
          break;
        case 'leaves':
          topTex = sideTex = bottomTex = TEX.leaves;
          break;
        case 'sand':
          topTex = sideTex = bottomTex = TEX.sand;
          break;
        case 'plank':
          topTex = sideTex = bottomTex = TEX.plank;
          break;
        case 'brick':
          topTex = sideTex = bottomTex = TEX.brick;
          break;
        case 'glass':
          topTex = sideTex = bottomTex = TEX.glass;
          break;
        case 'gold':
          topTex = sideTex = bottomTex = TEX.gold;
          break;
        case 'diamond':
          topTex = sideTex = bottomTex = TEX.diamond;
          break;
        case 'bedrock':
          topTex = sideTex = bottomTex = TEX.bedrock;
          break;
        default:
          topTex = sideTex = bottomTex = TEX.dirt;
      }
      
      const mats = [
        new THREE.MeshLambertMaterial({ map: sideTex }),
        new THREE.MeshLambertMaterial({ map: sideTex }),
        new THREE.MeshLambertMaterial({ map: topTex }),
        new THREE.MeshLambertMaterial({ map: bottomTex }),
        new THREE.MeshLambertMaterial({ map: sideTex }),
        new THREE.MeshLambertMaterial({ map: sideTex })
      ];
      
      materialCache[type] = mats;
      return mats;
    }
    
    // ============ МИР (ГОТОВЫЙ, БЕЗ ГЕНЕРАЦИИ) ============
    
    const world = new Map();
    const meshes = [];
    const SIZE = 30;
    const HEIGHT = 15;
    
    function buildWorld() {
      const halfSize = SIZE / 2;
      
      for (let x = -halfSize; x < halfSize; x++) {
        for (let z = -halfSize; z < halfSize; z++) {
          // Простой ландшафт формулой
          const h = Math.floor(
            6 + 
            Math.sin(x * 0.3) * Math.cos(z * 0.3) * 3 +
            Math.cos(x * 0.15) * Math.sin(z * 0.2) * 2 +
            Math.sin((x + z) * 0.1) * 1
          );
          
          // Бедрок
          addBlock(x, 0, z, 'bedrock');
          
          // Камень
          for (let y = 1; y < h - 2; y++) {
            const isGold = (x + y + z) % 13 === 0 && y > h - 7;
            const isDiamond = (x * z) % 17 === 0 && y > h - 9;
            if (isDiamond) addBlock(x, y, z, 'diamond');
            else if (isGold) addBlock(x, y, z, 'gold');
            else addBlock(x, y, z, 'stone');
          }
          
          // Земля
          addBlock(x, h - 2, z, 'dirt');
          addBlock(x, h - 1, z, 'dirt');
          
          // Трава
          addBlock(x, h, z, 'grass');
          
          // Деревья
          if ((x + z) % 5 === 0 && h > 8 && x % 3 !== 0) {
            const th = 3 + Math.abs(x % 3);
            for (let ty = 1; ty <= th; ty++) {
              addBlock(x, h + ty, z, 'wood');
            }
            for (let lx = -2; lx <= 2; lx++) {
              for (let lz = -2; lz <= 2; lz++) {
                if (Math.abs(lx) + Math.abs(lz) <= 3) {
                  addBlock(x + lx, h + th + 1, z + lz, 'leaves');
                  if (Math.abs(lx) + Math.abs(lz) <= 2) {
                    addBlock(x + lx, h + th, z + lz, 'leaves');
                  }
                }
              }
            }
          }
          
          // Песок у воды
          if (h <= 5) {
            addBlock(x, h, z, 'sand');
            addBlock(x, h - 1, z, 'sand');
            if (h <= 3) {
              for (let wy = h + 1; wy <= 4; wy++) {
                addBlock(x, wy, z, 'glass');
              }
            }
          }
        }
      }
    }
    
    function addBlock(x, y, z, type) {
      const key = `${x},${y},${z}`;
      if (world.has(key)) return;
      world.set(key, type);
      
      const mats = getBlockMaterial(type);
      const mesh = new THREE.Mesh(boxGeo, mats);
      mesh.position.set(x, y, z);
      mesh.matrixAutoUpdate = false;
      mesh.updateMatrix();
      mesh.userData = { type, x, y, z };
      
      scene.add(mesh);
      meshes.push(mesh);
    }
    
    function getBlock(x, y, z) {
      return world.get(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`) || 'air';
    }
    
    function removeBlock(x, y, z) {
      const key = `${x},${y},${z}`;
      world.delete(key);
      
      for (let i = meshes.length - 1; i >= 0; i--) {
        const m = meshes[i];
        if (m.userData.x === x && m.userData.y === y && m.userData.z === z) {
          scene.remove(m);
          meshes.splice(i, 1);
          break;
        }
      }
    }
    
    function setBlock(x, y, z, type) {
      removeBlock(x, y, z);
      if (type !== 'air') addBlock(x, y, z, type);
    }
    
    // ============ ИГРОК ============
    
    const player = {
      x: 0, y: 15, z: 0,
      vx: 0, vy: 0, vz: 0,
      rotX: 0, rotY: 0,
      onGround: false,
      health: 10
    };
    
    // ============ ИНВЕНТАРЬ ============
    
    const inv = {
      hotbar: [
        { type: 'plank', count: 64 },
        { type: 'stone', count: 64 },
        { type: 'dirt', count: 64 },
        { type: 'brick', count: 64 },
        { type: 'glass', count: 64 }
      ],
      selected: 0
    };
    
    function updateHotbarUI() {
      const slots = document.querySelectorAll('.hotbar-slot');
      const emoji = {
        grass: '🟩', dirt: '🟫', stone: '🪨', wood: '🟤',
        leaves: '🌿', sand: '🟨', plank: '🟫', brick: '🧱',
        glass: '🪟', gold: '🟡', diamond: '💎', bedrock: '⬛'
      };
      slots.forEach((s, i) => {
        const item = inv.hotbar[i];
        if (item && item.count > 0) {
          s.innerHTML = `${emoji[item.type] || '📦'}<span class="count">${item.count}</span>`;
        } else {
          s.innerHTML = '';
        }
      });
    }
    
    function getSelectedItem() {
      const item = inv.hotbar[inv.selected];
      return (item && item.count > 0) ? item : null;
    }
    
    function addToInv(type) {
      for (let i = 0; i < 5; i++) {
        if (inv.hotbar[i] && inv.hotbar[i].type === type && inv.hotbar[i].count < 64) {
          inv.hotbar[i].count++;
          updateHotbarUI();
          return;
        }
      }
      for (let i = 0; i < 5; i++) {
        if (!inv.hotbar[i] || inv.hotbar[i].count === 0) {
          inv.hotbar[i] = { type, count: 1 };
          updateHotbarUI();
          return;
        }
      }
    }
    
    // ============ УПРАВЛЕНИЕ ============
    
    const keys = {};
    let joystickActive = false;
    let joyDX = 0, joyDY = 0;
    
    // Джойстик
    const joyContainer = document.getElementById('joystick-container');
    const joyThumb = document.getElementById('joystick-thumb');
    
    joyContainer.addEventListener('touchstart', (e) => {
      e.preventDefault();
      joystickActive = true;
      updateJoystick(e.touches[0]);
    });
    
    joyContainer.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (joystickActive) updateJoystick(e.touches[0]);
    });
    
    joyContainer.addEventListener('touchend', (e) => {
      e.preventDefault();
      joystickActive = false;
      joyThumb.style.transform = 'translate(-50%, -50%)';
      joyDX = 0;
      joyDY = 0;
    });
    
    function updateJoystick(touch) {
      const rect = joyContainer.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let dx = touch.clientX - cx;
      let dy = touch.clientY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = 45;
      
      if (dist > maxDist) {
        dx = dx / dist * maxDist;
        dy = dy / dist * maxDist;
      }
      
      joyThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      joyDX = dx / maxDist;
      joyDY = dy / maxDist;
    }
    
    // Обзор
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        const tx = e.touches[0].clientX;
        if (tx < window.innerWidth * 0.4) return;
        e.preventDefault();
        window._lookTouch = { x: tx, y: e.touches[0].clientY };
      }
    }, { passive: false });
    
    canvas.addEventListener('touchmove', (e) => {
      if (window._lookTouch && e.touches.length === 1) {
        e.preventDefault();
        const dx = e.touches[0].clientX - window._lookTouch.x;
        const dy = e.touches[0].clientY - window._lookTouch.y;
        player.rotY -= dx * 0.004;
        player.rotX -= dy * 0.004;
        player.rotX = Math.max(-1.4, Math.min(1.4, player.rotX));
        window._lookTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
    }, { passive: false });
    
    canvas.addEventListener('touchend', () => {
      window._lookTouch = null;
    });
    
    // Кнопки
    document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (player.onGround) {
        player.vy = 7;
        player.onGround = false;
      }
    });
    
    document.getElementById('break-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      breakBlock();
    });
    
    document.getElementById('place-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      placeBlock();
    });
    
    // Хотбар
    document.querySelectorAll('.hotbar-slot').forEach((slot, i) => {
      slot.addEventListener('click', () => {
        inv.selected = i;
        document.querySelectorAll('.hotbar-slot').forEach((s, j) => {
          s.classList.toggle('selected', j === i);
        });
      });
    });
    
    // ============ ИГРОВАЯ ЛОГИКА ============
    
    function breakBlock() {
      const ray = getLookRay();
      const hit = raycast(ray);
      if (hit) {
        const type = hit.mesh.userData.type;
        removeBlock(hit.x, hit.y, hit.z);
        addToInv(type);
      }
    }
    
    function placeBlock() {
      const item = getSelectedItem();
      if (!item) return;
      
      const ray = getLookRay();
      const hit = raycast(ray);
      if (hit) {
        const px = hit.x + hit.nx;
        const py = hit.y + hit.ny;
        const pz = hit.z + hit.nz;
        
        const px2 = Math.round(player.x);
        const py2 = Math.round(player.y);
        const pz2 = Math.round(player.z);
        
        if (px === px2 && py === py2 && pz === pz2) return;
        if (px === px2 && py === py2 + 1 && pz === pz2) return;
        
        if (getBlock(px, py, pz) === 'air') {
          setBlock(px, py, pz, item.type);
          item.count--;
          if (item.count <= 0) inv.hotbar[inv.selected] = null;
          updateHotbarUI();
        }
      }
    }
    
    function getLookRay() {
      const dir = new THREE.Vector3(
        -Math.sin(player.rotY) * Math.cos(player.rotX),
        -Math.sin(player.rotX),
        -Math.cos(player.rotY) * Math.cos(player.rotX)
      );
      return { origin: new THREE.Vector3(player.x, player.y + 0.8, player.z), direction: dir };
    }
    
    function raycast(ray) {
      let bestDist = 6;
      let bestHit = null;
      
      for (const mesh of meshes) {
        const box = new THREE.Box3().setFromObject(mesh);
        const intersection = new THREE.Vector3();
        const face = { x: 0, y: 0, z: 0 };
        
        if (ray.origin.distanceTo(mesh.position) > 7) continue;
        
        const hit = rayBoxIntersect(ray, mesh.position, intersection, face);
        if (hit) {
          const dist = ray.origin.distanceTo(intersection);
          if (dist < bestDist) {
            bestDist = dist;
            bestHit = {
              x: mesh.userData.x,
              y: mesh.userData.y,
              z: mesh.userData.z,
              nx: face.x,
              ny: face.y,
              nz: face.z,
              mesh: mesh
            };
          }
        }
      }
      return bestHit;
    }
    
    function rayBoxIntersect(ray, boxCenter, outPoint, outFace) {
      const min = new THREE.Vector3(boxCenter.x - 0.5, boxCenter.y - 0.5, boxCenter.z - 0.5);
      const max = new THREE.Vector3(boxCenter.x + 0.5, boxCenter.y + 0.5, boxCenter.z + 0.5);
      
      let tmin = -Infinity, tmax = Infinity;
      let normalX = 0, normalY = 0, normalZ = 0;
      
      const invDir = new THREE.Vector3(
        1 / (ray.direction.x || 0.0001),
        1 / (ray.direction.y || 0.0001),
        1 / (ray.direction.z || 0.0001)
      );
      
      const t1 = (min.x - ray.origin.x) * invDir.x;
      const t2 = (max.x - ray.origin.x) * invDir.x;
      if (invDir.x >= 0) {
        if (t1 > tmin) { tmin = t1; normalX = -1; }
        if (t2 < tmax) tmax = t2;
      } else {
        if (t2 > tmin) { tmin = t2; normalX = 1; }
        if (t1 < tmax) tmax = t1;
      }
      
      const t3 = (min.y - ray.origin.y) * invDir.y;
      const t4 = (max.y - ray.origin.y) * invDir.y;
      if (invDir.y >= 0) {
        if (t3 > tmin) { tmin = t3; normalX = 0; normalY = -1; }
        if (t4 < tmax) tmax = t4;
      } else {
        if (t4 > tmin) { tmin = t4; normalX = 0; normalY = 1; }
        if (t3 < tmax) tmax = t3;
      }
      
      const t5 = (min.z - ray.origin.z) * invDir.z;
      const t6 = (max.z - ray.origin.z) * invDir.z;
      if (invDir.z >= 0) {
        if (t5 > tmin) { tmin = t5; normalX = 0; normalY = 0; normalZ = -1; }
        if (t6 < tmax) tmax = t6;
      } else {
        if (t6 > tmin) { tmin = t6; normalX = 0; normalY = 0; normalZ = 1; }
        if (t5 < tmax) tmax = t5;
      }
      
      if (tmin <= tmax && tmax > 0) {
        const t = tmin >= 0 ? tmin : tmax;
        outPoint.copy(ray.origin).addScaledVector(ray.direction, t);
        outFace.x = normalX;
        outFace.y = normalY;
        outFace.z = normalZ;
        return true;
      }
      return false;
    }
    
    // ============ ФИЗИКА ============
    
    function updatePhysics(dt) {
      const speed = 5;
      
      // Движение с джойстика
      if (joystickActive) {
        const angle = player.rotY;
        const forwardX = -Math.sin(angle);
        const forwardZ = -Math.cos(angle);
        const rightX = Math.cos(angle);
        const rightZ = -Math.sin(angle);
        
        player.vx = (forwardX * joyDY + rightX * joyDX) * speed;
        player.vz = (forwardZ * joyDY + rightZ * joyDX) * speed;
      } else {
        player.vx *= 0.8;
        player.vz *= 0.8;
      }
      
      // Гравитация
      player.vy -= 18 * dt;
      
      // Двигаем по осям
      const newX = player.x + player.vx * dt;
      const newY = player.y + player.vy * dt;
      const newZ = player.z + player.vz * dt;
      
      // Коллизия
      let groundCheck = false;
      
      // Проверка Y
      const feetY = newY - 0.8;
      const headY = newY + 0.1;
      
      for (let dy = -2; dy <= 2; dy++) {
        const checkY = Math.round(newY + dy * 0.5);
        if (getBlock(Math.round(player.x), checkY, Math.round(player.z)) !== 'air') {
          const blockTop = checkY + 0.5;
          const blockBottom = checkY - 0.5;
          
          if (feetY < blockTop && newY + 0.1 > blockBottom) {
            if (player.vy < 0 && Math.abs(feetY - blockTop) < 0.3) {
              player.y = blockTop + 0.8;
              player.vy = 0;
              groundCheck = true;
            } else if (player.vy > 0 && Math.abs(headY - blockBottom) < 0.3) {
              player.y = blockBottom - 0.1;
              player.vy = 0;
            }
          }
        }
      }
      
      if (!groundCheck) {
        player.y = newY;
      }
      player.onGround = groundCheck;
      
      // X и Z проще
      let blockedX = false, blockedZ = false;
      
      for (const mesh of meshes) {
        const bx = mesh.userData.x, by = mesh.userData.y, bz = mesh.userData.z;
        const px = Math.round(newX), pz = Math.round(newZ);
        
        if (bx === px && Math.abs(by - Math.round(player.y)) <= 1 && bz === Math.round(player.z)) {
          blockedX = true;
        }
        if (bx === Math.round(player.x) && Math.abs(by - Math.round(player.y)) <= 1 && bz === pz) {
          blockedZ = true;
        }
      }
      
      if (!blockedX) player.x = newX;
      if (!blockedZ) player.z = newZ;
      
      // Ограничение мира
      player.x = Math.max(-14, Math.min(14, player.x));
      player.z = Math.max(-14, Math.min(14, player.z));
      
      if (player.y < -5) {
        player.x = 0; player.y = 15; player.z = 0;
        player.vy = 0;
        player.health--;
        updateHealthUI();
      }
    }
    
    function updateHealthUI() {
      const hearts = document.querySelectorAll('.heart-icon');
      hearts.forEach((h, i) => {
        h.textContent = i < player.health ? '❤️' : '🖤';
      });
    }
    
    // ============ FPS СЧЕТЧИК ============
    
    let frames = 0, fpsTime = performance.now();
    
    // ============ ГЛАВНЫЙ ЦИКЛ ============
    
    let lastTime = performance.now();
    
    function gameLoop(time) {
      requestAnimationFrame(gameLoop);
      
      const dt = Math.min((time - lastTime) / 1000, 0.05);
      lastTime = time;
      
      updatePhysics(dt);
      
      // Камера
      camera.position.set(player.x, player.y + 0.8, player.z);
      camera.rotation.set(player.rotX, player.rotY, 0, 'YXZ');
      
      // FPS
      frames++;
      if (time - fpsTime >= 1000) {
        document.getElementById('fps-display').textContent = `FPS: ${frames}`;
        frames = 0;
        fpsTime = time;
      }
      
      // Блок под прицелом
      const ray = getLookRay();
      const hit = raycast(ray);
      if (hit) {
        const names = {
          grass: '🟩 Трава', dirt: '🟫 Земля', stone: '🪨 Камень',
          wood: '🟤 Дерево', leaves: '🌿 Листья', sand: '🟨 Песок',
          plank: '🟫 Доски', brick: '🧱 Кирпич', glass: '🪟 Стекло',
          gold: '🟡 Золото', diamond: '💎 Алмаз', bedrock: '⬛ Бедрок'
        };
        document.getElementById('block-label').textContent = names[hit.mesh.userData.type] || '???';
      } else {
        document.getElementById('block-label').textContent = '';
      }
      
      renderer.render(scene, camera);
    }
    
    // ============ ЗАПУСК ============
    
    buildWorld();
    updateHotbarUI();
    updateHealthUI();
    requestAnimationFrame(gameLoop);
    
    // Ресайз
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('✅ MINECRAFT ОПТИМИЗИРОВАН!');
    console.log('📱 Ландшафтный режим | Кнопка полного экрана | 60 FPS');
  </script>
</body>
