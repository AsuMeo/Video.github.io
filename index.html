<style>

.topbar{height:calc(54px + var(--safeT));padding:var(--safeT) 8px 0;display:flex;align-items:center;gap:5px;flex:none;background:#0e1016f2;border-bottom:1px solid #20242d;backdrop-filter:blur(16px);z-index:10}.brand{display:flex;align-items:center;gap:7px;min-width:0;margin-right:auto}.logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(145deg,var(--violet),#d658e9);display:grid;place-items:center;font-weight:900;font-size:17px;box-shadow:0 5px 18px #8b5cf655}.brandText{min-width:0}.brandText b{display:block;font-size:13px}.brandText small{display:block;color:var(--muted);font-size:10px;max-width:105px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.topIcon{width:38px;height:38px;flex:none;border-radius:11px;background:transparent;display:grid;place-items:center;font-size:18px}.topIcon:active{background:var(--panel3)}.topIcon:disabled{opacity:.3}
.workspace{flex:1;min-height:0;position:relative;overflow:hidden;background-color:#0a0c11;background-image:linear-gradient(45deg,#0f1219 25%,transparent 25%),linear-gradient(-45deg,#0f1219 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#0f1219 75%),linear-gradient(-45deg,transparent 75%,#0f1219 75%);background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0}.stageWrap{position:absolute;inset:0;display:grid;place-items:center;padding:10px 42px 10px 10px}.stageBox{position:relative;box-shadow:0 12px 45px #000b;transform-origin:center}.stageBox canvas{display:block;width:100%;height:100%;touch-action:none;background:transparent}.stageTag{position:absolute;left:7px;top:7px;padding:3px 7px;border-radius:7px;background:#090b10a8;color:#b9c0cd;font-size:9px;pointer-events:none}.floatingTools{position:absolute;right:7px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px}.floatBtn{width:37px;height:37px;border-radius:11px;background:#171a22e8;border:1px solid #2c3140;box-shadow:0 4px 14px #0006;display:grid;place-items:center;font-size:16px}.floatBtn.on{background:var(--violet);border-color:#a985ff}.floatBtn:active{transform:scale(.94)}
.transport{height:48px;flex:none;background:#0e1016;border-top:1px solid #20242d;display:flex;align-items:center;padding:0 9px;gap:7px}.transBtn{width:35px;height:35px;border-radius:10px;background:var(--panel2);font-size:15px}.play{background:var(--violet);font-size:17px}.counter{font-variant-numeric:tabular-nums;font-size:11px;color:#c1c6d1;min-width:47px;text-align:center}.fps{margin-left:auto;display:flex;align-items:center;gap:4px;color:var(--muted);font-size:10px}.fps select{height:29px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:0 4px;outline:0}

.bottomNav{height:calc(60px + var(--safeB));padding:0 3px var(--safeB);flex:none;background:#0c0e13;border-top:1px solid #242832;display:grid;grid-template-columns:repeat(5,1fr);z-index:20}.navBtn{background:transparent;color:#858d9f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px}.navBtn i{font-style:normal;font-size:19px}.navBtn.on{color:#a98cff}.navBtn:active{background:#ffffff07}
.sheet{position:fixed;z-index:30;left:0;right:0;bottom:calc(60px + var(--safeB));height:min(54vh,460px);background:#12141bfa;border-radius:18px 18px 0 0;border-top:1px solid #323744;box-shadow:0 -16px 45px #0009;transform:translateY(105%);transition:transform .22s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;backdrop-filter:blur(18px)}.sheet.open{transform:none}.grab{width:38px;height:4px;border-radius:4px;background:#414654;margin:7px auto 4px}.sheetHead{height:42px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid #242833}.sheetHead b{font-size:14px}.sheetHead span{margin-left:auto;color:var(--muted);font-size:11px}.sheetBody{flex:1;min-height:0;overflow:auto;padding:12px 13px calc(12px + env(safe-area-inset-bottom))}.sheetClose{margin-left:auto;width:32px;height:32px;border-radius:9px;background:var(--panel2)}
.groupTitle{font-size:10px;color:#7f8799;text-transform:uppercase;letter-spacing:.08em;margin:6px 2px 8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.field{min-width:0}.field label{display:flex;justify-content:space-between;color:#aab1bf;font-size:10px;margin:0 2px 5px}.field output{color:#d6d9e1}.rangeRow{display:flex;align-items:center;gap:7px}.rangeRow input[type=range]{min-width:0;flex:1;accent-color:var(--violet)}.num{width:55px;height:32px;background:#0c0e13;border:1px solid var(--line);border-radius:8px;text-align:center;outline:0}.wide{grid-column:1/-1}.select{width:100%;height:35px;background:#0c0e13;border:1px solid var(--line);border-radius:8px;padding:0 8px;outline:0}.switchRow{display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--panel2);border-radius:10px;margin-bottom:8px}.switch{width:44px;height:25px;border-radius:20px;background:#343945;position:relative}.switch:after{content:"";position:absolute;width:19px;height:19px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.17s}.switch.on{background:var(--violet)}.switch.on:after{left:22px}.actionGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.action{min-height:62px;border-radius:11px;background:var(--panel2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px}.action i{font-style:normal;font-size:21px}.action:active{background:#30284b}.action.danger{color:#ff8396}.primaryWide{width:100%;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--violet),#6d50dc);font-weight:700;margin-top:10px}.secondaryWide{width:100%;height:40px;border-radius:10px;background:var(--panel3);margin-top:8px}.notice{padding:9px 10px;border-radius:9px;background:#1b1e27;color:#9ca4b5;font-size:10px;margin:8px 0}.layer{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid transparent;border-radius:10px;margin-bottom:5px;background:#171a21}.layer.active{border-color:var(--violet);background:#211c32}.layerThumb{width:39px;height:39px;border-radius:8px;background:#0b0d12;object-fit:contain}.layerInfo{min-width:0;flex:1}.layerName{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}.layerMeta{font-size:9px;color:var(--muted)}.layerBtn{width:30px;height:30px;border-radius:8px;background:#242832}.colorRow{display:flex;gap:8px}.colorRow input[type=color]{width:48px;height:37px;border:0;border-radius:9px;background:transparent}.colorText{flex:1;height:37px;background:#0c0e13;border:1px solid var(--line);border-radius:9px;padding:0 9px}.projectCard{padding:10px;border-radius:11px;background:var(--panel2);margin-bottom:7px;display:flex;gap:9px;align-items:center}.projectCard div{min-width:0;flex:1}.projectCard b,.projectCard small{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.projectCard small{color:var(--muted)}
.modal{position:fixed;z-index:50;inset:0;background:#05060ac7;display:grid;place-items:center;padding:18px;backdrop-filter:blur(8px)}.dialog{width:100%;max-width:420px;max-height:82vh;overflow:auto;background:#171920;border:1px solid #303542;border-radius:17px;padding:17px;box-shadow:0 25px 70px #000b}.dialog h2{font-size:18px;margin:0 0 5px}.dialog p{color:#9ba3b4;font-size:11px}.dialogActions{display:flex;gap:8px;justify-content:flex-end;margin-top:15px}.dlgBtn{height:38px;padding:0 15px;border-radius:9px;background:#292d38}.dlgBtn.primary{background:var(--violet)}.textInput{width:100%;height:40px;border-radius:9px;background:#0d0f14;border:1px solid var(--line);padding:0 10px;outline:0}.progress{height:8px;border-radius:8px;background:#282c36;overflow:hidden;margin:12px 0}.progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--violet),var(--cyan))}.toastbox{position:fixed;z-index:80;left:12px;right:12px;bottom:calc(68px + var(--safeB));display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}.toast{max-width:92%;padding:9px 13px;border-radius:10px;background:#272b36ed;box-shadow:0 8px 25px #0007;font-size:11px;animation:pop .2s ease}@keyframes pop{from{opacity:0;transform:translateY(7px)}}
@media(min-width:700px){body:before{content:"Kage Studio создан для телефона. Откройте страницу на Android или iPhone.";position:fixed;z-index:999;inset:0;background:#08090d;display:grid;place-items:center;text-align:center;padding:25vw;font-size:20px;color:#c6cbd7}}
</style>

<body>
<div class="app">
<header class="topbar"><div class="brand"><div class="logo">K</div><div class="brandText"><b>Kage Studio</b><small id="projectNameTop">Новый проект</small></div></div><button class="topIcon" id="undoBtn" title="Назад">↶</button><button class="topIcon" id="redoBtn" title="Вперёд">↷</button><button class="topIcon" id="saveBtn" title="Сохранить">⌁</button><button class="topIcon" id="exportTop" title="Экспорт">⇧</button></header>
<section class="workspace" id="workspace"><div class="stageWrap"><div class="stageBox" id="stageBox"><canvas id="stage"></canvas><div class="stageTag" id="stageTag">1080 × 1920</div></div></div><div class="floatingTools"><button class="floatBtn on" id="selectTool" title="Выбор">⌖</button><button class="floatBtn" id="boneTool" title="Кости">◇</button><button class="floatBtn on" id="onionBtn" title="Предыдущий кадр">◉</button><button class="floatBtn" id="fitBtn" title="Вписать">⊡</button></div></section>
<div class="transport"><button class="transBtn" id="firstFrame">|◀</button><button class="transBtn" id="prevFrame">◀</button><button class="transBtn play" id="playBtn">▶</button><button class="transBtn" id="nextFrame">▶</button><span class="counter" id="counter">1 / 1</span><div class="fps"><span>FPS</span><select id="fps"><option>6</option><option selected>12</option><option>15</option><option>24</option><option>30</option><option>60</option></select></div></div>
<div class="timeline" id="timeline"><button class="addFrame" id="addFrame">＋</button></div>
<nav class="bottomNav"><button class="navBtn on" data-sheet="transform"><i>⌖</i>Трансформ</button><button class="navBtn" data-sheet="layers"><i>▱</i>Слои</button><button class="navBtn" data-sheet="character"><i>♙</i>Персонаж</button><button class="navBtn" data-sheet="scene"><i>✦</i>Сцена</button><button class="navBtn" data-sheet="project"><i>☰</i>Проект</button></nav>
</div>

<section class="sheet" id="sheet"><div class="grab"></div><div class="sheetHead"><b id="sheetTitle">Трансформация</b><span id="selectedLabel">Ничего не выбрано</span><button class="sheetClose" id="sheetClose">×</button></div><div class="sheetBody" id="sheetBody"></div></section>
<input class="hidden" type="file" id="partImport" accept="image/png,image/jpeg,image/webp,image/svg+xml" multiple>
<input class="hidden" type="file" id="projectImport" accept="application/json,.kage,.json">
<div class="toastbox" id="toastbox"></div>
<div class="modal hidden" id="modal"><div class="dialog" id="dialog"></div></div>

<script>
'use strict';
const $=s=>document.querySelector(s),stage=$('#stage'),ctx=stage.getContext('2d',{alpha:true}),thumbCanvas=document.createElement('canvas');
const W=1080,H=1920,DB='kage-studio-v1';stage.width=W;stage.height=H;thumbCanvas.width=108;thumbCanvas.height=192;
let project={id:'p_'+Date.now(),name:'Новый проект',w:W,h:H,fps:12,bg:'#202231',transparent:false,frames:[],layers:[],audio:null,updated:Date.now()};
let frameIndex=0,selected=null,onion=true,bones=false,playing=false,playTimer=null,drag=null,pinch=null,history=[],future=[],images=new Map(),activeSheet='transform',autoSaveTimer;
const partSVG=(name,svg)=>({name,src:'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg)});
function baseParts(){const skin='#ffd0b5',hair='#4b314f',line='#352638',shirt='#7c5cf3',white='#fff8f2';return[
 partSVG('Туловище',`<svg xmlns="http://www.w3.org/2000/svg" width="330" height="520"><path d="M60 510Q45 300 75 100Q165 45 255 100Q285 300 270 510Z" fill="${shirt}" stroke="${line}" stroke-width="14"/><path d="M113 82Q165 140 217 82" fill="none" stroke="${white}" stroke-width="22"/></svg>`),
 partSVG('Голова',`<svg xmlns="http://www.w3.org/2000/svg" width="430" height="470"><path d="M64 180Q54 42 215 35Q376 42 366 180V270Q350 410 215 445Q80 410 64 270Z" fill="${skin}" stroke="${line}" stroke-width="13"/><path d="M55 200Q30 70 132 28Q245-28 350 55Q405 100 368 235L330 145Q242 178 115 120Z" fill="${hair}" stroke="${line}" stroke-width="13"/><ellipse cx="143" cy="245" rx="28" ry="39" fill="#49335e"/><ellipse cx="287" cy="245" rx="28" ry="39" fill="#49335e"/><circle cx="151" cy="232" r="10" fill="white"/><circle cx="295" cy="232" r="10" fill="white"/><path d="M180 330Q215 355 250 330" fill="none" stroke="#b75f70" stroke-width="10" stroke-linecap="round"/></svg>`),
 partSVG('Левая рука',`<svg xmlns="http://www.w3.org/2000/svg" width="150" height="500"><path d="M75 30Q125 32 120 100L105 390Q120 475 72 485Q23 475 42 390L28 100Q25 32 75 30Z" fill="${skin}" stroke="${line}" stroke-width="13"/></svg>`),
 partSVG('Правая рука',`<svg xmlns="http://www.w3.org/2000/svg" width="150" height="500"><path d="M75 30Q125 32 120 100L105 390Q120 475 72 485Q23 475 42 390L28 100Q25 32 75 30Z" fill="${skin}" stroke="${line}" stroke-width="13"/></svg>`),
 partSVG('Левая нога',`<svg xmlns="http://www.w3.org/2000/svg" width="170" height="600"><path d="M35 20H135L145 470Q160 550 125 575H25Q5 540 45 485Z" fill="#31354a" stroke="${line}" stroke-width="14"/><path d="M24 515Q92 490 148 530L158 580H18Z" fill="#fafafa" stroke="${line}" stroke-width="13"/></svg>`),
 partSVG('Правая нога',`<svg xmlns="http://www.w3.org/2000/svg" width="170" height="600"><path d="M35 20H135L145 470Q160 550 125 575H25Q5 540 45 485Z" fill="#31354a" stroke="${line}" stroke-width="14"/><path d="M24 515Q92 490 148 530L158 580H18Z" fill="#fafafa" stroke="${line}" stroke-width="13"/></svg>`)
]}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function clone(v){return JSON.parse(JSON.stringify(v))}
function defaultProject(){project.frames=[];project.layers=[];const parts=baseParts(),spec=[
 {i:4,x:390,y:1290,s:.72,z:0,p:null,pivotX:.5,pivotY:.08},{i:5,x:570,y:1290,s:.72,z:1,p:null,pivotX:.5,pivotY:.08},{i:0,x:375,y:780,s:1,z:2,p:null,pivotX:.5,pivotY:.15},{i:2,x:295,y:850,s:.82,z:3,p:2,pivotX:.5,pivotY:.08},{i:3,x:665,y:850,s:.82,z:4,p:2,pivotX:.5,pivotY:.08},{i:1,x:325,y:380,s:1,z:5,p:2,pivotX:.5,pivotY:.72}];
 spec.forEach((q,n)=>{let p=parts[q.i],id=uid();project.layers.push({id,name:p.name,src:p.src,w:[330,430,150,150,170,170][q.i],h:[520,470,500,500,600,600][q.i],parent:null,visible:true,z:q.z,locked:false});q.id=id});
 // Assign parents after IDs exist while preserving world positions through local coordinates.
 spec.forEach((q,n)=>{let L=project.layers[n];if(q.p!==null)L.parent=project.layers[q.p].id});
 let pose={};spec.forEach((q,n)=>{let parent=q.p!==null?spec[q.p]:null;pose[q.id]={x:parent?q.x-parent.x:q.x,y:parent?q.y-parent.y:q.y,rotation:0,scaleX:q.s/(parent?parent.s:1),scaleY:q.s/(parent?parent.s:1),opacity:1,pivotX:q.pivotX,pivotY:q.pivotY}});project.frames=[{id:uid(),hold:1,pose}];selected=project.layers[5].id;frameIndex=0;loadAllImages();pushHistory();renderAll()}
function toast(t){let e=document.createElement('div');e.className='toast';e.textContent=t;$('#toastbox').append(e);setTimeout(()=>e.remove(),2600)}
function imageFor(layer){return images.get(layer.id)}function loadImage(layer){return new Promise(res=>{let im=new Image;im.onload=()=>{images.set(layer.id,im);res()};im.onerror=res;im.src=layer.src})}async function loadAllImages(){images.clear();await Promise.all(project.layers.map(loadImage));renderAll()}
function pose(){return project.frames[frameIndex]?.pose||{}}function state(id,p=pose()){return p[id]||{x:0,y:0,rotation:0,scaleX:1,scaleY:1,opacity:1,pivotX:.5,pivotY:.5}}
function matrixFor(id,p=pose(),cache=new Map()){if(cache.has(id))return cache.get(id);let l=project.layers.find(x=>x.id===id),s=state(id,p),m=new DOMMatrix;if(l?.parent)m=matrixFor(l.parent,p,cache);m=m.translate(s.x,s.y).rotate(s.rotation).scale(s.scaleX,s.scaleY).translate(-s.pivotX*l.w,-s.pivotY*l.h);cache.set(id,m);return m}
function worldPivot(id,p=pose()){let l=project.layers.find(x=>x.id===id),s=state(id,p),m=matrixFor(id,p);let pt=new DOMPoint(s.pivotX*l.w,s.pivotY*l.h).matrixTransform(m);return pt}
function drawScene(c,p,opt={}){c.save();c.setTransform(1,0,0,1,0,0);c.clearRect(0,0,W,H);if(!project.transparent){c.fillStyle=project.bg;c.fillRect(0,0,W,H)}let cache=new Map;[...project.layers].sort((a,b)=>a.z-b.z).forEach(l=>{if(!l.visible)return;let im=imageFor(l);if(!im)return;let s=state(l.id,p),m=matrixFor(l.id,p,cache);c.save();c.globalAlpha=(opt.alpha??1)*s.opacity;c.setTransform(m.a,m.b,m.c,m.d,m.e,m.f);c.drawImage(im,0,0,l.w,l.h);c.restore()});c.restore()}
function render(){ctx.clearRect(0,0,W,H);if(onion&&frameIndex>0){drawScene(ctx,project.frames[frameIndex-1].pose,{alpha:.18});ctx.save();ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#58d8ff22';ctx.fillRect(0,0,W,H);ctx.restore()}drawScene(ctx,pose());if(!playing&&selected)drawOverlay()}
