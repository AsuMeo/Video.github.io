<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мягкая — Демо (День 1)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#0b0e14;color:#e4e8ed;height:100vh;display:flex;justify-content:center;align-items:center}
#app{width:100%;max-width:430px;height:98vh;background:#121820;border-radius:28px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.9)}
#header{background:#1a2230;padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a3348}
#header .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(145deg,#f7a1b8,#d4718a);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#fff}
#header h2{font-size:17px;font-weight:500}
#header .status{font-size:11px;color:#6f8cff;display:flex;align-items:center;gap:5px}
#header .status::before{content:'';width:7px;height:7px;background:#3ddc84;border-radius:50%;animation:pulse 1.6s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
#day-badge{position:absolute;top:12px;right:16px;background:#1a2230;padding:4px 12px;border-radius:16px;font-size:12px;color:#b0c4de;border:1px solid #2a3348}
#bond-area{padding:6px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#6b7e9a;border-bottom:1px solid #1e2635}
#bond-area .fill-wrap{width:70%;height:4px;background:#1e2635;border-radius:8px;overflow:hidden}
#bond-area .fill{height:100%;background:#6f8cff;border-radius:8px;width:0%;transition:0.6s}
#messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:3px;background:#121820}
#messages::-webkit-scrollbar-thumb{background:#2a3348;border-radius:10px}
.msg{max-width:84%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;animation:fadeIn 0.3s ease}
.msg.soft{background:#1e2635;align-self:flex-start;border-bottom-left-radius:4px}
.msg.you{background:#2f3b52;align-self:flex-end;border-bottom-right-radius:4px}
.msg .time{font-size:10px;color:#6b7e9a;margin-top:4px;text-align:right;display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#typing{font-size:12px;color:#6b7e9a;padding:4px 16px;display:none;animation:blink 1.1s infinite}
@keyframes blink{0%{opacity:0.4}50%{opacity:1}100%{opacity:0.4}}
#input-area{background:#1a2230;padding:10px 14px;border-top:1px solid #2a3348;display:flex;gap:10px;align-items:center}
#input-area input{flex:1;background:#0b0e14;border:1px solid #2a3348;border-radius:24px;padding:10px 16px;color:#e4e8ed;outline:none;font-size:15px}
#input-area input::placeholder{color:#4a5a7a}
#input-area button{background:#6f8cff;border:none;color:#0b0e14;padding:10px 18px;border-radius:24px;font-weight:600;font-size:15px;cursor:pointer;transition:0.2s}
#input-area button:disabled{opacity:0.4;cursor:not-allowed}
#info-bar{position:absolute;bottom:90px;left:0;width:100%;text-align:center;font-size:12px;color:#4a5a7a;padding:6px;pointer-events:none}
#end-screen{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.93);flex-direction:column;align-items:center;justify-content:center;z-index:99;padding:24px;text-align:center}
#end-screen h1{color:#ff6b8a;font-size:28px;margin-bottom:12px}
#end-screen p{color:#b0c4de;font-size:15px;max-width:300px;line-height:1.6}
#end-screen button{background:#ff6b8a;border:none;padding:14px 36px;border-radius:30px;color:#0b0e14;font-weight:bold;font-size:17px;margin-top:18px;cursor:pointer}
@media(max-width:440px){#app{border-radius:0;max-width:100%;height:100vh}}
</style>
</head>
<body>
<div id="app" style="position:relative">
<div id="header">
<div class="avatar">🌸</div>
<div><h2>Мягкая</h2><div class="status">онлайн</div></div>
<div id="day-badge">День 1 из 30</div>
</div>
<div id="bond-area">❤️ Привязанность <span id="bond-percent">0%</span><div class="fill-wrap"><div class="fill" id="bond-fill"></div></div></div>
<div id="messages"></div>
<div id="typing">Мягкая печатает...</div>
<div id="input-area">
<input id="msg-input" placeholder="Напиши ей..." autocomplete="off">
<button id="send-btn">➤</button>
</div>
<div id="info-bar">— Демо: первый день знакомства —</div>
<div id="end-screen">
<h1>💔 Игра окончена</h1>
<p>Ты не смог её удержать. Мягкая исчезла.</p>
<button onclick="location.reload()">Начать заново</button>
</div>
</div>

<script>
// === СЦЕНАРИЙ ПЕРВОГО ДНЯ (ДЕМО) ===
const story = [
{from:'soft', text:'Привет... меня зовут Мягкая. Ты случайно не потерял телефон на вокзале? 😊', delay:3000},
{from:'soft', text:'Я просто подумала, что это судьба — найти тебя здесь', delay:5000},
{from:'soft', text:'А ты какой город живёшь?', delay:4000},
{from:'soft', text:'Я люблю дождь и кофе, а ты?', delay:4500},
{from:'soft', text:'Мне кажется, мы могли бы подружиться...', delay:6000},
{from:'soft', text:'Если честно, мне немного одиноко по вечерам', delay:5500},
{from:'soft', text:'Ты не против, если я буду писать тебе иногда?', delay:5000},
{from:'soft', text:'Я сегодня видела красивый закат и подумала о тебе 🌇', delay:7000},
{from:'soft', text:'Ты такой интересный... я хочу узнать тебя лучше', delay:6500},
{from:'soft', text:'Знаешь, я уже скучаю по нашим разговорам... Спокойной ночи 🌙', delay:8000},
];

const msgsContainer = document.getElementById('messages');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const bondPercent = document.getElementById('bond-percent');
const bondFill = document.getElementById('bond-fill');
const typingDiv = document.getElementById('typing');
const endScreen = document.getElementById('end-screen');

let bond = 0;
let msgIndex = 0;
let isWaitingForUser = false;
let gameOver = false;
let userMessages = 0;
let nightMode = false;

// === ФУНКЦИИ ===
function addMessage(text, from, isSystem = false) {
const div = document.createElement('div');
div.className = 'msg ' + (from === 'soft' ? 'soft' : 'you');
const textDiv = document.createElement('div');
textDiv.textContent = text;
div.appendChild(textDiv);
const time = document.createElement('span');
time.className = 'time';
time.textContent = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
div.appendChild(time);
msgsContainer.appendChild(div);
msgsContainer.scrollTop = msgsContainer.scrollHeight;
}

function showTyping() { typingDiv.style.display = 'block'; }
function hideTyping() { typingDiv.style.display = 'none'; }

function updateBond(change) {
bond = Math.min(100, Math.max(0, bond + change));
bondPercent.textContent = bond + '%';
bondFill.style.width = bond + '%';
}

function addUserMessage(text) {
if(!text.trim() || gameOver) return;
addMessage(text.trim(), 'you');
updateBond(2);
userMessages++;
input.value = '';
isWaitingForUser = false;
if(userMessages >= 3 && msgIndex < story.length - 1) {
setTimeout(() => sendNextSoft(), 2500);
}
}

function sendNextSoft() {
if(msgIndex >= story.length || gameOver) return;
const msg = story[msgIndex];
showTyping();
setTimeout(() => {
hideTyping();
addMessage(msg.text, 'soft');
msgIndex++;
updateBond(3);
if(msgIndex >= story.length) {
// КОНЕЦ ДЕМО
setTimeout(() => {
addMessage('Мягкая: "Спасибо за этот день... увидимся завтра? 🌙"', 'soft');
setTimeout(() => {
addMessage('🎮 Демо-версия завершена. Это был День 1 из 30.', 'soft');
addMessage('💡 Игра продолжится в полной версии. Она будет писать тебе настоящие дни и ночи.', 'soft');
sendBtn.disabled = true;
input.disabled = true;
}, 3000);
}, 2500);
return;
}
isWaitingForUser = true;
}, 1500);
}

// === НОЧНОЙ ЭФФЕКТ ===
function checkNightTime() {
const hour = new Date().getHours();
if((hour >= 0 && hour <= 5) || (hour >= 22 && hour <= 23)) {
nightMode = true;
if(!gameOver && msgIndex < story.length - 2) {
setTimeout(() => {
addMessage('Мягкая: "Ты ещё не спишь? Мне просто захотелось написать... 🌙"', 'soft');
updateBond(5);
}, 3000);
}
} else {
nightMode = false;
}
}
setInterval(checkNightTime, 60000);
checkNightTime();

// === ИНИЦИАЛИЗАЦИЯ ===
setTimeout(() => {
addMessage('🌸 Мягкая начала печатать...', 'soft', true);
setTimeout(() => sendNextSoft(), 2000);
}, 1500);

sendBtn.addEventListener('click', () => addUserMessage(input.value));
input.addEventListener('keydown', (e) => {
if(e.key === 'Enter') addUserMessage(input.value);
});

// === ЭМУЛЯЦИЯ "ОНА ПИШЕТ НОЧЬЮ" ===
setTimeout(() => {
if(!gameOver && msgIndex < story.length - 1) {
addMessage('Мягкая: "Мне кажется, я слишком много думаю о тебе..."', 'soft');
updateBond(4);
}
}, 20000);

// === ДЕМО-ЗАВЕРШЕНИЕ ===
// Через 2 минуты после последнего сообщения показываем "она ушла"
let timeoutId = setTimeout(() => {
if(!gameOver && msgIndex >= story.length - 2) {
endScreen.style.display = 'flex';
gameOver = true;
sendBtn.disabled = true;
input.disabled = true;
}
}, 120000);

</script>
</body>
</html>
