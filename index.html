<script>
'use strict';
const $=id=>document.getElementById(id),cv=$('game'),ctx=cv.getContext('2d');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t;
const firebaseConfig={apiKey:'AIzaSyBm0mIvHVznIeF2PoFk6dtdaiT5r877wyA',authDomain:'meow-874ce.firebaseapp.com',databaseURL:'https://meow-874ce-default-rtdb.europe-west1.firebasedatabase.app',projectId:'meow-874ce',storageBucket:'meow-874ce.firebasestorage.app',messagingSenderId:'471541334599',appId:'1:471541334599:web:567af3e7dbe70a37572762'};
let db,auth,uid='local-'+Math.random().toString(36).slice(2),name='Странник';try{firebase.initializeApp(firebaseConfig);db=firebase.database();auth=firebase.auth()}catch(e){console.warn(e)}
const TILE=28,W=420,H=120,SEA=72,CHUNK=16,world=new Uint8Array(W*H),B={air:0,dirt:1,grass:2,stone:3,wood:4,leaf:5,ore:6,sand:7,water:8,bedrock:9,brick:10,torch:11};
const item={dirt:{n:'Земля',i:'🟫',b:B.dirt},stone:{n:'Камень',i:'🪨',b:B.stone},wood:{n:'Дерево',i:'🪵',b:B.wood},sand:{n:'Песок',i:'🟨',b:B.sand},ore:{n:'Руда',i:'💎',b:B.ore},brick:{n:'Кирпич',i:'🧱',b:B.brick},torch:{n:'Факел',i:'🔥',b:B.torch},chest:{n:'Сундук',i:'📦',b:0}};
const slots=['dirt','stone','wood','sand','ore','brick','torch','chest'];let inv={dirt:12,stone:0,wood:0,sand:0,ore:0,brick:0,torch:0,chest:0},sel=0;
const P={x:12*TILE,y:40*TILE,w:18,h:25,vx:0,vy:0,ground:false,hp:100,level:1,xp:0,coins:0,skin:'#55b7ff',name:'',lastSave:0};let keys={l:false,r:false},jump=false,cam={x:0,y:0},mouse={x:0,y:0,down:false,button:0},remotes={},mobs=[],boss=null,weather={season:0,rain:0,time:0};
function noise(x){let t=Math.sin(x*12.9898+73421)*43758.5453;return t-Math.floor(t)}function at(x,y){if(x<0||x>=W)return B.bedrock;if(y<0)return 0;if(y>=H)return B.bedrock;return world[y*W+x]}function set(x,y,v){if(x>=0&&x<W&&y>=0&&y<H)world[y*W+x]=v}
function generate(){let h=SEA;for(let x=0;x<W;x++){h=clamp(h+(noise(x)*3|0)-1,48,78);for(let y=0;y<H;y++){let v=y===H-1?B.bedrock:y>=h+7?B.stone:y>=h?B.dirt:y===h-1?B.grass:B.air;set(x,y,v)}if(x%17===0&&noise(x+.7)>.35){for(let y=h-2;y>h-6;y--)set(x,y,B.wood);for(let dx=-2;dx<=2;dx++)for(let dy=-3;dy<=0;dy++)if(Math.abs(dx)+Math.abs(dy)<5)set(x+dx,h+dy-6,B.leaf)}if(x%23===4)for(let y=h+2;y<h+6;y++)set(x,y,B.ore)}for(let x=0;x<W;x++)for(let y=SEA-7;y<SEA;y++)if(!at(x,y))set(x,y,B.water)}generate();
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}addEventListener('resize',resize);resize();
function toast(s,ms=1800){$('toast').textContent=s;$('toast').classList.add('on');clearTimeout(window._toast);window._toast=setTimeout(()=>$('toast').classList.remove('on'),ms)}
function notify(s){$('status').textContent=s}
function key(x,y){return x+','+y}function xy(k){let a=k.split(',');return[+a[0],+a[1]]}
function add(id,n=1){inv[id]=(inv[id]||0)+n;renderBar()}
function gain(n){P.xp+=n;let need=100+(P.level-1)*80;while(P.xp>=need){P.xp-=need;P.level++;need=100+(P.level-1)*80;toast('⭐ Уровень '+P.level+'! Новая способность открыта')}if(P.level>=3)P.vx=6;if(P.level>=6)P.skin='#ffd94f';if(P.level>=10)P.skin='#c98bff'}
function allowed(tx,ty){return Math.abs(tx*TILE-(P.x+P.w/2))<=TILE*5&&Math.abs(ty*TILE-(P.y+P.h/2))<=TILE*5}
function writeBlock(tx,ty,v){if(!db||!uid){set(tx,ty,v);return Promise.resolve()}return db.ref('world/blocks/'+key(tx,ty)).transaction(old=>old===null?v:(old===v?null:old)).then(r=>{if(r.committed&&r.snapshot.val()===v)set(tx,ty,v)})}
function mine(tx,ty){let v=at(tx,ty);if(!allowed(tx,ty)||!v||v===B.bedrock||v===B.water)return;let id=v===B.grass||v===B.dirt?'dirt':v===B.stone?'stone':v===B.wood?'wood':v===B.sand?'sand':v===B.ore?'ore':v===B.brick?'brick':'dirt';writeBlock(tx,ty,B.air).then(()=>{add(id);gain(v===B.ore?25:5);if(v===B.ore)P.coins+=2;toast('⛏ '+item[id].i+' '+item[id].n)})}
function build(tx,ty){let id=slots[sel],it=item[id];if(!allowed(tx,ty)||!it||id==='torch'||id==='chest'||!inv[id]||at(tx,ty)!==B.air)return;writeBlock(tx,ty,it.b).then(()=>{inv[id]--;renderBar();save()})}
function spawnChest(tx,ty){if(inv.chest<1||at(tx,ty)!==B.air||!allowed(tx,ty))return;inv.chest--;writeBlock(tx,ty,B.brick).then(()=>db&&db.ref('world/chests/'+key(tx,ty)).transaction(v=>v||{owner:uid,items:{ore:1,dirt:3}}));renderBar()}
function physics(){let speed=P.level>=3?6:5;P.vx+=(keys.r-keys.l)*.42;P.vx*=P.ground?.78:.92;P.vx=clamp(P.vx,-speed,speed);if(jump&&P.ground){P.vy=-10;P.ground=false}jump=false;P.vy=clamp(P.vy+.5,-20,13);P.x+=P.vx;collide('x');P.y+=P.vy;P.ground=false;collide('y');if(P.y>H*TILE-80){P.hp-=1;if(P.hp<=0){P.hp=100;P.x=12*TILE;P.y=40*TILE}}for(let m of mobs){m.x+=m.dir*.35;if(Math.abs(m.x-P.x)<24&&Math.abs(m.y-P.y)<28)P.hp-=.15}cam.x=clamp(lerp(cam.x,P.x-innerWidth*.42,.12),0,W*TILE-innerWidth);cam.y=clamp(lerp(cam.y,P.y-innerHeight*.55,.12),0,H*TILE-innerHeight)}
function collide(axis){if(axis==='x'){let y0=Math.floor(P.y/TILE),y1=Math.floor((P.y+P.h-1)/TILE);if(P.vx>0){let tx=Math.floor((P.x+P.w)/TILE);for(let y=y0;y<=y1;y++)if(at(tx,y)&&at(tx,y)!==B.water){P.x=tx*TILE-P.w-.1;P.vx=0}}else if(P.vx<0){let tx=Math.floor(P.x/TILE);for(let y=y0;y<=y1;y++)if(at(tx,y)&&at(tx,y)!==B.water){P.x=(tx+1)*TILE+.1;P.vx=0}}}else{let x0=Math.floor((P.x+2)/TILE),x1=Math.floor((P.x+P.w-2)/TILE),ty=P.vy>=0?Math.floor((P.y+P.h)/TILE):Math.floor(P.y/TILE);for(let x=x0;x<=x1;x++)if(at(x,ty)&&at(x,ty)!==B.water){if(P.vy>=0){P.y=ty*TILE-P.h;P.ground=true}else P.y=(ty+1)*TILE;P.vy=0;break}}}
function draw(){let w=innerWidth,h=innerHeight;ctx.clearRect(0,0,w,h);let night=weather.time>.55&&weather.time<.9,g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,night?'#07102b':'#62bdf0');g.addColorStop(1,night?'#172047':'#e0f5ff');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle=night?'#e2ecff':'#fff0a0';ctx.beginPath();ctx.arc(w*.78,90,night?24:36,0,7);ctx.fill();let x0=Math.max(0,cam.x/TILE|0-2),x1=Math.min(W,(cam.x+w)/TILE|0+3),y0=Math.max(0,cam.y/TILE|0-2),y1=Math.min(H,(cam.y+h)/TILE|0+3);for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){let v=at(x,y);if(!v)continue;let col={1:'#8c5a36',2:'#55c34d',3:'#596273',4:'#80502d',5:'#3f9b55',6:'#4cc7da',7:'#d9b46a',8:'#4c9fe8',9:'#202531',10:'#9b6650',11:'#eab34c'}[v];ctx.fillStyle=col||'#888';ctx.fillRect(x*TILE-cam.x,y*TILE-cam.y,TILE+1,TILE+1);if(v===B.grass){ctx.fillStyle='#82e66c';ctx.fillRect(x*TILE-cam.x,y*TILE-cam.y,TILE,4)}}ctx.strokeStyle='rgba(190,225,255,'+weather.rain*.65+')';for(let i=0;i<weather.rain*90;i++){let rx=(i*47+performance.now()*.35)%w,ry=(i*29+performance.now()*.8)%h;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-4,ry+13);ctx.stroke()}for(let id in remotes)player(remotes[id].x-cam.x,remotes[id].y-cam.y,remotes[id].skin,remotes[id].n);player(P.x-cam.x,P.y-cam.y,P.skin,P.name);for(let m of mobs)mob(m.x-cam.x,m.y-cam.y,m);if(boss)bossDraw(boss.x-cam.x,boss.y-cam.y)}
function player(x,y,col,n){ctx.fillStyle=col||'#fff';ctx.fillRect(x,y,18,25);ctx.fillStyle='#fff';ctx.fillRect(x+3,y+6,4,4);ctx.fillRect(x+11,y+6,4,4);ctx.fillStyle='#102038';ctx.fillRect(x+4,y+7,2,2);ctx.fillRect(x+12,y+7,2,2);ctx.font='11px Arial';ctx.textAlign='center';ctx.fillStyle='#fff';ctx.fillText(n||'',x+9,y-5)}function mob(x,y,m){ctx.fillStyle=m.type==='slime'?'#54d37e':'#b65d66';ctx.beginPath();ctx.ellipse(x+12,y+15,13,14,0,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.fillRect(x+7,y+10,3,3);ctx.fillRect(x+15,y+10,3,3)}function bossDraw(x,y){ctx.fillStyle='#9b4dff';ctx.beginPath();ctx.arc(x+25,y+25,25,0,7);ctx.fill();ctx.fillStyle='#ffdf58';ctx.fillRect(x+12,y+18,7,7);ctx.fillRect(x+30,y+18,7,7);ctx.fillStyle='#fff';ctx.font='12px Arial';ctx.fillText('БОСС '+Math.ceil((boss.hp||0)/boss.max*100)+'%',x+25,y-10)}
function update(){let need=100+(P.level-1)*80;$('hp').textContent=Math.max(0,P.hp|0);$('lvl').textContent=P.level;$('xp').textContent=P.xp+'/'+need;$('xpbar').style.width=P.xp/need*100+'%';$('coins').textContent=P.coins;$('online').textContent=Object.keys(remotes).length+1;let ss=['ЛЕТО','ОСЕНЬ','ЗИМА','ВЕСНА'][weather.season];$('weather').textContent=(weather.rain>.1?(weather.season===2?'❄️ Снег':'🌧️ Дождь'):'☀️ Ясно')+' · '+ss}
function tick(){let t=Date.now();weather.time=t%240000/240000;weather.season=Math.floor(t%1200000/300000);weather.rain=t%90000<30000?Math.min(1,weather.rain+.025):Math.max(0,weather.rain-.018);if(Math.random()<.0015){let x=(P.x/TILE|0)+30+(Math.random()*80|0);mobs.push({x:x*TILE,y:40*TILE,dir:Math.random()>.5?1:-1,type:'slime'})}}
function renderBar(){$('hotbar').innerHTML=slots.map((id,i)=>`<div class="slot ${i===sel?'sel':''}" data-i="${i}"><b>${item[id].i}</b>${i+1} · ${inv[id]||0}</div>`).join('');document.querySelectorAll('.slot').forEach(e=>e.onclick=()=>{sel=+e.dataset.i;renderBar();$('selected').textContent=item[slots[sel]].n})}
function save(){let d={x:Math.round(P.x),y:Math.round(P.y),hp:P.hp,level:P.level,xp:P.xp,coins:P.coins,skin:P.skin,inv:inv,name:P.name};localStorage.setItem('blockran_shared_save',JSON.stringify(d));if(db&&uid)db.ref('players/'+uid+'/save').set(d).catch(()=>{})}
function send(){if(meRef)meRef.update({n:P.name,x:Math.round(P.x),y:Math.round(P.y),skin:P.skin,l:P.level,t:firebase.database.ServerValue.TIMESTAMP})}
function connect(){if(!db)return;meRef=db.ref('players/'+uid);meRef.onDisconnect().remove();db.ref('players').on('value',s=>{let r={};s.forEach(c=>{if(c.key!==uid){let v=c.val();if(!v||Date.now()-(v.t||0)>15000)return;r[c.key]={x:v.x,y:v.y,n:v.n,skin:v.skin}});remotes=r;update()});db.ref('chat').limitToLast(30).on('child_added',s=>{let v=s.val(),d=document.createElement('div');d.textContent=(v.n||'Игрок')+': '+v.text;$('msgs').appendChild(d);$('msgs').scrollTop=99999});db.ref('world/blocks').on('child_added',s=>applyChange(s));db.ref('world/blocks').on('child_changed',s=>applyChange(s));db.ref('world/blocks').on('child_removed',s=>{let [x,y]=xy(s.key);set(x,y,0)});db.ref('world/boss').on('value',s=>boss=s.val());setInterval(send,120);setInterval(save,5000);send()}
function applyChange(s){let [x,y]=xy(s.key),v=s.val();set(x,y,v===null?0:v)}
function loadSave(){let raw=localStorage.getItem('blockran_shared_save');if(raw)try{let d=JSON.parse(raw);Object.assign(P,d);inv=d.inv||inv;name=P.name||name}catch(e){}}async function start(){loadSave();if(auth){try{let u=auth.currentUser||await auth.signInAnonymously();uid=u.user?u.user.uid:u.uid;name=P.name||('Игрок_'+uid.slice(0,5));P.name=name;connect();notify('✅ Общий мир подключен')}catch(e){notify('⚠️ Firebase недоступен, локальный режим')}}else notify('⚠️ Локальный режим')}start();renderBar();
function action(){if(!mouse.down)return;let tx=mouse.x/TILE|0,ty=mouse.y/TILE|0;if(sel===7){spawnChest(tx,ty);mouse.down=false;return}mouse.button===0?mine(tx,ty):build(tx,ty)}
addEventListener('keydown',e=>{if(e.target===$('chatInput')){if(e.key==='Enter'){let text=e.target.value.trim();if(text&&db)db.ref('chat').push({n:P.name,text,t:Date.now()});e.target.value=''}return}if(e.code==='KeyA'||e.code==='ArrowLeft')keys.l=true;if(e.code==='KeyD'||e.code==='ArrowRight')keys.r=true;if((e.code==='Space'||e.code==='KeyW'||e.code==='ArrowUp')&&!e.repeat)jump=true;if(e.key>='1'&&e.key<='8'){sel=+e.key-1;renderBar()}if(e.code==='Enter')$('chatInput').focus();if(e.code==='KeyE')openGuide();if(e.code==='KeyB')startBoss()});addEventListener('keyup',e=>{if(e.code==='KeyA'||e.code==='ArrowLeft')keys.l=false;if(e.code==='KeyD'||e.code==='ArrowRight')keys.r=false});
cv.onmousemove=e=>{mouse.x=e.clientX+cam.x;mouse.y=e.clientY+cam.y};cv.onmousedown=e=>{mouse.down=true;mouse.button=e.button;e.preventDefault()};addEventListener('mouseup',()=>mouse.down=false);cv.oncontextmenu=e=>e.preventDefault();
function hold(id,on,off){let b=$(id);b.onpointerdown=e=>{e.preventDefault();on()};b.onpointerup=off;b.onpointercancel=off}hold('left',()=>keys.l=true,()=>keys.l=false);hold('right',()=>keys.r=true,()=>keys.r=false);hold('jump',()=>jump=true,()=>{});hold('mine',()=>{let tx=(P.x/P.w|0)+1,ty=(P.y/TILE|0);mine(tx,ty)},()=>{});
function openGuide(){ $('modal').classList.add('open');$('modalBody').innerHTML=`<h2>📖 Мир БЛОКРАН</h2><p>Это общий серверный мир: поставленный или добытый блок виден всем игрокам. Уровни открывают способности: 3 — ускорение, 6 — золотой скин, 10 — фиолетовая аура.</p><div class="grid"><div class="card">⛏ Добывай руду<br>💎 руда даёт XP и монеты</div><div class="card">🧱 Строй укрытия<br>ПКМ ставит выбранный блок</div><div class="card">📦 Сундук<br>8-й слот создаёт общий объект</div><div class="card">👑 Босс<br>Нажми B для общего события</div></div><h3>Крафт</h3><button onclick="craft('brick',['stone','stone'])">2 камня → кирпич</button> <button onclick="craft('torch',['wood','ore'])">дерево + руда → факел</button>`}
function craft(out,need){if(need.every(x=>(inv[x]||0)>0)){need.forEach(x=>inv[x]--);add(out);toast('🔨 Создано: '+item[out].n);save()}else toast('Не хватает ресурсов')}$('guide').onclick=openGuide;$('craftBtn').onclick=openGuide;$('close').onclick=()=>$('modal').classList.remove('open');
function startBoss(){if(!db||!uid){toast('Босс доступен в общем мире');return}db.ref('world/boss').transaction(v=>v||{x:Math.round(P.x+250),y:Math.round(P.y-40),hp:1000,max:1000,started:Date.now()}).then(()=>toast('👑 Общее событие: босс призван!'))}
cv.addEventListener('dblclick',()=>{if(boss&&Math.abs(boss.x-P.x)<180){db.ref('world/boss/hp').transaction(v=>Math.max(0,(v||0)-25));gain(10)}});
let last=0,acc=0;function loop(t){let dt=Math.min(60,t-last||16);last=t;acc+=dt;while(acc>16){tick();physics();action();acc-=16}draw();update();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
