async function makeThumb(file){return new Promise(r=>{let im=new Image(),url=URL.createObjectURL(file);im.onload=()=>{let c=document.createElement('canvas'),s=80;c.width=s;c.height=s;let z=Math.max(s/im.width,s/im.height),w=im.width*z,h=im.height*z;c.getContext('2d').drawImage(im,(s-w)/2,(s-h)/2,w,h);URL.revokeObjectURL(url);c.toBlob(async b=>r(await b.arrayBuffer()),'image/jpeg',.45)};im.onerror=()=>r(null);im.src=url})}
async function sendFile(file,kind){toast('Шифрование и загрузка в Realtime Database…',60000);try{if(!await allowed(S.peer.uid))throw Error('Пользователь ограничил сообщения');let kid=(await db.ref(`users/${S.peer.uid}/currentKey`).once('value')).val(),base={sender:S.user.uid,recipient:S.peer.uid,senderKey:S.identity.keyId,recipientKey:kid,kind},k=await chatKey(base),iv=crypto.getRandomValues(new Uint8Array(12)),cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv,additionalData:te.encode('file-v2')},k,await file.arrayBuffer()),mediaId=db.ref(`media/${S.chatId}`).push().key,path=`media/${S.chatId}/${mediaId}`;await writeChunks(path,cipher);let d=JSON.stringify({path,fileIv:b64(iv),mime:file.type,name:file.name,size:file.size}),extra={};if(S.reply)extra.replyTo=S.reply.id;if(S.burn)extra.expiresAt=Date.now()+10000;let m=await encryptFor(S.peer.uid,kind,d,extra),thumb=null;if(kind==='image'){let tr=await makeThumb(file);if(tr)thumb=await encryptFor(S.peer.uid,'image',tr)}await writeMessage(m,thumb);S.reply=null;updateReply();toast(kind==='image'?'Фотография отправлена':'Видео отправлено')}catch(e){console.error(e);toast('Ошибка: '+e.message,5000)}}
$('#voiceBtn').onclick=async()=>{if(S.rec?.state==='recording')return S.rec.stop();try{let stream=await navigator.mediaDevices.getUserMedia({audio:true}),mime=['audio/webm;codecs=opus','audio/mp4','audio/webm'].find(x=>MediaRecorder.isTypeSupported(x))||'',chunks=[];S.rec=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);S.rec.ondataavailable=e=>e.data.size&&chunks.push(e.data);S.rec.onstop=async()=>{stream.getTracks().forEach(x=>x.stop());$('#voiceBtn').classList.remove('recording');$('#voiceBtn').textContent='🎙';let blob=new Blob(chunks,{type:S.rec.mimeType||'audio/webm'});if(blob.size<8*1024*1024)await sendFile(new File([blob],'voice',{type:blob.type}),'voice');else toast('Запись больше 8 МБ')};S.rec.start(250);$('#voiceBtn').classList.add('recording');$('#voiceBtn').textContent='■';toast('Запись началась. Нажмите ■ для отправки')}catch{toast('Нет доступа к микрофону')}};
async function openMessageMenu(id){let m=S.messages.find(x=>x.id===id);if(!m)return;S.selected=m;let text=kindName(m.kind);try{let d=await decodedText(m);if(m.kind==='text')text=d}catch{}$('#contextPreview').textContent=text;let own=m.sender===S.user.uid,acts=[['↩','Ответить','reply'],['➡','Переслать','forward'],['★','В Избранное','save'],['❤️','Реакция','react']];if(own&&m.kind==='text')acts.push(['✎','Редактировать','edit']);if(own)acts.push(['⌫','Удалить у всех','delete']);$('#messageActions').innerHTML=acts.map(a=>`<button class="action ${a[2]==='delete'?'red':''}" data-a="${a[2]}"><span class="actionIcon">${a[0]}</span>${a[1]}</button>`).join('');$$('#messageActions .action').forEach(x=>x.onclick=()=>messageAction(x.dataset.a));$('#messageMenu').classList.remove('hidden')}
async function messageAction(a){$('#messageMenu').classList.add('hidden');let m=S.selected;if(a==='reply')setReply(m.id);if(a==='react')reactTo(m.id,'❤️');if(a==='delete'&&confirm('Удалить сообщение у всех?'))removeMessage(m);if(a==='edit'){try{$('#editText').value=await decodedText(m);$('#editModal').classList.remove('hidden')}catch{toast('Не удалось открыть текст')}}if(a==='forward'){S.forwardSource=m;showForward()}if(a==='save'){S.forwardSource=m;await forwardTo(S.user.uid);toast('Сохранено в Избранное')}}
async function reactTo(id,emoji){await db.ref(`messages/${S.chatId}/${id}/reactions/${S.user.uid}`).set(emoji)}async function removeMessage(m,silent=false){try{if(m.kind!=='text'){try{let d=await decodedText(m);if(d.path)await db.ref(d.path).remove()}catch{}}await db.ref(`messages/${S.chatId}/${m.id}`).remove();if(!silent)toast('Сообщение удалено')}catch(e){if(!silent)toast(e.message)}}
$('#saveEdit').onclick=async()=>{let text=$('#editText').value.trim(),m=S.selected;if(!text)return;try{let x=await encryptFor(m.recipient,'text',text,{replyTo:m.replyTo||null,editedAt:Date.now(),expiresAt:m.expiresAt||null});x.createdAt=m.createdAt;x.readAt=m.readAt||null;x.reactions=m.reactions||null;await db.ref(`messages/${S.chatId}/${m.id}`).set(x);$('#editModal').classList.add('hidden');toast('Изменено')}catch(e){toast(e.message)}};
async function showForward(){let ids=[S.user.uid,...Object.keys(S.contacts).filter(x=>x!==S.user.uid)],ps=await Promise.all(ids.map(x=>profile(x)));$('#forwardList').innerHTML=ps.map(p=>`<div class="row forwardRow" data-u="${p.uid}">${av(p)}<div class="rowMain"><b>${esc(p.uid===S.user.uid?'Избранное':p.name)}</b><div class="muted">@${esc(p.username)}</div></div></div>`).join('');$$('.forwardRow').forEach(x=>x.onclick=()=>forwardTo(x.dataset.u));$('#forwardModal').classList.remove('hidden')}
async function forwardTo(uid){let src=S.forwardSource,p=await profile(uid),oldPeer=S.peer,oldChat=S.chatId;try{let data=await decodedText(src);S.peer=p;S.chatId=pair(S.user.uid,uid);if(src.kind==='text'){let m=await encryptFor(uid,'text',data,{forwarded:true});await writeMessage(m)}else{let raw=await decryptFile(src,data),file=new File([raw],data.name||src.kind,{type:data.mime});await sendFile(file,src.kind)}toast('Переслано');$('#forwardModal').classList.add('hidden')}catch(e){toast(e.message)}finally{S.peer=oldPeer;S.chatId=oldChat}}
$('#chatMenuBtn').onclick=()=>showUser(S.peer.uid);
function renderMe(){let p=S.me;$('#myName').textContent=p.name;$('#myUser').textContent='@'+p.username;$('#myBio').textContent=p.bio||'';$('#myAvatar').innerHTML=p.avatarUrl?`<img src="${p.avatarUrl}">`:esc(initial(p));$('#privacyLast').value=p.privacy?.lastSeen||'everyone';$('#privacyWrite').value=p.privacy?.write||'everyone'}$('#editProfile').onclick=()=>{$('#profileName').value=S.me.name||'';$('#profileBio').value=S.me.bio||'';$('#profileModal').classList.remove('hidden')};
$('#saveProfile').onclick=async()=>{let b=$('#saveProfile');busy(b,true);try{let name=$('#profileName').value.trim(),bio=$('#profileBio').value.trim();if(!name)throw Error('Укажите имя');let be=await pEncrypt(bio),u={name,bioEnc:{iv:be.iv,data:b64(be.out)}},f=$('#avatarInput').files[0];if(f){if(f.size>1024*1024)throw Error('Аватар должен быть до 1 МБ');let old=S.me.avatar?.path,x=await pEncrypt(await f.arrayBuffer()),id=db.ref(`profileMedia/${S.user.uid}`).push().key,path=`profileMedia/${S.user.uid}/${id}`;await writeChunks(path,x.out);u.avatar={path,iv:x.iv,mime:f.type};if(old)db.ref(old).remove().catch(()=>{})}await db.ref('users/'+S.user.uid).update(u);S.me=await profile(S.user.uid,true);renderMe();$('#profileModal').classList.add('hidden');toast('Профиль обновлён')}catch(e){toast(e.message)}finally{busy(b,false,'Сохранить')}};
$('#privacyLast').onchange=e=>db.ref(`users/${S.user.uid}/privacy/lastSeen`).set(e.target.value);$('#privacyWrite').onchange=e=>db.ref(`users/${S.user.uid}/privacy/write`).set(e.target.value);$('#notifications').onchange=async e=>{if(e.target.checked){if(!('Notification'in window))return e.target.checked=false;let p=await Notification.requestPermission();if(p!=='granted')e.target.checked=false}localStorage.setItem('notify',e.target.checked?'1':'0')};$('#notifications').checked=localStorage.getItem('notify')==='1';
$('#rotateKey').onclick=async()=>{if(!confirm('Создать новый ключ устройства? Старый сохранится локально для истории.'))return;try{await iset('key:'+S.user.uid+':'+S.identity.keyId,S.identity);await createIdentity(null);$('#keyId').textContent=S.identity.keyId.slice(0,12);toast('Ключ обновлён')}catch(e){toast(e.message)}};$('#logout').onclick=async()=>{await db.ref('status/'+S.user.uid).set({online:false,lastSeen:now()});await auth.signOut();location.reload()};
$$('.closeModal').forEach(x=>x.onclick=()=>x.closest('.modal').classList.add('hidden'));$$('.modal').forEach(x=>x.onclick=e=>e.target===x&&x.classList.add('hidden'));
const manifest={name:'MEOW Messenger',short_name:'MEOW',start_url:location.pathname,display:'standalone',background_color:'#000000',theme_color:'#000000'};let link=document.createElement('link');link.rel='manifest';link.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));document.head.appendChild(link);window.addEventListener('beforeunload',()=>S.urls.forEach(URL.revokeObjectURL));
