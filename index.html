<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 ЧИЛИ-КЕЙС 3D | Симулятор Майнкрафт</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 50%, #0a0a1a 100%);
      overflow: hidden;
      height: 100vh;
      user-select: none;
      -webkit-user-select: none;
    }
    
    #gameContainer {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    #ui {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 10;
      pointer-events: none;
    }
    
    #ui > * {
      pointer-events: auto;
    }
    
    .btn {
      background: linear-gradient(180deg, #5a5a5a 0%, #2a2a2a 100%);
      border: 3px solid #1a1a1a;
      border-bottom: 5px solid #000;
      color: #fff;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      transition: all 0.1s;
      text-shadow: 2px 2px 0 #000;
      box-shadow: 0 5px 0 #000, 0 10px 20px rgba(0,0,0,0.5);
      image-rendering: pixelated;
    }
    
    .btn:hover {
      background: linear-gradient(180deg, #7a7a7a 0%, #4a4a4a 100%);
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #000, 0 15px 25px rgba(255,100,0,0.3);
    }
    
    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #000;
    }
    
    .btn.open-case {
      background: linear-gradient(180deg, #ff6b35 0%, #c41e3a 100%);
      border-color: #8b0000;
      animation: glow 1.5s infinite;
      font-size: 24px;
      padding: 20px 50px;
    }
    
    @keyframes glow {
      0%, 100% {
        box-shadow: 0 5px 0 #4a0000, 0 10px 30px rgba(255,50,0,0.4);
      }
      50% {
        box-shadow: 0 5px 0 #4a0000, 0 15px 40px rgba(255,100,0,0.8), 0 0 60px rgba(255,50,0,0.6);
      }
    }
    
    .rarity-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 3px 3px 0 #000;
      z-index: 20;
      opacity: 0;
      animation: none;
      pointer-events: none;
    }
    
    .rarity-label.show {
      animation: revealRarity 3s ease-out;
    }
    
    @keyframes revealRarity {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1) rotateY(0deg);
      }
      15% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(2) rotateY(360deg);
      }
      30% {
        transform: translate(-50%, -50%) scale(1.5) rotateY(720deg);
      }
      60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8) translateY(-100px);
      }
    }
    
    .inventory-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      border: 4px solid #555;
      padding: 15px;
      color: #fff;
      min-width: 200px;
      z-index: 5;
    }
    
    .inventory-panel h3 {
      margin-bottom: 10px;
      color: #ffaa00;
      text-shadow: 2px 2px 0 #000;
    }
    
    .case-counter {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 20px;
      background: rgba(0,0,0,0.8);
      padding: 10px 20px;
      border: 3px solid #ffaa00;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div class="case-counter" id="caseCounter">🔑 Ключей: 3</div>
    <div class="rarity-label" id="rarityLabel"></div>
    <div class="inventory-panel">
      <h3>📦 Инвентарь</h3>
      <div id="inventoryList"></div>
      <div style="margin-top:10px; color:#ffaa00;">💰 Монеты: <span id="coinsDisplay">100</span></div>
    </div>
    <div id="ui">
      <button class="btn open-case" id="openCaseBtn">
        🔥 ОТКРЫТЬ КЕЙС
      </button>
      <button class="btn" id="buyKeyBtn">
        🗝️ Купить ключ (50💰)
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============ ОСНОВНАЯ ИГРА ============
    
    // Редкости и предметы
    const rarities = [
      { name: 'Обычный', color: 0xaaaaaa, weight: 40, value: 10, label: 'common' },
      { name: 'Необычный', color: 0x55ff55, weight: 25, value: 30, label: 'uncommon' },
      { name: 'Редкий', color: 0x5555ff, weight: 15, value: 80, label: 'rare' },
      { name: 'Эпический', color: 0xaa00ff, weight: 10, value: 200, label: 'epic' },
      { name: 'Легендарный', color: 0xffaa00, weight: 7, value: 500, label: 'legendary' },
      { name: 'МИФИЧЕСКИЙ', color: 0xff0044, weight: 3, value: 1500, label: 'mythical' }
    ];
    
    // Предметы Minecraft стиля
    const items = [
      { name: 'Земляной блок', rarity: 'common' },
      { name: 'Каменный меч', rarity: 'common' },
      { name: 'Деревянная кирка', rarity: 'common' },
      { name: 'Железный слиток', rarity: 'uncommon' },
      { name: 'Лук', rarity: 'uncommon' },
      { name: 'Зелье скорости', rarity: 'uncommon' },
      { name: 'Алмаз', rarity: 'rare' },
      { name: 'Зачарованная книга', rarity: 'rare' },
      { name: 'Изумруд', rarity: 'rare' },
      { name: 'Алмазный меч', rarity: 'epic' },
      { name: 'Элитры', rarity: 'epic' },
      { name: 'Тотем бессмертия', rarity: 'epic' },
      { name: 'Незеритовая броня', rarity: 'legendary' },
      { name: 'Звезда Незера', rarity: 'legendary' },
      { name: '🐉 ЯЙЦО ДРАКОНА', rarity: 'mythical' },
      { name: '🔥 МЕЧ ЧИЛИ', rarity: 'mythical' }
    ];
    
    // Состояние игры
    let gameState = {
      keys: parseInt(localStorage.getItem('keys') || '3'),
      coins: parseInt(localStorage.getItem('coins') || '100'),
      inventory: JSON.parse(localStorage.getItem('inventory') || '[]'),
      isOpening: false
    };
    
    // Three.js сцена
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a0a2e);
    scene.fog = new THREE.Fog(0x1a0a2e, 10, 50);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 12);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('gameContainer').appendChild(renderer.domElement);
    
    // Освещение
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    mainLight.position.set(10, 20, 10);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    
    const colorLight1 = new THREE.PointLight(0xff4400, 2, 15);
    colorLight1.position.set(5, 2, 5);
    scene.add(colorLight1);
    
    const colorLight2 = new THREE.PointLight(0x4400ff, 2, 15);
    colorLight2.position.set(-5, 2, -5);
    scene.add(colorLight2);
    
    // Пол
    const floorGeometry = new THREE.PlaneGeometry(30, 30);
    const floorMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x2a1a3a,
      roughness: 0.8,
      metalness: 0.2
    });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -4;
    floor.receiveShadow = true;
    scene.add(floor);
    
    // Декоративные блоки Minecraft стиля
    function createBlock(x, y, z, color) {
      const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
      const material = new THREE.MeshStandardMaterial({ 
        color: color,
        roughness: 0.3,
        metalness: 0.1
      });
      const block = new THREE.Mesh(geometry, material);
      block.position.set(x, y, z);
      block.castShadow = true;
      block.receiveShadow = true;
      return block;
    }
    
    // Создаем окружение
    for (let i = -5; i <= 5; i++) {
      for (let j = -5; j <= 5; j++) {
        if (Math.random() > 0.7) {
          const block = createBlock(i * 1.5, -4, j * 1.5, 
            Math.random() > 0.5 ? 0x5a3a2a : 0x3a5a3a);
          scene.add(block);
        }
      }
    }
    
    // Частицы
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 200;
    const positions = new Float32Array(particlesCount * 3);
    for (let i = 0; i < particlesCount * 3; i += 3) {
      positions[i] = (Math.random() - 0.5) * 15;
      positions[i + 1] = Math.random() * 10 - 3;
      positions[i + 2] = (Math.random() - 0.5) * 15;
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particlesMaterial = new THREE.PointsMaterial({
      color: 0xff8844,
      size: 0.1,
      blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particles);
    
    // Кейс (сундук Minecraft стиля)
    const caseGroup = new THREE.Group();
    
    const chestBase = new THREE.Mesh(
      new THREE.BoxGeometry(2.5, 1.8, 1.8),
      new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.4, metalness: 0.3 })
    );
    chestBase.castShadow = true;
    caseGroup.add(chestBase);
    
    const chestLid = new THREE.Mesh(
      new THREE.BoxGeometry(2.5, 0.6, 1.8),
      new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.4, metalness: 0.3 })
    );
    chestLid.position.y = 1.2;
    chestLid.castShadow = true;
    caseGroup.add(chestLid);
    
    const lockGeometry = new THREE.BoxGeometry(0.4, 0.4, 0.2);
    const lockMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xFFD700,
      roughness: 0.2,
      metalness: 0.8,
      emissive: 0xFFD700,
      emissiveIntensity: 0.5
    });
    const lock = new THREE.Mesh(lockGeometry, lockMaterial);
    lock.position.set(0, 0.9, 0.9);
    caseGroup.add(lock);
    
    caseGroup.position.y = -1.5;
    scene.add(caseGroup);
    
    // Анимация кейса
    let caseRotation = 0;
    let caseBob = 0;
    
    // Предмет для отображения результата
    let resultItem = null;
    let resultParticles = [];
    
    // UI элементы
    const openCaseBtn = document.getElementById('openCaseBtn');
    const buyKeyBtn = document.getElementById('buyKeyBtn');
    const rarityLabel = document.getElementById('rarityLabel');
    const caseCounter = document.getElementById('caseCounter');
    const coinsDisplay = document.getElementById('coinsDisplay');
    const inventoryList = document.getElementById('inventoryList');
    
    function updateUI() {
      caseCounter.textContent = `🔑 Ключей: ${gameState.keys}`;
      coinsDisplay.textContent = gameState.coins;
      localStorage.setItem('keys', gameState.keys);
      localStorage.setItem('coins', gameState.coins);
      localStorage.setItem('inventory', JSON.stringify(gameState.inventory));
      
      inventoryList.innerHTML = gameState.inventory.slice(-5).map(item => 
        `<div style="color:#${item.rarityColor.toString(16).padStart(6,'0')}">${item.name} (${item.value}💰)</div>`
      ).join('');
      
      openCaseBtn.disabled = gameState.isOpening || gameState.keys <= 0;
    }
    
    function getRandomRarity() {
      const totalWeight = rarities.reduce((sum, r) => sum + r.weight, 0);
      let random = Math.random() * totalWeight;
      for (const rarity of rarities) {
        if (random < rarity.weight) return rarity;
        random -= rarity.weight;
      }
      return rarities[0];
    }
    
    function getItemByRarity(rarityLabel) {
      const matchingItems = items.filter(item => item.rarity === rarityLabel);
      return matchingItems[Math.floor(Math.random() * matchingItems.length)];
    }
    
    function createItemMesh(color, size = 0.8) {
      const group = new THREE.Group();
      
      // Основной куб предмета
      const geometry = new THREE.BoxGeometry(size, size, size);
      const material = new THREE.MeshStandardMaterial({ 
        color: color,
        roughness: 0.2,
        metalness: 0.5,
        emissive: color,
        emissiveIntensity: 0.3
      });
      const cube = new THREE.Mesh(geometry, material);
      cube.castShadow = true;
      group.add(cube);
      
      // Свечение
      const glowGeometry = new THREE.BoxGeometry(size * 1.2, size * 1.2, size * 1.2);
      const glowMaterial = new THREE.MeshBasicMaterial({ 
        color: color,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending
      });
      const glow = new THREE.Mesh(glowGeometry, glowMaterial);
      group.add(glow);
      
      return group;
    }
    
    function spawnResultParticles(color) {
      const particles = [];
      for (let i = 0; i < 50; i++) {
        const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
        const material = new THREE.MeshBasicMaterial({ color: color });
        const particle = new THREE.Mesh(geometry, material);
        particle.position.set(0, 0, 0);
        particle.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 0.5,
          Math.random() * 0.5 + 0.3,
          (Math.random() - 0.5) * 0.5
        );
        particle.life = 1;
        scene.add(particle);
        particles.push(particle);
      }
      return particles;
    }
    
    function openCase() {
      if (gameState.isOpening || gameState.keys <= 0) return;
      
      gameState.isOpening = true;
      gameState.keys--;
      updateUI();
      
      const rarity = getRandomRarity();
      const item = getItemByRarity(rarity.label);
      
      // Анимация открытия
      const startTime = Date.now();
      const openDuration = 3000;
      
      function animateOpening() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / openDuration, 1);
        
        // Тряска кейса
        caseGroup.rotation.z = Math.sin(elapsed * 0.05) * 0.2 * (1 - progress);
        caseGroup.position.y = -1.5 + Math.sin(elapsed * 0.03) * 0.5 * (1 - progress);
        
        if (progress >= 0.5 && !resultItem) {
          // Показываем предмет
          resultItem = createItemMesh(rarity.color);
          resultItem.position.y = 2;
          resultItem.scale.set(0, 0, 0);
          scene.add(resultItem);
          
          resultParticles = spawnResultParticles(rarity.color);
          
          // Показываем редкость
          rarityLabel.textContent = `${rarity.name}: ${item.name}`;
          rarityLabel.style.color = '#' + rarity.color.toString(16).padStart(6, '0');
          rarityLabel.classList.add('show');
          setTimeout(() => rarityLabel.classList.remove('show'), 3000);
          
          // Добавляем в инвентарь
          gameState.inventory.push({
            name: item.name,
            rarity: rarity.name,
            rarityColor: rarity.color,
            value: rarity.value
          });
          updateUI();
        }
        
        if (resultItem) {
          resultItem.scale.lerp(new THREE.Vector3(1.5, 1.5, 1.5), 0.1);
          resultItem.rotation.y += 0.05;
          resultItem.rotation.x += 0.03;
          resultItem.position.y = 2 + Math.sin(elapsed * 0.005) * 0.3;
          
          // Обновление частиц
          resultParticles = resultParticles.filter(p => p.life > 0);
          resultParticles.forEach(p => {
            p.position.add(p.velocity);
            p.velocity.y -= 0.01;
            p.life -= 0.02;
            p.material.opacity = p.life;
            if (p.life <= 0) {
              scene.remove(p);
            }
          });
        }
        
        if (progress < 1) {
          requestAnimationFrame(animateOpening);
        } else {
          // Завершение
          setTimeout(() => {
            if (resultItem) {
              scene.remove(resultItem);
              resultItem = null;
            }
            resultParticles.forEach(p => scene.remove(p));
            resultParticles = [];
            gameState.isOpening = false;
            updateUI();
          }, 2000);
        }
      }
      
      animateOpening();
    }
    
    function buyKey() {
      if (gameState.coins >= 50) {
        gameState.coins -= 50;
        gameState.keys++;
        updateUI();
      } else {
        alert('Недостаточно монет! Нужно 50💰');
      }
    }
    
    openCaseBtn.addEventListener('click', openCase);
    buyKeyBtn.addEventListener('click', buyKey);
    
    // Анимация
    function animate() {
      requestAnimationFrame(animate);
      
      if (!gameState.isOpening) {
        caseRotation += 0.005;
        caseBob = Math.sin(Date.now() * 0.002) * 0.3;
        caseGroup.rotation.y = caseRotation;
        caseGroup.position.y = -1.5 + caseBob;
        lock.material.emissiveIntensity = 0.5 + Math.sin(Date.now() * 0.003) * 0.3;
      }
      
      particles.rotation.y += 0.0005;
      
      renderer.render(scene, camera);
    }
    
    // Обработка изменения размера окна
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Обработка кликов для взаимодействия с 3D
    renderer.domElement.addEventListener('click', (event) => {
      if (gameState.isOpening) return;
      
      const mouse = new THREE.Vector2();
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      
      const intersects = raycaster.intersectObject(caseGroup, true);
      if (intersects.length > 0) {
        openCase();
      }
    });
    
    // Инициализация
    updateUI();
    animate();
    
    console.log('🔥 ЧИЛИ-КЕЙС 3D ЗАПУЩЕН!');
    console.log('🎮 Кликай на сундук или жми кнопку ОТКРЫТЬ КЕЙС');
    console.log('💰 Система редкостей: Обычный → Необычный → Редкий → Эпический → Легендарный → МИФИЧЕСКИЙ');
    console.log('🗝️ Покупай ключи за монеты и открывай кейсы!');
  </script>
</body>
</html>
