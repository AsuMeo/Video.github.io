<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Mega Messenger</title>
    <!-- Tailwind CSS CDN для стилизации -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Общие стили для темной темы */
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; /* Более современный шрифт */
            background: #0f172a; /* Tailwind Slate 900 */
            color: #e2e8f0; /* Tailwind Slate 200 */
            -webkit-font-smoothing: antialiased; /* Сглаживание шрифтов для лучшего вида */
            -moz-osx-font-smoothing: grayscale;
        }

        /* Контейнеры для видео */
        .video-container {
            position: relative;
            border-radius: 1rem; /* Закругленные углы */
            overflow: hidden;
            background: #1e293b; /* Tailwind Slate 800 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); /* Легкая тень */
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Заполнение контейнера видео, обрезая лишнее */
        }
        .local-video {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 150px;
            height: 100px;
            border: 2px solid #3b82f6; /* Tailwind Blue 500 */
            z-index: 10;
        }

        /* Эффект "Glassmorphism" для панелей */
        .glass {
            background: rgba(30, 41, 59, 0.7); /* Slate 800 с прозрачностью */
            backdrop-filter: blur(10px); /* Размытие фона */
            border: 1px solid rgba(255,255,255,0.1); /* Тонкая белая рамка */
        }
        
        /* Стилизация сообщений чата (в стиле Telegram) */
        #chatMessages {
            display: flex; /* Flexbox для расположения сообщений */
            flex-direction: column;
            gap: 8px; /* Отступы между сообщениями */
            padding: 1rem; /* Внутренний отступ окна чата */
        }
        .chat-message {
            max-width: 80%;
            padding: 0.5rem 0.75rem; /* Более плотные отступы для "пузырей" */
            border-radius: 0.75rem; /* Закругленные углы */
            word-wrap: break-word; /* Перенос слов для длинных сообщений */
            line-height: 1.4; /* Высота строки для лучшей читаемости */
            font-size: 0.95rem; /* Немного больший размер текста */
        }
        .chat-message.self {
            background-color: #2563eb; /* Tailwind Blue 600 - Ваши сообщения */
            align-self: flex-end; /* Выравнивание по правому краю */
            border-bottom-right-radius: 0.25rem; /* Более острый уголок для "хвостика" сообщения */
        }
        .chat-message.other {
            background-color: #334155; /* Tailwind Slate 700 - Сообщения собеседника */
            align-self: flex-start; /* Выравнивание по левому краю */
            border-bottom-left-radius: 0.25rem; /* Более острый уголок для "хвостика" сообщения */
        }
        .chat-message .user-info {
            font-size: 0.7rem; /* Меньший шрифт для имени/времени */
            opacity: 0.7;
            margin-bottom: 2px;
            text-align: right; /* Выравнивание для своих сообщений */
            color: rgba(255,255,255,0.6);
        }
        .chat-message.other .user-info {
             text-align: left; /* Выравнивание для сообщений собеседника */
        }

        /* Кастомный скроллбар для темной темы */
        #chatMessages::-webkit-scrollbar {
            width: 8px;
            background-color: transparent;
        }
        #chatMessages::-webkit-scrollbar-thumb {
            background-color: #4a5568; /* Tailwind Slate 600 */
            border-radius: 4px;
            border: 2px solid #0f172a; /* Цвет фона body */
        }
        #chatMessages::-webkit-scrollbar-thumb:hover {
            background-color: #64748b; /* Tailwind Slate 500 */
        }
        /* Стили для Firefox */
        #chatMessages {
            scrollbar-width: thin;
            scrollbar-color: #4a5568 #0f172a;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <!-- Header -->
    <header class="flex justify-between items-center mb-6 glass p-4 rounded-2xl">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">P2P Messenger</h1>
        <div id="roomInfo" class="hidden flex items-center gap-2">
            <span class="text-sm opacity-70">Комната:</span>
            <code id="roomIdDisplay" class="bg-slate-800 px-2 py-1 rounded">---</code>
            <button id="copyLink" class="text-xs bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded transition">Копировать ссылку</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden">
        
        <!-- Video Section -->
        <div class="lg:col-span-2 flex flex-col gap-4">
            <div class="video-container flex-1 relative">
                <video id="remoteVideo" autoplay playsinline class="rounded-xl"></video>
                <video id="localVideo" autoplay playsinline muted class="local-video rounded-lg shadow-2xl"></video>
                
                <!-- Controls -->
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-4">
                    <button id="toggleMic" class="p-4 rounded-full bg-slate-700 hover:bg-slate-600 transition shadow-lg text-2xl">🎤</button>
                    <button id="toggleCam" class="p-4 rounded-full bg-slate-700 hover:bg-slate-600 transition shadow-lg text-2xl">📹</button>
                    <button id="hangup" class="p-4 rounded-full bg-red-500 hover:bg-red-600 transition shadow-lg text-2xl">📞</button>
                </div>
            </div>
        </div>

        <!-- Chat Section -->
        <div class="glass rounded-2xl flex flex-col overflow-hidden h-full">
            <div class="p-4 border-b border-white/10 font-bold text-center">P2P Чат (Шифрованный)</div>
            <div id="chatMessages" class="flex-1 overflow-y-auto">
                <div class="text-sm opacity-50 text-center italic mt-4">Создайте комнату или подключитесь, чтобы начать чат</div>
            </div>
            <div class="p-4 flex gap-2 border-t border-white/10">
                <input id="chatInput" type="text" placeholder="Сообщение..." class="flex-1 bg-slate-800 border-none rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                <button id="sendBtn" class="bg-blue-600 p-2 rounded-lg hover:bg-blue-700 transition">➡️</button>
            </div>
        </div>
    </main>

    <!-- Welcome Modal -->
    <div id="setupModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="glass p-8 rounded-3xl max-w-md w-full text-center">
            <h2 class="text-2xl font-bold mb-6">Добро пожаловать</h2>
            <button id="createBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold mb-4 transition">Создать новую комнату</button>
            <div class="text-sm opacity-50 mb-4">ИЛИ</div>
            <input id="joinInput" type="text" placeholder="ID комнаты" class="w-full bg-slate-800 border-none rounded-xl px-4 py-3 mb-2 text-center outline-none text-white">
            <button id="joinBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-bold transition">Присоединиться</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // === ВАША КОНФИГУРАЦИЯ FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyBm0mIvHVznIeF2PoFk6dtdaiT5r877wyA",
            authDomain: "meow-874ce.firebaseapp.com",
            databaseURL: "https://meow-874ce-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "meow-874ce",
            storageBucket: "meow-874ce.firebasestorage.app",
            messagingSenderId: "471541334599",
            appId: "1:471541334599:web:567af3e7dbe70a37572762"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // WebRTC конфигурация (STUN-серверы)
        const servers = {
            iceServers: [
                { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }
            ],
            iceCandidatePoolSize: 10,
        };

        let pc = null; 
        let localStream = null;
        let remoteStream = null;
        let dataChannel = null;
        let currentRoomId = null; // Для отслеживания текущей комнаты

        // Элементы UI
        const localVid = document.getElementById('localVideo');
        const remoteVid = document.getElementById('remoteVideo');
        const chatMessagesContainer = document.getElementById('chatMessages'); 
        const chatInput = document.getElementById('chatInput');
        const setupModal = document.getElementById('setupModal');

        // Создание нового RTCPeerConnection
        function createPeerConnection() {
            pc = new RTCPeerConnection(servers);
            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }
            if (!remoteStream) remoteStream = new MediaStream();
            if (!remoteVid.srcObject) remoteVid.srcObject = remoteStream; // Инициализация remoteVideo
            
            pc.ontrack = event => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                remoteVid.srcObject = remoteStream; // Обновляем srcObject
            };
        }

        // 1. Инициализация камеры и микрофона
        async function initMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVid.srcObject = localStream;
                createPeerConnection(); // Создаем PeerConnection после получения потока
            } catch (error) {
                console.error("Ошибка доступа к камере/микрофону:", error);
                alert("Не удалось получить доступ к камере или микрофону. Убедитесь, что разрешили доступ.");
            }
        }

        // 2. Функция создания комнаты
        async function createRoom() {
            const roomRef = push(ref(db, 'rooms')); // Создаем уникальный ID комнаты
            const roomId = roomRef.key;
            currentRoomId = roomId;
            
            setupDataChannel(); // Создаем Data Channel для инициатора звонка

            const offerDescription = await pc.createOffer();
            await pc.setLocalDescription(offerDescription);

            const offer = {
                sdp: offerDescription.sdp,
                type: offerDescription.type,
            };

            await set(ref(db, `rooms/${roomId}`), { offer }); // Записываем offer в Firebase
            
            // Слушаем ответ (answer) от другого пользователя
            onValue(ref(db, `rooms/${roomId}/answer`), async (snapshot) => {
                const data = snapshot.val();
                if (data && !pc.currentRemoteDescription) {
                    const answerDescription = new RTCSessionDescription(data);
                    await pc.setRemoteDescription(answerDescription);
                }
            });

            handleICE(roomId); // Обрабатываем ICE кандидатов
            showUI(roomId); // Показываем UI для звонка
        }

        // 3. Функция подключения к комнате
        async function joinRoom(roomId) {
            currentRoomId = roomId;
            const roomRef = ref(db, `rooms/${roomId}`);
            const snapshot = await new Promise(resolve => onValue(roomRef, resolve, { onlyOnce: true }));
            
            if (!snapshot.exists()) return alert('Комната не найдена');

            // Когда подключаемся к комнате, ожидаем, что Data Channel будет создан инициатором
            pc.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannelEvents();
            };

            const data = snapshot.val();
            const offerDescription = data.offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offerDescription)); // Устанавливаем удаленный offer

            const answerDescription = await pc.createAnswer();
            await pc.setLocalDescription(answerDescription);

            const answer = {
                type: answerDescription.type,
                sdp: answerDescription.sdp,
            };

            await update(ref(db, `rooms/${roomId}`), { answer }); // Отправляем наш answer в Firebase
            
            handleICE(roomId); // Обрабатываем ICE кандидатов
            showUI(roomId); // Показываем UI для звонка
        }

        // 4. Обработка ICE кандидатов (для установки прямого P2P соединения)
        function handleICE(roomId) {
            const iceCandidatesRef = ref(db, `rooms/${roomId}/candidates`);
            
            pc.onicecandidate = event => {
                if (event.candidate) {
                    push(iceCandidatesRef, event.candidate.toJSON()); // Отправляем свои кандидаты в Firebase
                }
            };

            onChildAdded(iceCandidatesRef, snapshot => {
                const data = snapshot.val();
                if (data) {
                    pc.addIceCandidate(new RTCIceCandidate(data)); // Добавляем кандидаты собеседника
                }
            });
        }

        // 5. Data Channel (для текстового чата)
        function setupDataChannel() {
            dataChannel = pc.createDataChannel('chat');
            setupDataChannelEvents();
        }

        function setupDataChannelEvents() {
            dataChannel.onopen = () => addChatMessage('Система', 'Соединение установлено!');
            dataChannel.onmessage = e => addChatMessage('Собеседник', e.data);
            dataChannel.onclose = () => addChatMessage('Система', 'Соединение чата закрыто.');
            dataChannel.onerror = (error) => console.error("Data Channel Error:", error);
        }

        function addChatMessage(user, text) {
            const div = document.createElement('div');
            div.className = `chat-message ${user === 'Вы' ? 'self' : 'other'}`;
            div.innerHTML = `<div class="user-info">${user === 'Вы' ? 'Вы' : 'Собеседник'} - ${new Date().toLocaleTimeString()}</div><div>${text}</div>`;
            chatMessagesContainer.appendChild(div);
            chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight; // Прокрутка вниз
        }

        // Вспомогательные функции для UI
        function showUI(roomId) {
            setupModal.classList.add('hidden');
            document.getElementById('roomInfo').classList.remove('hidden');
            document.getElementById('roomIdDisplay').innerText = roomId;
            window.history.pushState({}, '', `?room=${roomId}`); // Обновляем URL
            // Удаляем начальное сообщение чата "Создайте комнату..."
            const initialChatMsg = chatMessagesContainer.querySelector('.italic');
            if(initialChatMsg) initialChatMsg.remove();
        }

        // Обработчики кнопок
        document.getElementById('createBtn').onclick = async () => {
            await initMedia();
            createRoom();
        };

        document.getElementById('joinBtn').onclick = async () => {
            const id = document.getElementById('joinInput').value.trim();
            if (id) {
                await initMedia();
                joinRoom(id);
            } else {
                alert('Пожалуйста, введите ID комнаты.');
            }
        };

        document.getElementById('sendBtn').onclick = () => {
            const msg = chatInput.value.trim();
            if (msg && dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(msg);
                addChatMessage('Вы', msg);
                chatInput.value = '';
            } else if (!dataChannel || dataChannel.readyState !== 'open') {
                alert('Чат не подключен. Дождитесь соединения.');
            }
        };

        document.getElementById('copyLink').onclick = () => {
            navigator.clipboard.writeText(window.location.href);
            // Визуальный фидбек
            const copyButton = document.getElementById('copyLink');
            const originalText = copyButton.innerText;
            copyButton.innerText = 'Скопировано!';
            setTimeout(() => { copyButton.innerText = originalText; }, 1500);
        };

        // Управление медиа
        document.getElementById('toggleMic').onclick = () => {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    document.getElementById('toggleMic').classList.toggle('bg-red-500'); 
                    document.getElementById('toggleMic').innerText = audioTrack.enabled ? '🎤' : '🔇';
                }
            }
        };

        document.getElementById('toggleCam').onclick = () => {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    document.getElementById('toggleCam').classList.toggle('bg-red-500'); 
                    document.getElementById('toggleCam').innerText = videoTrack.enabled ? '📹' : '📸';
                }
            }
        };

        document.getElementById('hangup').onclick = () => {
            if (pc) {
                pc.close();
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            // Можно очистить данные комнаты из Firebase, но это сложнее, если нужно, чтобы
            // другой пользователь еще мог подключиться. Для простоты перезагружаем страницу.
            // if (currentRoomId) {
            //     remove(ref(db, `rooms/${currentRoomId}`)); 
            // }
            location.reload(); // Перезагружаем страницу, чтобы сбросить состояние
        };

        // Авто-вход по ссылке (если в URL есть параметр "room")
        const urlParams = new URLSearchParams(window.location.search);
        const urlRoomId = urlParams.get('room');
        if (urlRoomId) {
            document.getElementById('joinInput').value = urlRoomId;
            // Можно автоматически вызвать joinRoom, но лучше, чтобы пользователь сам нажал кнопку.
            // document.getElementById('joinBtn').click();
        }

    </script>
</body>
    </html>
